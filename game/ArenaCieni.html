<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Arena Cieni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#05030a;font-family:'Orbitron',sans-serif;color:#e8e0ff;touch-action:none}
#app{position:fixed;inset:0;overflow:hidden}
canvas#gl{position:fixed;inset:0;z-index:0;display:block}
.screen{position:fixed;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.screen.active{display:flex}
.bg-stars{position:fixed;inset:0;z-index:1;pointer-events:none;background:
 radial-gradient(2px 2px at 20% 30%,rgba(180,160,255,.7),transparent),
 radial-gradient(1px 1px at 60% 70%,rgba(255,200,255,.6),transparent),
 radial-gradient(1.5px 1.5px at 80% 20%,rgba(120,200,255,.6),transparent),
 radial-gradient(1px 1px at 40% 80%,rgba(200,180,255,.5),transparent),
 radial-gradient(2px 2px at 90% 60%,rgba(160,120,255,.6),transparent);}
h1.title{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(36px,9vw,82px);letter-spacing:4px;
 background:linear-gradient(180deg,#d9b8ff,#7a4aff 60%,#3a1a6a);-webkit-background-clip:text;background-clip:text;color:transparent;
 text-shadow:0 0 40px rgba(122,74,255,.6);margin-bottom:4px;text-align:center;filter:drop-shadow(0 4px 16px rgba(122,74,255,.5))}
.subtitle{font-size:clamp(11px,2.6vw,16px);letter-spacing:6px;color:#8a7ab8;text-transform:uppercase;margin-bottom:26px}
.btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;color:#fff;cursor:pointer;
 padding:15px 30px;border:none;border-radius:14px;margin:7px;min-width:230px;position:relative;overflow:hidden;
 background:linear-gradient(135deg,#3a1a6a,#6a3a9a);box-shadow:0 6px 20px rgba(106,58,154,.4),inset 0 1px 0 rgba(255,255,255,.15);
 transition:transform .12s,box-shadow .12s;text-transform:uppercase}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,#7a4aff,#b44aff);box-shadow:0 6px 24px rgba(122,74,255,.6),inset 0 1px 0 rgba(255,255,255,.25);font-size:18px;padding:18px 34px}
.btn.small{min-width:auto;padding:10px 18px;font-size:12px;margin:4px}
.btn.ghost{background:linear-gradient(135deg,#1a1230,#2a1a44);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.btn.danger{background:linear-gradient(135deg,#6a1a2a,#aa2a3a)}
.panel{background:linear-gradient(160deg,rgba(26,18,44,.94),rgba(14,8,26,.96));border:1px solid rgba(122,74,255,.3);
 border-radius:18px;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(8px)}
.topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;z-index:6}
.currency{display:flex;gap:10px}
.coin-pill{background:linear-gradient(135deg,rgba(40,28,60,.9),rgba(20,12,34,.9));border:1px solid rgba(122,74,255,.35);
 border-radius:20px;padding:7px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.lvlbar-wrap{width:min(440px,90vw);margin:8px 0 22px}
.lvlbar-top{display:flex;justify-content:space-between;font-size:12px;color:#9a8ac8;margin-bottom:5px}
.lvlbar{height:10px;background:rgba(20,12,34,.9);border-radius:6px;overflow:hidden;border:1px solid rgba(122,74,255,.3)}
.lvlbar-fill{height:100%;background:linear-gradient(90deg,#7a4aff,#b44aff,#ff4a8a);border-radius:6px;transition:width .4s;box-shadow:0 0 10px rgba(180,74,255,.6)}
.menu-buttons{display:flex;flex-direction:column;align-items:center}
.menu-row{display:flex;flex-wrap:wrap;justify-content:center}
.scr-head{display:flex;justify-content:space-between;align-items:center;width:min(960px,96vw);margin-bottom:14px}
.scr-title{font-family:'Cinzel',serif;font-size:clamp(22px,5vw,34px);font-weight:700;color:#d9b8ff;letter-spacing:2px}
.filters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;max-width:96vw}
.filter-btn{font-size:11px;padding:6px 12px;border-radius:16px;border:1px solid rgba(122,74,255,.3);background:rgba(26,18,44,.7);color:#b8a8e0;cursor:pointer;font-family:inherit;font-weight:700;text-transform:uppercase}
.filter-btn.active{background:linear-gradient(135deg,#7a4aff,#b44aff);color:#fff;border-color:transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;width:min(960px,96vw);padding-bottom:90px}
.card{background:linear-gradient(165deg,rgba(30,20,50,.9),rgba(16,10,30,.95));border:2px solid var(--rc,#444);border-radius:14px;
 padding:10px 6px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s;aspect-ratio:.82}
.card:active{transform:scale(.95)}
.card.locked{filter:grayscale(.85) brightness(.5);opacity:.7}
.card .emoji{font-size:34px;filter:drop-shadow(0 0 8px var(--rc))}
.card .cname{font-size:10px;font-weight:700;margin-top:6px;line-height:1.15;color:#e8e0ff}
.card .rtag{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--rc);margin-top:3px;font-weight:700}
.card .clanic{position:absolute;top:5px;left:6px;font-size:13px}
.card .dupct{position:absolute;top:4px;right:6px;font-size:9px;background:rgba(0,0,0,.55);border-radius:8px;padding:1px 5px;color:#ffd24a;font-weight:700}
.card .glowbar{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--rc);box-shadow:0 0 8px var(--rc)}
.modal-wrap{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(4,2,10,.78);backdrop-filter:blur(6px)}
.modal-wrap.active{display:flex}
.modal{width:min(540px,96vw);max-height:92vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:14px;font-size:24px;color:#9a8ac8;cursor:pointer;z-index:2;line-height:1}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid rgba(122,74,255,.12)}
.stat-row b{color:#d9b8ff}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab{padding:8px 16px;border-radius:12px;background:rgba(26,18,44,.7);border:1px solid rgba(122,74,255,.25);cursor:pointer;font-weight:700;font-size:12px;color:#b8a8e0;text-transform:uppercase}
.tab.active{background:linear-gradient(135deg,#7a4aff,#b44aff);color:#fff}
.tabpane{display:none;width:min(960px,96vw)}
.tabpane.active{display:block}
.shop-item{display:flex;align-items:center;gap:14px;background:linear-gradient(160deg,rgba(30,20,50,.85),rgba(16,10,30,.9));border:1px solid rgba(122,74,255,.25);border-radius:14px;padding:14px;margin-bottom:10px}
.shop-item .si-ic{font-size:38px;filter:drop-shadow(0 0 10px rgba(122,74,255,.6))}
.shop-item .si-body{flex:1}
.shop-item .si-name{font-weight:700;font-size:15px;color:#e8e0ff}
.shop-item .si-desc{font-size:11px;color:#9a8ac8;margin-top:2px}
.crate-card{background:linear-gradient(165deg,rgba(34,22,56,.9),rgba(18,10,32,.95));border:2px solid var(--cc,#7a4aff);border-radius:18px;padding:20px;text-align:center;cursor:pointer;position:relative;overflow:hidden}
.crate-card .cc-ic{font-size:60px;filter:drop-shadow(0 0 16px var(--cc))}
.crates-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
#hud{position:fixed;inset:0;z-index:4;pointer-events:none;display:none}
#hud.active{display:block}
.hud-tl{position:absolute;top:14px;left:14px;display:flex;gap:8px;align-items:center}
.hud-tr{position:absolute;top:14px;right:14px;display:flex;gap:8px;align-items:center}
.hud-pill{background:linear-gradient(135deg,rgba(30,20,50,.85),rgba(16,10,30,.9));border:1px solid rgba(122,74,255,.4);
 border-radius:18px;padding:7px 14px;font-size:14px;font-weight:900;letter-spacing:1px;color:#fff;backdrop-filter:blur(4px);
 box-shadow:0 3px 12px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px}
.hud-pill .lbl{font-size:9px;color:#9a8ac8;font-weight:700}
.hud-btn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,rgba(40,28,60,.85),rgba(20,12,34,.9));
 border:1px solid rgba(122,74,255,.4);color:#d9b8ff;font-size:20px;display:flex;align-items:center;justify-content:center;
 pointer-events:auto;cursor:pointer;backdrop-filter:blur(4px)}
.boss-bar-wrap{position:absolute;top:16px;left:50%;transform:translateX(-50%);width:min(560px,80vw);display:none}
.boss-bar-wrap.show{display:block}
.boss-name{text-align:center;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#ff6a8a;text-shadow:0 0 14px rgba(255,74,138,.8);margin-bottom:5px;letter-spacing:2px}
.boss-bar{height:14px;background:rgba(20,8,16,.8);border-radius:8px;overflow:hidden;border:1px solid rgba(255,74,138,.5);box-shadow:0 0 18px rgba(255,74,138,.4)}
.boss-bar-fill{height:100%;background:linear-gradient(90deg,#ff2a4a,#ff6a8a,#ffaa00);transition:width .25s;box-shadow:0 0 12px rgba(255,74,138,.7)}
.hp-bar-wrap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:min(420px,68vw)}
.hp-bar-row{display:flex;align-items:center;gap:8px}
.hp-ico{font-size:18px;filter:drop-shadow(0 0 6px #ff4a4a)}
.hp-bar{flex:1;height:16px;background:rgba(20,8,8,.85);border-radius:9px;overflow:hidden;border:1px solid rgba(255,90,90,.45);box-shadow:0 0 14px rgba(255,74,74,.3);position:relative}
.hp-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#aa1a2a,#ff4a4a,#ff8a6a);transition:width .2s;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.hp-txt{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 3px #000}
.combo-disp{position:absolute;top:64px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-weight:900;font-size:24px;color:#ffd24a;text-shadow:0 0 16px rgba(255,170,0,.8);opacity:0;transition:opacity .2s}
.combo-disp.show{opacity:1}
.announce{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-weight:900;
 font-size:clamp(30px,8vw,64px);text-align:center;color:#fff;text-shadow:0 0 30px rgba(122,74,255,.9);opacity:0;pointer-events:none;letter-spacing:3px}
.announce.sub{font-size:clamp(14px,3.4vw,22px);color:#d9b8ff;letter-spacing:5px;top:46%}
#joystick{position:absolute;bottom:30px;left:30px;width:130px;height:130px;border-radius:50%;
 background:radial-gradient(circle,rgba(122,74,255,.12),rgba(122,74,255,.04));border:2px solid rgba(122,74,255,.35);
 pointer-events:auto;display:none;touch-action:none}
#joystick.show{display:block}
#joy-knob{position:absolute;width:56px;height:56px;border-radius:50%;left:37px;top:37px;
 background:radial-gradient(circle at 35% 30%,#b48aff,#6a3a9a);box-shadow:0 4px 14px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.3)}
.abil-stack{position:absolute;bottom:34px;right:28px;display:none;flex-direction:column-reverse;align-items:center;gap:14px;pointer-events:none}
.abil-stack.show{display:flex}
.abil-btn{width:84px;height:84px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(180,74,255,.45),rgba(60,26,106,.85));
 border:2px solid rgba(180,138,255,.6);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:30px;
 position:relative;overflow:hidden;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.abil-btn.atk{width:104px;height:104px;font-size:40px;background:radial-gradient(circle at 35% 30%,rgba(255,90,90,.5),rgba(120,20,30,.9));border-color:rgba(255,140,140,.7)}
.abil-btn.small{width:62px;height:62px;font-size:24px}
.abil-cd{position:absolute;inset:0;background:rgba(8,4,16,.78);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;border-radius:50%}
.abil-key{position:absolute;bottom:2px;right:6px;font-size:9px;color:#d9b8ff;font-weight:700}
#vignette{position:fixed;inset:0;z-index:3;pointer-events:none;display:none;box-shadow:inset 0 0 180px 40px rgba(0,0,0,.7);transition:box-shadow .4s}
#vignette.active{display:block}
#hit-flash{position:fixed;inset:0;z-index:7;pointer-events:none;background:radial-gradient(circle,transparent 40%,rgba(200,20,20,.5));opacity:0;transition:opacity .12s}
#fx-flash{position:fixed;inset:0;z-index:7;pointer-events:none;opacity:0;transition:opacity .18s}
#shadow-overlay{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .5s;background:radial-gradient(circle,transparent 30%,rgba(60,20,120,.45) 90%);box-shadow:inset 0 0 220px 60px rgba(30,8,60,.8)}
.dmg-num{position:fixed;z-index:8;pointer-events:none;font-weight:900;font-size:18px;text-shadow:0 2px 4px #000;font-family:'Orbitron'}
#loading{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#05030a}
.loader-ring{width:60px;height:60px;border:4px solid rgba(122,74,255,.2);border-top-color:#b44aff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{margin-top:18px;color:#9a8ac8;letter-spacing:3px;font-size:13px}
.gameover-stats{display:flex;flex-direction:column;gap:6px;margin:16px 0;width:min(360px,86vw)}
.go-stat{display:flex;justify-content:space-between;font-size:14px;padding:8px 14px;background:rgba(26,18,44,.7);border-radius:10px;border:1px solid rgba(122,74,255,.2)}
.go-stat b{color:#ffd24a}
.sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;max-height:46vh;overflow-y:auto;margin:10px 0}
.mode-card{background:linear-gradient(165deg,rgba(34,22,56,.9),rgba(18,10,32,.95));border:2px solid rgba(122,74,255,.4);border-radius:16px;padding:18px;cursor:pointer;text-align:center;transition:transform .12s}
.mode-card:active{transform:scale(.96)}
.mode-card .mc-ic{font-size:42px}
.mode-card .mc-name{font-weight:900;font-size:16px;margin-top:8px;color:#d9b8ff}
.mode-card .mc-desc{font-size:11px;color:#9a8ac8;margin-top:5px;line-height:1.3}
.modes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;width:min(700px,94vw)}
.talent-node{display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,rgba(30,20,50,.85),rgba(16,10,30,.9));border:1px solid rgba(122,74,255,.25);border-radius:12px;padding:12px;margin-bottom:8px}
.talent-ic{font-size:30px}
.talent-body{flex:1}
.tn-name{font-weight:700;font-size:14px;color:#d9b8ff}
.tn-desc{font-size:10px;color:#9a8ac8}
.tn-lvl{font-size:11px;color:#ffd24a;font-weight:700}
.slider{width:100%;-webkit-appearance:none;height:6px;border-radius:4px;background:rgba(122,74,255,.25);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#b44aff;box-shadow:0 0 8px rgba(180,74,255,.7);cursor:pointer}
.set-row{margin:14px 0}
.set-row label{font-size:13px;color:#b8a8e0;display:flex;justify-content:space-between;margin-bottom:6px}
.toggle{display:inline-block;width:48px;height:26px;background:rgba(122,74,255,.25);border-radius:14px;position:relative;cursor:pointer}
.toggle.on{background:linear-gradient(90deg,#7a4aff,#b44aff)}
.toggle .knob{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on .knob{left:25px}
.fs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.fs-opt{padding:10px;border-radius:10px;border:1px solid rgba(122,74,255,.3);background:rgba(26,18,44,.7);cursor:pointer;text-align:center;font-size:12px;font-weight:700}
.fs-opt.sel{background:linear-gradient(135deg,#7a4aff,#b44aff);color:#fff}
@media(max-width:560px){.btn{min-width:200px}}
#chromatic{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0;transition:opacity .2s;mix-blend-mode:screen}
#lowHpOverlay{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .5s;
 background:radial-gradient(circle at 50% 60%,transparent 25%,rgba(180,10,10,.35) 100%);animation:lowHpPulse 1.2s ease-in-out infinite}
@keyframes lowHpPulse{0%,100%{opacity:.5}50%{opacity:.9}}
#killStreak{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;pointer-events:none;
 font-family:'Cinzel',serif;font-weight:900;font-size:48px;color:#ffd24a;text-shadow:0 0 30px rgba(255,170,0,.9),0 0 60px rgba(255,74,0,.6);
 opacity:0;transition:opacity .3s,transform .3s}
#waveTransition{position:fixed;inset:0;z-index:7;pointer-events:none;opacity:0;display:flex;align-items:center;justify-content:center;
 background:linear-gradient(180deg,transparent,rgba(5,3,10,.6),transparent);backdrop-filter:blur(2px)}
#waveTransition .wt-inner{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(36px,8vw,72px);color:#d9b8ff;
 text-shadow:0 0 40px rgba(122,74,255,.8);letter-spacing:6px;transform:scale(.8);transition:transform .4s,opacity .4s;opacity:0}
.env-warn{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:8;pointer-events:none;
 font-size:14px;font-weight:700;color:#ff6a4a;text-shadow:0 2px 8px rgba(255,60,40,.8);opacity:0;transition:opacity .3s}
.ability-ready-flash{animation:abilReady .6s ease-out}
@keyframes abilReady{0%{box-shadow:0 0 0 0 rgba(180,74,255,.8)}100%{box-shadow:0 0 0 20px rgba(180,74,255,0)}}
.hp-bar-fill.low{animation:hpLowPulse .8s ease-in-out infinite}
@keyframes hpLowPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
.hp-bar-fill.crit{animation:hpCritPulse .5s ease-in-out infinite}
@keyframes hpCritPulse{0%,100%{filter:brightness(1);background:linear-gradient(90deg,#aa1a2a,#ff4a4a,#ff8a6a)}50%{filter:brightness(1.8);background:linear-gradient(90deg,#ff2a2a,#ff6a4a,#ffaa8a)}}
.card-shine{position:absolute;inset:0;overflow:hidden;border-radius:12px;pointer-events:none}
.card-shine::after{content:'';position:absolute;top:-100%;left:-100%;width:60%;height:300%;
 background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.15) 45%,rgba(255,255,255,.3) 50%,rgba(255,255,255,.15) 55%,transparent 60%);
 transform:rotate(25deg);animation:cardShine 4s linear infinite}
@keyframes cardShine{0%{left:-100%}100%{left:200%}}
.damage-crit{font-size:32px !important;color:#ffd24a !important;text-shadow:0 0 16px rgba(255,200,0,.9),0 2px 4px #000 !important;animation:critBounce .6s ease-out}
@keyframes critBounce{0%{transform:scale(2)}30%{transform:scale(.9)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="app">
  <canvas id="gl"></canvas>
  <div class="bg-stars"></div>

  <div class="screen active" id="scr-menu">
    <div class="topbar">
      <div class="currency">
        <div class="coin-pill">🪙 <span id="m-coins">0</span></div>
        <div class="coin-pill">💎 <span id="m-gems">0</span></div>
      </div>
      <div class="coin-pill">⚙️ <span id="m-collected">0</span>/60</div>
    </div>
    <h1 class="title">Arena Cieni</h1>
    <div class="subtitle">Shadow Arena</div>
    <div class="lvlbar-wrap">
      <div class="lvlbar-top"><span>Poziom <b id="m-lvl">1</b></span><span id="m-xp">0/100 XP</span></div>
      <div class="lvlbar"><div class="lvlbar-fill" id="m-xpfill" style="width:0%"></div></div>
    </div>
    <div class="menu-buttons">
      <button class="btn primary" onclick="ACgoPlay()">⚔️ Graj</button>
      <div class="menu-row">
        <button class="btn ghost small" onclick="ACshow('collection')">📚 Kolekcja</button>
        <button class="btn ghost small" onclick="ACshow('shop')">🛒 Sklep</button>
      </div>
      <div class="menu-row">
        <button class="btn ghost small" onclick="ACshow('talents')">🌟 Talenty</button>
        <button class="btn ghost small" onclick="ACshow('tasks')">📋 Zadania</button>

/* ============ ADVANCED VFX SYSTEMS ============ */
/* --- Trail System: persistent trails behind moving objects --- */
const TrailSystem=(function(){
  const MAX_TRAILS=20;
  const trails=[];
  function create(color,width,maxLen,blending){
    if(trails.length>=MAX_TRAILS)return null;
    const geo=new THREE.BufferGeometry();
    const positions=new Float32Array(maxLen*3*2);
    const alphas=new Float32Array(maxLen*2);
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    geo.setAttribute('alpha',new THREE.BufferAttribute(alphas,1));
    const mat=new THREE.ShaderMaterial({
      transparent:true,depthWrite:false,side:THREE.DoubleSide,
      blending:blending||THREE.AdditiveBlending,
      uniforms:{uColor:{value:new THREE.Color(color)},uTime:{value:0}},
      vertexShader:`attribute float alpha;varying float vAlpha;void main(){vAlpha=alpha;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform vec3 uColor;uniform float uTime;varying float vAlpha;void main(){float glow=vAlpha*(0.8+sin(uTime*6.0)*0.2);gl_FragColor=vec4(uColor*1.4,glow);}`
    });
    const mesh=new THREE.Mesh(geo,mat);
    scene.add(mesh);
    const trail={mesh,geo,mat,points:[],maxLen:maxLen||20,width:width||.15,active:true};
    trails.push(trail);
    return trail;
  }
  function addPoint(trail,x,y,z){
    if(!trail||!trail.active)return;
    trail.points.unshift({x,y,z});
    if(trail.points.length>trail.maxLen)trail.points.pop();
    rebuildTrail(trail);
  }
  function rebuildTrail(trail){
    const pts=trail.points;
    const pos=trail.geo.attributes.position.array;
    const alp=trail.geo.attributes.alpha.array;
    const len=pts.length;
    for(let i=0;i<trail.maxLen;i++){
      const idx=i*6;
      const aidx=i*2;
      if(i>=len){
        pos[idx]=0;pos[idx+1]=0;pos[idx+2]=0;
        pos[idx+3]=0;pos[idx+4]=0;pos[idx+5]=0;
        alp[aidx]=0;alp[aidx+1]=0;
        continue;
      }
      const p=pts[i];
      const frac=1-i/trail.maxLen;
      const w=trail.width*frac;
      const nx=i<len-1?pts[i+1].z-p.z:0;
      const nz=i<len-1?-(pts[i+1].x-p.x):0;
      const nd=Math.hypot(nx,nz)||1;
      pos[idx]=p.x+nx/nd*w;
      pos[idx+1]=p.y;
      pos[idx+2]=p.z+nz/nd*w;
      pos[idx+3]=p.x-nx/nd*w;
      pos[idx+4]=p.y;
      pos[idx+5]=p.z-nz/nd*w;
      alp[aidx]=frac;
      alp[aidx+1]=frac;
    }
    trail.geo.attributes.position.needsUpdate=true;
    trail.geo.attributes.alpha.needsUpdate=true;
    trail.geo.setDrawRange(0,Math.min(len*2,trail.maxLen*2));
  }
  function update(dt){
    trails.forEach(t=>{
      if(t.mat.uniforms)t.mat.uniforms.uTime.value+=dt;
    });
  }
  function destroy(trail){
    if(!trail)return;
    trail.active=false;
    scene.remove(trail.mesh);
    trail.geo.dispose();
    trail.mat.dispose();
    const idx=trails.indexOf(trail);
    if(idx>=0)trails.splice(idx,1);
  }
  function clear(){ while(trails.length)destroy(trails[0]); }
  return {create,addPoint,update,destroy,clear};
})();

/* --- Lightning VFX: electric arcs between points --- */
function createLightningBolt(x1,y1,z1,x2,y2,z2,color,segs,life,width){
  segs=segs||8;life=life||.3;width=width||.08;
  const pts=[];
  for(let i=0;i<=segs;i++){
    const t=i/segs;
    const jx=(Math.random()-.5)*1.5*(1-Math.abs(t-.5)*2);
    const jy=(Math.random()-.5)*1.0*(1-Math.abs(t-.5)*2);
    const jz=(Math.random()-.5)*1.5*(1-Math.abs(t-.5)*2);
    pts.push(new THREE.Vector3(
      x1+(x2-x1)*t+jx,
      y1+(y2-y1)*t+jy,
      z1+(z2-z1)*t+jz
    ));
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const geo=new THREE.TubeGeometry(curve,segs*2,width,4,false);
  const mat=basicMat(color,{transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false});
  const mesh=new THREE.Mesh(geo,mat);
  scene.add(mesh);
  const light=new THREE.PointLight(new THREE.Color(color).getHex(),2,12);
  const mid=pts[Math.floor(pts.length/2)];
  light.position.copy(mid);
  scene.add(light);
  const startTime=performance.now();
  function animate(){
    const elapsed=(performance.now()-startTime)/1000;
    if(elapsed>=life){
      scene.remove(mesh);scene.remove(light);
      geo.dispose();mat.dispose();
      return;
    }
    const frac=1-elapsed/life;
    mat.opacity=frac*.9;
    light.intensity=2*frac;
    mesh.visible=Math.random()>.15;
    requestAnimationFrame(animate);
  }
  animate();
}

/* --- Shockwave Ring with custom shader (prettier than basic ring) --- */
function createShockwaveRing(x,z,color,maxRadius,life,height){
  maxRadius=maxRadius||15;life=life||.8;height=height||.1;
  const geo=new THREE.RingGeometry(.5,1.5,64);
  const mat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uColor:{value:new THREE.Color(color)},
      uProgress:{value:0},
      uMaxR:{value:maxRadius}
    },
    vertexShader:`uniform float uProgress;uniform float uMaxR;varying vec2 vUv;
      void main(){
        vUv=uv;
        vec3 p=position;
        float r=length(p.xy);
        float newR=r*uProgress*uMaxR;
        p.xy=normalize(p.xy)*newR;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
      }`,
    fragmentShader:`uniform vec3 uColor;uniform float uProgress;varying vec2 vUv;
      void main(){
        float edge=smoothstep(0.0,0.3,vUv.y)*smoothstep(1.0,0.7,vUv.y);
        float fade=1.0-uProgress;
        gl_FragColor=vec4(uColor*1.5,edge*fade*0.8);
      }`
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.rotation.x=-Math.PI/2;
  mesh.position.set(x,height,z);
  scene.add(mesh);
  const startT=performance.now();
  function animate(){
    const elapsed=(performance.now()-startT)/1000;
    if(elapsed>=life){scene.remove(mesh);geo.dispose();mat.dispose();return;}
    mat.uniforms.uProgress.value=elapsed/life;
    requestAnimationFrame(animate);
  }
  animate();
}

/* --- Floating Text 3D (damage numbers in 3D space) --- */

/* --- Vortex effect: spinning particles sucked into a point --- */
function createVortex(x,y,z,color,duration,radius,count){

/* --- Pillar of Light (reusable) --- */
function createLightPillar(x,z,color,height,baseRadius,topRadius,life,pulsate){
  height=height||20;baseRadius=baseRadius||2;topRadius=topRadius||.3;life=life||1.5;
  const col=new THREE.Color(color);
  const geo=new THREE.CylinderGeometry(topRadius,baseRadius,height,16,1,true);
  const mat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    blending:THREE.AdditiveBlending,
    uniforms:{uColor:{value:col},uTime:{value:0},uFade:{value:1}},
    vertexShader:`varying vec2 vUv;varying vec3 vPos;void main(){vUv=uv;vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform vec3 uColor;uniform float uTime;uniform float uFade;varying vec2 vUv;varying vec3 vPos;
      void main(){
        float h=vUv.y;
        float edge=smoothstep(0.0,0.15,h)*smoothstep(1.0,0.85,h);
        float scan=sin(vPos.y*3.0-uTime*8.0)*0.3+0.7;
        float flicker=sin(uTime*15.0)*0.1+0.9;
        gl_FragColor=vec4(uColor*1.8*scan*flicker,edge*0.7*uFade);
      }`
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,height/2,z);
  scene.add(mesh);
  const light=new THREE.PointLight(col.getHex(),4,height*1.5);
  light.position.set(x,height*.4,z);
  scene.add(light);
  const groundGlow=new THREE.Mesh(new THREE.CircleGeometry(baseRadius*1.5,32),basicMat(color,{transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false}));
  groundGlow.rotation.x=-Math.PI/2;groundGlow.position.set(x,.05,z);scene.add(groundGlow);
  const startT=performance.now();
  function animate(){
    const elapsed=(performance.now()-startT)/1000;
    if(elapsed>=life){scene.remove(mesh);scene.remove(light);scene.remove(groundGlow);geo.dispose();mat.dispose();return;}
    mat.uniforms.uTime.value=elapsed;
    const fadeOut=elapsed>life*.7?1-(elapsed-life*.7)/(life*.3):1;
    mat.uniforms.uFade.value=fadeOut;
    light.intensity=4*fadeOut*(pulsate?(.8+Math.sin(elapsed*12)*.2):1);
    groundGlow.material.opacity=.5*fadeOut;
    if(pulsate)mesh.scale.x=1+Math.sin(elapsed*8)*.05;
    requestAnimationFrame(animate);
  }
  animate();
}

/* --- Energy Beam between two points --- */
function createEnergyBeam(x1,y1,z1,x2,y2,z2,color,width,life){
  width=width||.2;life=life||.5;
  const dir=new THREE.Vector3(x2-x1,y2-y1,z2-z1);
  const len=dir.length();
  dir.normalize();
  const geo=new THREE.CylinderGeometry(width,width,len,8,1);
  const col=new THREE.Color(color);
  const mat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    blending:THREE.AdditiveBlending,
    uniforms:{uColor:{value:col},uTime:{value:0}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform vec3 uColor;uniform float uTime;varying vec2 vUv;
      void main(){
        float scan=sin(vUv.y*20.0-uTime*30.0)*0.3+0.7;
        float edge=smoothstep(0.0,0.2,vUv.x)*smoothstep(1.0,0.8,vUv.x);
        gl_FragColor=vec4(uColor*2.0*scan,edge*0.8);
      }`
  });
  const mesh=new THREE.Mesh(geo,mat);
  const mid=new THREE.Vector3((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
  mesh.position.copy(mid);
  mesh.lookAt(x2,y2,z2);
  mesh.rotateX(Math.PI/2);
  scene.add(mesh);
  const halo=new THREE.Mesh(new THREE.CylinderGeometry(width*3,width*3,len,8,1),
    basicMat(color,{transparent:true,opacity:.15,blending:THREE.AdditiveBlending,depthWrite:false}));
  halo.position.copy(mid);halo.lookAt(x2,y2,z2);halo.rotateX(Math.PI/2);scene.add(halo);
  const startT=performance.now();
  function animate(){
    const elapsed=(performance.now()-startT)/1000;
    if(elapsed>=life){scene.remove(mesh);scene.remove(halo);geo.dispose();mat.dispose();return;}
    mat.uniforms.uTime.value=elapsed;
    const fade=1-elapsed/life;
    halo.material.opacity=.15*fade;
    mat.uniforms.uColor.value.copy(col).multiplyScalar(1+Math.sin(elapsed*20)*.3);
    requestAnimationFrame(animate);
  }
  animate();
}

/* --- Ground Rune Circle (animated magic circle on floor) --- */
function createGroundRune(x,z,color,radius,life,rotSpeed){
  radius=radius||3;life=life||2;rotSpeed=rotSpeed||2;
  const col=new THREE.Color(color);
  const group=new THREE.Group();
  group.position.set(x,.06,z);
  group.rotation.x=-Math.PI/2;
  const outerRing=new THREE.Mesh(new THREE.RingGeometry(radius-.1,radius,48),
    basicMat(color,{transparent:true,opacity:.7,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
  group.add(outerRing);
  const innerRing=new THREE.Mesh(new THREE.RingGeometry(radius*.5-.08,radius*.5,32),
    basicMat(color,{transparent:true,opacity:.5,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
  group.add(innerRing);
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    const line=new THREE.Mesh(new THREE.PlaneGeometry(.06,radius),
      basicMat(color,{transparent:true,opacity:.4,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
    line.position.set(Math.cos(a)*radius*.5,Math.sin(a)*radius*.5,0);
    line.rotation.z=a;
    group.add(line);
  }
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    const sym=new THREE.Mesh(new THREE.CircleGeometry(.12,6),
      basicMat(color,{transparent:true,opacity:.8,blending:THREE.AdditiveBlending,depthWrite:false}));
    sym.position.set(Math.cos(a)*radius*.75,Math.sin(a)*radius*.75,.01);
    group.add(sym);
  }
  scene.add(group);
  const glow=new THREE.PointLight(col.getHex(),2,radius*3);
  glow.position.set(x,.5,z);scene.add(glow);
  const startT=performance.now();
  function animate(){
    const elapsed=(performance.now()-startT)/1000;
    if(elapsed>=life){scene.remove(group);scene.remove(glow);return;}
    group.rotation.z+=rotSpeed*.016;
    innerRing.rotation.z-=rotSpeed*2*.016;
    const fade=elapsed>life*.7?1-(elapsed-life*.7)/(life*.3):1;
    outerRing.material.opacity=.7*fade*(0.8+Math.sin(elapsed*6)*.2);
    innerRing.material.opacity=.5*fade;
    glow.intensity=2*fade*(0.8+Math.sin(elapsed*8)*.2);
    requestAnimationFrame(animate);
  }
  animate();
}

/* --- Environmental Hazards System --- */
const EnvHazards={
  hazards:[],
  meshes:[],
  spawnHazard(type,x,z){
    const h={type,x,z,life:8+Math.random()*6,age:0,mesh:null,light:null,dmgCD:0};
    const col=type==='fire'?'#ff5a2a':type==='ice'?'#4adaff':type==='void'?'#7a4adf':'#4aff7a';
    const radius=type==='void'?3:2.5;
    const geo=new THREE.CircleGeometry(radius,32);
    const matShader=new THREE.ShaderMaterial({
      transparent:true,depthWrite:false,side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending,
      uniforms:{uColor:{value:new THREE.Color(col)},uTime:{value:0},uRadius:{value:radius}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewInstance*vec4(position,1.);}`.replace('modelViewInstance','modelViewMatrix'),
      fragmentShader:`uniform vec3 uColor;uniform float uTime;uniform float uRadius;varying vec2 vUv;
        void main(){
          vec2 c=vUv-0.5;float d=length(c)*2.0;
          float ring=smoothstep(0.7,0.85,d)*smoothstep(1.0,0.9,d);
          float inner=1.0-smoothstep(0.0,0.8,d);
          float pulse=sin(uTime*4.0+d*8.0)*0.3+0.7;
          float pattern=sin(atan(c.y,c.x)*6.0+uTime*3.0)*0.15+0.85;
          gl_FragColor=vec4(uColor*(inner*0.3+ring*0.8)*pulse*pattern,max(inner*0.4,ring*0.7));
        }`
    });
    h.mesh=new THREE.Mesh(geo,matShader);
    h.mesh.rotation.x=-Math.PI/2;
    h.mesh.position.set(x,.07,z);
    scene.add(h.mesh);
    h.light=new THREE.PointLight(new THREE.Color(col).getHex(),1.5,radius*3);
    h.light.position.set(x,.5,z);
    scene.add(h.light);
    this.hazards.push(h);
    if(type==='fire')for(let i=0;i<8;i++){
      spawnParticle(x+(Math.random()-.5)*radius*2,.2,z+(Math.random()-.5)*radius*2,new THREE.Color('#ff7a2a'),{vy:2+Math.random()*2,life:1+Math.random(),size:.12,grav:-1,shrink:.97});
    }
  },
  update(dt){
    if(!G||!G.player)return;
    for(let i=this.hazards.length-1;i>=0;i--){
      const h=this.hazards[i];
      h.age+=dt;
      if(h.mesh.material.uniforms)h.mesh.material.uniforms.uTime.value=h.age;
      h.light.intensity=1.5+Math.sin(h.age*4)*.5;
      if(h.age>=h.life){
        scene.remove(h.mesh);scene.remove(h.light);
        h.mesh.geometry.dispose();h.mesh.material.dispose();
        this.hazards.splice(i,1);
        continue;
      }
      const fadeIn=Math.min(1,h.age/.5);
      const fadeOut=h.age>h.life-1?1-(h.age-(h.life-1)):1;
      h.mesh.material.uniforms.uColor.value.multiplyScalar(fadeIn*fadeOut/.9+.1);
      h.dmgCD-=dt;
      const radius=h.type==='void'?3:2.5;
      const dx=G.player.x-h.x,dz=G.player.z-h.z;
      if(Math.hypot(dx,dz)<radius&&h.dmgCD<=0&&!G.shieldActive&&!G.shadowForm){
        h.dmgCD=.8;
        const baseDmg=h.type==='fire'?8:h.type==='ice'?5:h.type==='void'?12:6;
        damagePlayer(baseDmg*(1+G.wave*.05));
        if(h.type==='fire')spawnParticle(G.player.x,.5,G.player.z,new THREE.Color('#ff5a2a'),{vy:2,life:.5,size:.2});
        if(h.type==='ice'){G.buffs._iceSlow=1.5;}
      }
      if(Math.random()<dt*(h.type==='fire'?3:1)){
        const col=h.type==='fire'?'#ff7a2a':h.type==='ice'?'#4adaff':h.type==='void'?'#7a4adf':'#4aff7a';
        spawnParticle(h.x+(Math.random()-.5)*radius*2,.1,h.z+(Math.random()-.5)*radius*2,new THREE.Color(col),
          {vy:h.type==='fire'?3:1,life:.6+Math.random()*.4,size:.1,grav:h.type==='fire'?-1:2,shrink:.96});
      }
    }
  },
  clear(){
    this.hazards.forEach(h=>{scene.remove(h.mesh);scene.remove(h.light);h.mesh.geometry.dispose();h.mesh.material.dispose();});
    this.hazards=[];
  }
};

/* --- Dynamic Floor Pulse System --- */
const FloorPulse={
  pulses:[],
  createPulse(x,z,color,speed,maxR){
    speed=speed||20;maxR=maxR||30;
    const geo=new THREE.RingGeometry(.2,.6,48);
    const mat=basicMat(color,{transparent:true,opacity:.6,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.rotation.x=-Math.PI/2;mesh.position.set(x,.04,z);
    scene.add(mesh);
    this.pulses.push({mesh,r:0,speed,maxR,x,z});
  },
  update(dt){
    for(let i=this.pulses.length-1;i>=0;i--){
      const p=this.pulses[i];
      p.r+=p.speed*dt;
      const s=p.r/2;

      p.mesh.material.opacity=.6*(1-p.r/p.maxR);
      if(p.r>=p.maxR){
        scene.remove(p.mesh);p.mesh.geometry.dispose();p.mesh.material.dispose();
        this.pulses.splice(i,1);
      }
    }
  },

};

/* --- Afterimage System (ghost copies of player) --- */
const Afterimage={
  images:[],
  create(mesh,color,life){
    if(this.images.length>8||!mesh)return;
    life=life||.4;
    const clone=mesh.clone(true);
    clone.traverse(c=>{
      if(c.isMesh){
        c.material=basicMat(color||'#7a4aff',{transparent:true,opacity:.4,blending:THREE.AdditiveBlending,depthWrite:false});
      }
    });
    clone.position.copy(mesh.position);
    clone.rotation.copy(mesh.rotation);
    scene.add(clone);
    this.images.push({mesh:clone,life,maxLife:life});
  },
  update(dt){
    for(let i=this.images.length-1;i>=0;i--){
      const img=this.images[i];
      img.life-=dt;
      const frac=img.life/img.maxLife;
      img.mesh.traverse(c=>{if(c.isMesh)c.material.opacity=frac*.4;});
      if(img.life<=0){
        scene.remove(img.mesh);
        this.images.splice(i,1);
      }
    }
  },
  clear(){this.images.forEach(i=>scene.remove(i.mesh));this.images=[];}
};

function buildWeather(theme){
  const count=state.settings.reducedParticles?80:220;
  const geo=new THREE.BufferGeometry(); const pos=new Float32Array(count*3); const data=[];
  let color=theme.accent,size=.2,fall=true;
  if(theme.weather==='embers'){color='#ff7a2a';size=.16;}
  else if(theme.weather==='snow'){color='#dfffff';size=.22;}
  else if(theme.weather==='wisps'){color='#9a5aff';size=.26;fall=false;}
  else if(theme.weather==='fragments'){color='#6a3aaa';size=.2;}
  else if(theme.weather==='mist'){color='#cc4a5a';size=.3;fall=false;}
  else if(theme.weather==='stars'){color='#aaccff';size=.18;fall=false;}
  for(let i=0;i<count;i++){ const r=Math.random()*36,a=Math.random()*Math.PI*2; pos[i*3]=Math.cos(a)*r; pos[i*3+1]=Math.random()*22; pos[i*3+2]=Math.sin(a)*r; data.push({sp:.5+Math.random()*1.5,sway:Math.random()*Math.PI*2,fall}); }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const wmat=new THREE.PointsMaterial({color:new THREE.Color(color),size,transparent:true,opacity:.7,sizeAttenuation:true,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(geo,wmat); arenaGroup.add(pts);
  weatherParts.push({points:pts,data,geo,fall,type:theme.weather});
}
function updateArena(dt,t){
  runeRings.forEach(r=>{ r.mesh.material.opacity=.2+Math.sin(t*1.5+r.phase)*.18; r.mesh.rotation.z+=dt*.1; });
  pillarOrbs.forEach(p=>{ const pulse=.7+Math.sin(t*2+p.phase)*.25; p.orb.scale.setScalar(pulse); p.light.intensity=1+Math.sin(t*2+p.phase)*.5; });
  if(altarMesh)altarMesh.children[1].rotation.z+=dt*.3;
  ambientMotes.forEach(m=>{ const arr=m.geo.attributes.position.array; for(let i=0;i<m.data.length;i++){ arr[i*3+1]+=m.data[i].sp*dt; if(arr[i*3+1]>18)arr[i*3+1]=0; } m.geo.attributes.position.needsUpdate=true; });
  weatherParts.forEach(w=>{ const arr=w.geo.attributes.position.array; for(let i=0;i<w.data.length;i++){ const d=w.data[i]; if(w.fall){ arr[i*3+1]-=d.sp*dt*2; arr[i*3]+=Math.sin(t+d.sway)*dt*.5; if(arr[i*3+1]<0)arr[i*3+1]=22; } else { arr[i*3+1]+=Math.sin(t*.5+d.sway)*dt*.6; arr[i*3]+=Math.cos(t*.3+d.sway)*dt*.4; } } w.geo.attributes.position.needsUpdate=true; });
}

/* ============ SPAWNING ============ */
function mobPoolForWave(w){
  const pool=[];
  if(w<=2)pool.push('zombie','skeleton','bat');
  else if(w<=5)pool.push('zombie','skeleton','bat','imp','spider');
  else if(w<=9)pool.push('skeleton','bat','imp','spider','demon','widmo');
  else if(w<=14)pool.push('imp','spider','demon','widmo','banshee','brute');
  else pool.push('demon','widmo','banshee','brute','golem','reaper','smok');
  if(G.mutators.includes('swarm'))pool.push('bat','imp','bat');
  return pool;
}
function spawnMob(type,elite,x,z){
  const def=MOB_TYPES[type];
  if(x==null){ const a=Math.random()*Math.PI*2,r=26+Math.random()*6; x=Math.cos(a)*r; z=Math.sin(a)*r; }
  let hp=def.hp*(1+G.wave*.12); let dmg=def.dmg*(1+G.wave*.05); let speed=def.speed;
  if(G.mutators.includes('armored'))hp*=1.4;
  if(G.mutators.includes('frenzy'))speed*=1.3;
  if(elite){ hp*=2.5; dmg*=1.6; }
  const mesh=buildMobMesh(type,elite); mesh.position.set(x,0,z); scene.add(mesh);
  const mob={type,def,hp,maxHp:hp,dmg,speed,x,z,y:def.fly?2.5:0,mesh,elite,statuses:{},atkCD:Math.random()*1.5,hpBar:makeHpBar(mesh,1.8*def.scale),flyPhase:Math.random()*6,deathT:0,dying:false,ranged:def.ranged};
  G.mobs.push(mob);
}
function makeHpBar(parent,yoff){
  const bg=new THREE.Mesh(new THREE.PlaneGeometry(1.2,.14),basicMat('#1a0808',{transparent:true,opacity:.8}));
  const fill=new THREE.Mesh(new THREE.PlaneGeometry(1.18,.1),basicMat('#ff4a4a'));
  fill.position.z=.01; bg.add(fill); bg.position.y=yoff; bg.visible=false; parent.add(bg);
  return {bg,fill,yoff};
}
function updateHpBar(hb,frac){ if(!hb)return; hb.bg.visible=frac<1&&frac>0; hb.fill.scale.x=Math.max(0,frac); hb.fill.position.x=-(1-Math.max(0,frac))*.59; hb.bg.lookAt(camera.position); }
function startWave(){
  G.wave++; G.waveActive=true; questProgress('wave',G.wave);

  const isBoss=(G.mode==='survival'||G.mode==='endless')&&G.wave%5===0;
  if(isBoss){ spawnBoss(); announce('FALA '+G.wave,'BOSS'); ScreenFX.waveTransition(G.wave,'BOSS'); return; }
  let count=5+G.wave*3; if(G.mutators.includes('horde'))count=Math.round(count*1.5);
  if(G.mode==='endless')count=Math.round(count*(1+G.wave*.04));
  G.waveMobsLeft=count;
  const pool=mobPoolForWave(G.wave);
  let spawned=0;
  const eliteChance=G.mutators.includes('elite')?.18:.06;
  const spawnInterval=setInterval(()=>{ if(!G.running||G.over){ clearInterval(spawnInterval); return; } if(spawned>=count){ clearInterval(spawnInterval); return; } const type=pool[Math.floor(Math.random()*pool.length)]; const elite=Math.random()<eliteChance&&G.wave>=3; spawnMob(type,elite); spawned++; },280);

/* ============ MOVEMENT ============ */
function getMoveInput(){
  let mx=0,mz=0;
  if(MOBILE){ mx=joyDX; mz=joyDY; }
  if(keys['KeyW']||keys['ArrowUp'])mz-=1; if(keys['KeyS']||keys['ArrowDown'])mz+=1; if(keys['KeyA']||keys['ArrowLeft'])mx-=1; if(keys['KeyD']||keys['ArrowRight'])mx+=1;
  const d=Math.hypot(mx,mz); if(d>1){ mx/=d; mz/=d; }
  return {mx,mz,mag:Math.min(1,d)};
}
function updatePlayerMovement(dt){
  const inp=getMoveInput(); const p=G.player;
  // camera-relative movement
  const fwdX=Math.sin(G.camYaw),fwdZ=Math.cos(G.camYaw); // camera forward on XZ
  const rightX=Math.sin(G.camYaw-Math.PI/2),rightZ=Math.cos(G.camYaw-Math.PI/2); // screen-right (fixed handedness)
  // screen forward = away from camera => -fwd? camera looks along (sin yaw forward). We want W to move away from camera.
  let mvX=(inp.mx*rightX + (-inp.mz)*fwdX);
  let mvZ=(inp.mx*rightZ + (-inp.mz)*fwdZ);
  const mlen=Math.hypot(mvX,mvZ);
  let spd=p.speed; if(G.buffs.speed)spd*=1.4;
  // status slows on player? none. apply
  if(mlen>0.01){ mvX/=mlen;mvZ/=mlen; const mag=inp.mag; p.x+=mvX*spd*dt*mag; p.z+=mvZ*spd*dt*mag; p.facing=Math.atan2(mvX,mvZ);
    // movement dust
    if(Math.random()<.4)spawnParticle(p.x,.05,p.z,new THREE.Color(G.theme.accent),{vy:.5,life:.4,size:.12,grav:1,shrink:.95});
  } else if(attackHeld){ // face camera forward when attacking idle
    p.facing=G.camYaw;
  }
  // arena boundary
  const r=Math.hypot(p.x,p.z); if(r>34){ p.x=p.x/r*34; p.z=p.z/r*34; }
  // update mesh
  if(G.playerMesh){ G.playerMesh.position.set(p.x,0,p.z); // smooth rotate
    let cur=G.playerMesh.rotation.y; let diff=((p.facing-cur+Math.PI)%(Math.PI*2))-Math.PI; G.playerMesh.rotation.y=cur+diff*Math.min(1,dt*12);
    // bob when moving
    if(mlen>.01){ G.playerMesh.userData.bobT=(G.playerMesh.userData.bobT||0)+dt*10; if(G.playerMesh.userData.body)G.playerMesh.userData.body.position.y=1.1+Math.abs(Math.sin(G.playerMesh.userData.bobT))*.06; }
    // pulse + spin ground ring
    if(G.playerMesh.userData.groundRing){ const gr=G.playerMesh.userData.groundRing; gr.rotation.z+=dt*1.2; const ps=1+Math.sin(performance.now()*.004)*.08; gr.scale.setScalar(ps); }
  }
  if(playerLight)playerLight.position.set(p.x,3,p.z);
}
function updateCamera(dt){
  const p=G.player; if(!p)return;
  const dist=8,height=4;
  const offX=Math.sin(G.camYaw)*Math.cos(G.camPitch)*dist;
  const offZ=Math.cos(G.camYaw)*Math.cos(G.camPitch)*dist;
  const offY=height+Math.sin(G.camPitch)*dist;
  const tx=p.x - offX, ty=offY, tz=p.z - offZ;
  // smooth follow
  camera.position.x+=(tx-camera.position.x)*Math.min(1,dt*8);
  camera.position.y+=(ty-camera.position.y)*Math.min(1,dt*8);
  camera.position.z+=(tz-camera.position.z)*Math.min(1,dt*8);
  // screen shake
  if(G.screenShake>0){ camera.position.x+=(Math.random()-.5)*G.screenShake; camera.position.y+=(Math.random()-.5)*G.screenShake; G.screenShake*=Math.pow(.001,dt); if(G.screenShake<.02)G.screenShake=0; }

function updateMobs(dt,t){

  }

  const p=G.player;
  if(b.telegraph)b.telegraph.material.opacity=.3+Math.sin(performance.now()*.01)*.25;
  if(b.curPattern==='slam'){ if(b.patternT<.6&&!b.slammed){ b.slammed=true; shake(1); const dd=Math.hypot(p.x-b.slamX,p.z-b.slamZ); if(dd<5.5)damagePlayer(b.dmg*1.5); burst(b.slamX,.5,b.slamZ,new THREE.Color('#ff4a4a'),30,10,{up:true,life:.8}); const ring=new THREE.Mesh(new THREE.RingGeometry(.5,1,32),basicMat('#ff6a4a',{transparent:true,opacity:.8,side:THREE.DoubleSide})); ring.rotation.x=-Math.PI/2; ring.position.set(b.slamX,.2,b.slamZ); scene.add(ring); G.projectiles.push({mesh:ring,isRing:true,life:.6,grow:18,x:b.slamX,z:b.slamZ}); } }
  else if(b.curPattern==='nova'){ if(b.patternT<.5&&!b.novaFired){ b.novaFired=true; shake(.8); const n=20; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2; enemyProjectile(b.x,b.y+2,b.z,b.x+Math.sin(a)*10,b.z+Math.cos(a)*10,b.dmg*.8); } burst(b.x,2,b.z,new THREE.Color('#ff8a2a'),40,12,{up:true,life:1}); } }
  else if(b.curPattern==='volley'){ b.volleyT-=dt; if(b.volleyT<=0&&b.volleyCount<5){ b.volleyT=.3; b.volleyCount++; enemyProjectile(b.x,b.y+2,b.z,p.x,p.z,b.dmg*.7); } }
  else if(b.curPattern==='blink'){ if(!b.blinkDone&&b.patternT<.3){ b.blinkDone=true; burst(b.x,2,b.z,new THREE.Color(b.def.color),20,6,{up:true,life:.6}); const a=Math.random()*Math.PI*2; b.x=p.x+Math.cos(a)*6; b.z=p.z+Math.sin(a)*6; b.mesh.position.set(b.x,b.y,b.z); burst(b.x,2,b.z,new THREE.Color(b.def.color),20,6,{up:true,life:.6}); } }
}
function updateProjectiles(dt){
  for(let i=G.projectiles.length-1;i>=0;i--){ const pr=G.projectiles[i]; pr.life-=dt;
    if(pr.isSlash){ pr.mesh.material.opacity=Math.max(0,pr.life/.22*.8); if(pr.life<=0){ scene.remove(pr.mesh); G.projectiles.splice(i,1); } continue; }
    if(pr.isRing){ const s=1+(1-pr.life/.8)*pr.grow*.06; pr.mesh.scale.setScalar(s); pr.mesh.material.opacity=Math.max(0,pr.life); if(pr.life<=0){ scene.remove(pr.mesh); G.projectiles.splice(i,1); } continue; }
    if(pr.isSpike){ pr.mesh.material.opacity=Math.max(0,pr.life/.5*.85); pr.mesh.position.y=2.5*(1-pr.life/.5); if(pr.life<=0){ scene.remove(pr.mesh); G.projectiles.splice(i,1); } continue; }
    // moving projectile
    pr.x+=pr.vx*dt; pr.z+=pr.vz*dt; pr.mesh.position.set(pr.x,pr.y||1.4,pr.z); pr.mesh.rotation.x+=dt*8; pr.mesh.rotation.y+=dt*6;
    // trail
    pr.trailT=(pr.trailT||0)+dt; if(pr.trailT>.04){ pr.trailT=0; const tc=pr.fromPlayer?new THREE.Color(CLAN_FX[pr.clan]?CLAN_FX[pr.clan].trail:'#fff'):new THREE.Color('#ff6a4a'); spawnParticle(pr.x,pr.y||1.4,pr.z,tc,{life:.3,size:pr.radius*.5,shrink:.9}); }
    let hit=false;
    if(pr.fromPlayer){ for(const m of G.mobs){ if(m.dying)continue; if(Math.hypot(m.x-pr.x,m.z-pr.z)<(pr.radius+.6)){ damageMob(m,pr.dmg); if(pr.status)applyStatus(m,pr.status); if(pr.pierce>0){pr.pierce--;}else{hit=true;} break; } } if(!hit&&G.boss&&!G.boss.dying&&Math.hypot(G.boss.x-pr.x,G.boss.z-pr.z)<(pr.radius+2)){ damageBoss(G.boss,pr.dmg); if(pr.status)applyStatus(G.boss,pr.status); hit=true; } }
    else { if(G.player&&Math.hypot(G.player.x-pr.x,G.player.z-pr.z)<(pr.radius+.7)){ damagePlayer(pr.dmg); hit=true; } }
    if(hit||pr.life<=0||Math.hypot(pr.x,pr.z)>40){ burst(pr.x,pr.y||1.4,pr.z,pr.mesh.material.color,6,4,{life:.3}); scene.remove(pr.mesh); G.projectiles.splice(i,1); }
  }
}
function updateShadows(dt){
  for(let i=G.shadows.length-1;i>=0;i--){ const sh=G.shadows[i]; sh.life-=dt;
    // find nearest mob
    let best=null,bd=999; G.mobs.forEach(m=>{ if(m.dying)return; const d=Math.hypot(m.x-sh.x,m.z-sh.z); if(d<bd){bd=d;best=m;} }); if(!best&&G.boss&&!G.boss.dying){ best=G.boss; bd=Math.hypot(G.boss.x-sh.x,G.boss.z-sh.z); }
    if(best){ const dx=best.x-sh.x,dz=best.z-sh.z,d=Math.hypot(dx,dz)||1; if(d>1.8){ sh.x+=dx/d*sh.speed*dt; sh.z+=dz/d*sh.speed*dt; } sh.mesh.rotation.y=Math.atan2(dx,dz); sh.atkCD-=dt; if(sh.atkCD<=0&&d<2.5){ sh.atkCD=1; if(best===G.boss)damageBoss(best,sh.dmg); else damageMob(best,sh.dmg); burst(best.x,1,best.z,new THREE.Color('#7a4aff'),4,3,{life:.3}); } }
    else { const dx=G.player.x-sh.x,dz=G.player.z-sh.z,d=Math.hypot(dx,dz)||1; if(d>2){ sh.x+=dx/d*sh.speed*dt; sh.z+=dz/d*sh.speed*dt; } }
    sh.mesh.position.set(sh.x,Math.sin(performance.now()*.003+i)*.1,sh.z);
    if(sh.life<=0){ burst(sh.x,.8,sh.z,new THREE.Color('#3a2a5a'),8,4,{life:.5}); scene.remove(sh.mesh); G.shadows.splice(i,1); }
  }
}
function updatePowerups(dt,t){
  for(let i=G.powerups.length-1;i>=0;i--){ const pu=G.powerups[i]; pu.bob+=dt; pu.mesh.position.y=1+Math.sin(pu.bob*3)*.2; pu.mesh.rotation.y+=dt*2;
    let range=2; if(G.buffs.magnet)range=8; range*=(1+state.upgrades.magnet*UPGRADES.magnet.effect);
    const d=Math.hypot(G.player.x-pu.x,G.player.z-pu.z);
    if(d<range&&d>1.2){ pu.x+=(G.player.x-pu.x)*dt*4; pu.z+=(G.player.z-pu.z)*dt*4; pu.mesh.position.x=pu.x; pu.mesh.position.z=pu.z; }
    if(d<1.2){ grabPowerup(pu); scene.remove(pu.mesh); G.powerups.splice(i,1); }
  }
}
function damagePlayer(dmg){
  if(!G.player||G.over)return;
  if(G.shieldActive){ burst(G.player.x,1.4,G.player.z,new THREE.Color(RARITIES[G.char.rarity].color),8,4,{life:.3}); return; }
  if(G.shadowForm)return;
  dmg=Math.round(dmg); G.player.hp-=dmg; hitFlash(); Audio2.sfx.hurt(); shake(.3);
  // thorns
  if(state.talents.thorns>0){ const refl=dmg*state.talents.thorns*TALENTS.thorns.per; G.mobs.forEach(m=>{ if(!m.dying&&Math.hypot(m.x-G.player.x,m.z-G.player.z)<3)damageMob(m,refl); }); }
  if(G.player.hp<=0){ G.player.hp=0; if(G.char.ghostMechanic&&!G.usedGhost){ G.usedGhost=true; G.player.hp=G.player.maxHp*.5; G.shadowForm=true; G.shadowFormTime=2; $('shadow-overlay').style.opacity='1'; announce('GHOST','Powstajesz z cienia'); }
    else gameOver(); }
}
/* ============ MAIN LOOP ============ */
let lastT=performance.now();
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  let dt=(now-lastT)/1000; lastT=now; if(dt>.05)dt=.05;
  if(G&&G.running&&!G.paused&&!G.over){
    G.time+=dt; state.stats.timePlayed+=dt;
    if(G.mode==='timeattack'){ G.timeAttackLeft-=dt; if(G.timeAttackLeft<=0){ gameOver(true); } }
    // player
    if(G.player){
      updatePlayerMovement(dt);
      G.player.atkCD-=dt; if(attackHeld)playerAttack();
      // cooldowns
      if(G.superCD>0)G.superCD-=dt; if(G.shieldCD>0)G.shieldCD-=dt; if(G.summonCD>0)G.summonCD-=dt;
      // shield
      if(G.shieldActive){ G.shieldTime-=dt; if(G.shieldMesh){ G.shieldMesh.rotation.y+=dt*2; G.shieldMesh.material.opacity=.2+Math.sin(G.time*8)*.08; if(Math.random()<.3)spawnParticle(G.player.x+(Math.random()-.5)*3,1.2+Math.random()*1,G.player.z+(Math.random()-.5)*3,new THREE.Color(RARITIES[G.char.rarity].color),{life:.4,size:.1}); } if(G.shieldTime<=0){ G.shieldActive=false; if(G.shieldMesh){G.playerMesh.remove(G.shieldMesh);G.shieldMesh=null;} } }
      // shadow form
      if(G.shadowForm){ G.shadowFormTime-=dt; if(Math.random()<.5)spawnParticle(G.player.x+(Math.random()-.5),1+Math.random(),G.player.z+(Math.random()-.5),new THREE.Color('#7a4aff'),{life:.5,size:.14,vy:1}); if(G.shadowFormTime<=0){ G.shadowForm=false; $('shadow-overlay').style.opacity='0'; if(G.playerMesh)G.playerMesh.children.forEach(ch=>{ if(ch.material&&ch.material.opacity!==undefined&&ch.material.opacity<1&&!G.char.faceless){ch.material.opacity=1;} }); } }
      // buffs
      for(const bk in G.buffs){ G.buffs[bk]-=dt; if(G.buffs[bk]<=0)delete G.buffs[bk]; }
      // player mesh anim
      if(G.playerMesh){ const ud=G.playerMesh.userData; if(ud.aura){ud.aura.rotation.z+=dt;ud.aura.material.opacity=.5+Math.sin(G.time*3)*.2;} if(ud.glow)ud.glow.intensity=1.2+Math.sin(G.time*4)*.3; if(ud.swingT>0){ ud.swingT-=dt; if(ud.weapon)ud.weapon.rotation.x=-Math.sin(ud.swingT/.25*Math.PI)*1.5; } else if(ud.weapon){ud.weapon.rotation.x*=.8;} if(ud.orbiters){ud.orbiters.forEach((ob,oi)=>{ const a=G.time*3+oi*Math.PI; ob.position.set(Math.cos(a)*.9,1.4,Math.sin(a)*.9); });} if(ud.staffOrb){ud.staffOrb.scale.multiplyScalar(.92); if(ud.staffOrb.scale.x<.22)ud.staffOrb.scale.setScalar(.22);} if(ud.shadowTrail&&Math.random()<.3)spawnParticle(G.player.x+(Math.random()-.5),.8+Math.random(),G.player.z+(Math.random()-.5),new THREE.Color('#6a3a9a'),{life:.4,size:.12}); if(ud.faceGlow)ud.faceGlow.material.opacity=.6+Math.sin(G.time*5)*.3; }
    }
    // combo timer
    if(G.comboTimer>0){ G.comboTimer-=dt; if(G.comboTimer<=0)G.combo=0; }
    updateMobs(dt,G.time); updateBoss(dt,G.time); updateProjectiles(dt); updateShadows(dt); updatePowerups(dt,G.time);
    updateCamera(dt); updateArena(dt,G.time); updateParticles(dt);
    TrailSystem.update(dt); EnvHazards.update(dt); FloorPulse.update(dt); Afterimage.update(dt);
    // afterimage when sprinting or in shadow form
    if(G.playerMesh&&(G.shadowForm||(getMoveInput().mag>.8))){
      G._afterimageCD=(G._afterimageCD||0)-dt;
      if(G._afterimageCD<=0){G._afterimageCD=G.shadowForm?.08:.15;Afterimage.create(G.playerMesh,G.shadowForm?'#7a4aff':CLANS[G.char.clan].baseColor,.35);}
    }
    // spawn environmental hazards on higher waves
    if(G.wave>=8){
      G._hazardCD=(G._hazardCD||5)-dt;
      if(G._hazardCD<=0){
        G._hazardCD=12-Math.min(6,G.wave*.3);
        if(EnvHazards.hazards.length<4){
          const types=['fire','ice','void'];
          const ht=types[Math.floor(Math.random()*types.length)];
          const a=Math.random()*Math.PI*2,r=5+Math.random()*20;
          EnvHazards.spawnHazard(ht,Math.cos(a)*r,Math.sin(a)*r);
          ScreenFX.envWarning('⚠️ Strefa zagrożenia!');
        }
      }
    }
    // low HP overlay
    if(G.player)ScreenFX.lowHpUpdate(G.player.hp/G.player.maxHp);
    // HP bar animations
    if(G.player){
      const hpFrac=G.player.hp/G.player.maxHp;
      const hpFill=$('hp-fill');
      if(hpFrac<.15){hpFill.classList.add('crit');hpFill.classList.remove('low');}
      else if(hpFrac<.35){hpFill.classList.add('low');hpFill.classList.remove('crit');}
      else{hpFill.classList.remove('low','crit');}
    }
    // wave management
    manageWaves(dt);
    updateHUD();
  } else { updateParticles(dt); if(arenaGroup)updateArena(dt,now/1000); }
  if(G&&G.player)renderer.render(scene,camera);
  else renderer.render(scene,camera);
}
function manageWaves(dt){
  if(G.mode==='timeattack'){ if(G.mobs.length<8+Math.floor(G.time/10)){ const pool=mobPoolForWave(1+Math.floor(G.time/20)); spawnMob(pool[Math.floor(Math.random()*pool.length)],Math.random()<.1); } if(!G.waveStarted){ G.waveStarted=true; G.wave=1; } return; }
  if(G.bossActive){ if(!G.boss){ G.bossActive=false; G.waveActive=false; G.wavePause=2.5; } return; }
  if(G.waveActive){ const alive=G.mobs.filter(m=>!m.dying).length; if(alive===0&&G.waveMobsLeft<=0){ G.waveActive=false; G.wavePause=2.5; if(G.mode==='bossrush'){ G.wavePause=1.5; } waveClearEffect(); } }
  else { G.wavePause-=dt; if(G.wavePause<=0){ if(G.mode==='timeattack')return; startWave(); } }
}
function updateHUD(){
  $('hud-wave').textContent=G.mode==='timeattack'?Math.ceil(G.timeAttackLeft)+'s':G.wave;
  $('hud-kills').textContent=G.kills;
  if(G.player){ const frac=G.player.hp/G.player.maxHp; $('hp-fill').style.width=Math.max(0,frac*100)+'%'; $('hp-txt').textContent=Math.ceil(G.player.hp)+'/'+G.player.maxHp; }
  // cooldown overlays
  updateCD('super',G.superCD,G.char.superCD);
  updateCD('shield',G.shieldCD,G.char.shieldDur+8);
  updateCD('summon',G.summonCD,18);
}
function updateCD(name,cd,max){ const el=$('cd-'+name); if(!el)return; if(cd>0){ el.style.display='flex'; el.textContent=Math.ceil(cd); } else el.style.display='none'; }
/* ============ START / OVER ============ */
window.ACstartGame=function(){
  Audio2.init(); Audio2.setMusicVol(state.settings.musicVol); Audio2.setSfxVol(state.settings.sfxVol);
  // cleanup old
  if(G){ cleanupGame(); }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('hud').classList.add('active'); $('vignette').classList.add('active');
  if(MOBILE){ $('joystick').classList.add('show'); $('abil-stack').classList.add('show'); }
  G=newGame();
  // rebuild scene fresh
  buildArena(G.theme);
  // remove old lights
  [ambientLight,hemiLight,keyLight,fillLight,rimLight].forEach(l=>{if(l)scene.remove(l);});
  setupLighting(G.theme);
  if(playerLight){scene.remove(playerLight);playerLight=null;}
  spawnPlayer();
  camera.position.set(0,8,12);
  G.running=true; G.wavePause=1.5;
  state.stats.gamesPlayed++; questProgress('games',1); saveState();
  Audio2.startMusic(G.theme);
  announce('ARENA CIENI',GAME_MODES[G.mode].name);
};
function cleanupGame(){
  if(!G)return;
  G.mobs.forEach(m=>scene.remove(m.mesh));
  G.projectiles.forEach(pr=>scene.remove(pr.mesh));
  G.shadows.forEach(s=>scene.remove(s.mesh));
  G.powerups.forEach(p=>scene.remove(p.mesh));
  if(G.boss)scene.remove(G.boss.mesh);
  if(G.playerMesh)scene.remove(G.playerMesh);
  particlePool.forEach(p=>{p.active=false;p.mesh.visible=false;});
  TrailSystem.clear(); EnvHazards.clear(); FloorPulse.clear(); Afterimage.clear();
  $('boss-wrap').classList.remove('show');
  $('lowHpOverlay').style.opacity='0';
  G=null;
}
function gameOver(win){
  if(G.over)return; G.over=true; G.running=false;
  Audio2.stopMusic();
  if(document.pointerLockElement)document.exitPointerLock();
  // record
  state.totalKills=state.totalKills; if(G.wave>state.highWave)state.highWave=G.wave;
  if(G.kills>(state.modeRecords[G.mode]||0))state.modeRecords[G.mode]=G.kills;
  const coinsEarned=G.kills*3+G.wave*20; addCoins(coinsEarned); addXP(G.kills+G.wave*8);
  saveState();
  $('hud').classList.remove('active'); $('vignette').classList.remove('active'); $('shadow-overlay').style.opacity='0';
  $('joystick').classList.remove('show'); $('abil-stack').classList.remove('show');
  $('go-title').textContent=win?'Zwycięstwo!':'Pokonany';
  $('go-stats').innerHTML=`<div class="go-stat"><span>🌊 Fala</span><b>${G.wave}</b></div>
  <div class="go-stat"><span>💀 Zabójstwa</span><b>${G.kills}</b></div>
  <div class="go-stat"><span>🔥 Najlepsze combo</span><b>${state.stats.bestCombo}</b></div>
  <div class="go-stat"><span>🪙 Zarobione</span><b>+${coinsEarned}</b></div>
  <div class="go-stat"><span>⭐ XP</span><b>+${G.kills+G.wave*8}</b></div>`;
  setTimeout(()=>{ cleanupGame(); document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $('scr-gameover').classList.add('active'); refreshMenu(); },300);
}
window.ACpauseGame=function(){ if(!G||!G.running)return; G.paused=!G.paused; if(G.paused){ if(document.pointerLockElement)document.exitPointerLock(); $('modal-pause-body').innerHTML=`<div style="font-family:Cinzel,serif;font-size:24px;color:#d9b8ff;margin-bottom:14px">⏸ Pauza</div>
  <button class="btn primary small" style="width:100%" onclick="ACresume()">▶️ Wznów</button>
  <button class="btn ghost small" style="width:100%" onclick="ACtoggleFullscreen()">⛶ Pełny ekran</button>
  <button class="btn danger small" style="width:100%" onclick="ACquitGame()">🏠 Wyjdź do menu</button>`; openModal('pause'); } else { ACcloseModal('pause'); } };
window.ACresume=function(){ G.paused=false; ACcloseModal('pause'); };
window.ACquitGame=function(){ ACcloseModal('pause'); if(G){G.over=true;G.running=false;} Audio2.stopMusic(); cleanupGame(); $('hud').classList.remove('active'); $('vignette').classList.remove('active'); $('joystick').classList.remove('show'); $('abil-stack').classList.remove('show'); ACshow('menu'); };
/* ============ INIT ============ */
function init(){
  setupControls();
  refreshMenu();
  Audio2.setMusicVol(state.settings.musicVol); Audio2.setSfxVol(state.settings.sfxVol);
  // idle menu scene: build a showcase arena
  buildArena(ARENA_THEMES.shadow); setupLighting(ARENA_THEMES.shadow);
  camera.position.set(0,14,22); camera.lookAt(0,3,0);
  $('loading').style.display='none';
  lastT=performance.now(); requestAnimationFrame(gameLoop);
  // slow rotate menu cam
  let mt=0; setInterval(()=>{ if(!G||!G.running){ mt+=.005; camera.position.x=Math.sin(mt)*22; camera.position.z=Math.cos(mt)*22; camera.position.y=14; camera.lookAt(0,3,0); } },16);
}
init();
})();
</script>
