<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Arena Cieni</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c-common:#8a8a8a;--c-rare:#4a9eff;--c-epic:#b44aff;--c-mythic:#ff4a8a;--c-legendary:#ffaa00;--c-ultimate:#ff4444;--c-unknown:#00ffaa;--c-secret:#ff00ff}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;color:#e8e8ff;font-family:'Orbitron',sans-serif;user-select:none}
#app{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex}
canvas{display:block}
#gl{position:fixed;inset:0;z-index:1}
.title-font{font-family:'Cinzel',serif}
#menu{background:linear-gradient(135deg,#0a0a18,#1a0a2a,#0a0a18);background-size:400% 400%;animation:bgshift 18s ease infinite;align-items:center;justify-content:center;text-align:center}
@keyframes bgshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.menu-title{font-family:'Cinzel',serif;font-size:clamp(40px,11vw,100px);font-weight:900;color:#c44aff;text-shadow:0 0 30px #b44aff,0 0 60px #6a2a9a;letter-spacing:6px;animation:titlepulse 3s ease-in-out infinite}
@keyframes titlepulse{0%,100%{text-shadow:0 0 30px #b44aff,0 0 60px #6a2a9a;transform:scale(1)}50%{text-shadow:0 0 50px #d44aff,0 0 90px #8a3aba;transform:scale(1.03)}}
.menu-sub{color:#8a7aaa;letter-spacing:4px;margin-top:8px;font-size:clamp(12px,3vw,18px)}
.menu-btns{margin-top:48px;display:flex;flex-direction:column;gap:18px;width:min(320px,80vw)}
.btn{background:linear-gradient(135deg,#2a1a4a,#3a1a5a);border:2px solid #6a3a9a;color:#e8e8ff;padding:16px 24px;border-radius:12px;font-family:'Orbitron';font-weight:700;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(120,60,200,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(160,80,255,.5);border-color:#a44aff}
.btn:active{transform:translateY(0)}
.btn.small{padding:10px 16px;font-size:14px}
.btn.green{background:linear-gradient(135deg,#1a4a2a,#1a5a3a);border-color:#3a9a5a}
.btn.gold{background:linear-gradient(135deg,#4a3a1a,#5a4a1a);border-color:#9a8a3a}
.btn.red{background:linear-gradient(135deg,#4a1a1a,#5a1a1a);border-color:#9a3a3a}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.6)}
.hdr{display:flex;align-items:center;padding:14px 18px;gap:14px;background:rgba(10,10,24,.85);border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10;backdrop-filter:blur(6px)}
.hdr h2{font-family:'Cinzel';font-size:clamp(20px,5vw,32px);color:#c44aff;flex:1;text-shadow:0 0 12px #8a3aba}
.curr{display:flex;gap:12px}
.pill{background:#13132a;border:1px solid #2a2a4a;border-radius:20px;padding:6px 14px;font-weight:700;font-size:14px}
.pill.coin{color:#ffcc44;border-color:#5a4a1a}
.pill.gem{color:#44ddff;border-color:#1a4a5a}
.filters{display:flex;flex-wrap:wrap;gap:6px;padding:12px 18px}
.fbtn{background:#13132a;border:1px solid #2a2a4a;color:#aaa;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:'Orbitron'}
.fbtn.active{background:#3a2a5a;color:#fff;border-color:#7a4aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:18px}
.card{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.card.locked{filter:grayscale(1) brightness(.4)}
.card .emoji{font-size:40px;margin-bottom:6px}
.card .cname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .crar{font-size:9px;letter-spacing:1px;margin-top:3px;text-transform:uppercase}
.card .dupe{position:absolute;top:4px;right:4px;background:#000a;border-radius:8px;padding:1px 6px;font-size:10px;color:#ffcc44}
.card.rar-legendary,.card.rar-ultimate,.card.rar-unknown,.card.rar-secret{animation:cardglow 2s ease-in-out infinite}
@keyframes cardglow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor}}
.modal{position:fixed;inset:0;z-index:100;background:rgba(5,5,12,.88);display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal.active{display:flex}
.mbox{background:#13132a;border:2px solid #4a3a6a;border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.mclose{position:absolute;top:10px;right:14px;font-size:26px;color:#888;cursor:pointer;line-height:1}
.mavatar{font-size:70px;text-align:center}
.mname{font-family:'Cinzel';font-size:26px;text-align:center;margin:6px 0}
.mrar{text-align:center;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.mstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;padding:8px 12px;font-size:13px}
.stat b{color:#c44aff}
.minfo{background:#0a0a1a;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.5}
.minfo .lbl{color:#c44aff;font-weight:700}
.mbtns{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.styles{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.stylebtn{background:#0a0a1a;border:2px solid #2a2a4a;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-family:'Orbitron';color:#ccc;flex:1;min-width:90px}
.stylebtn.active{border-color:#a44aff;background:#2a1a4a;color:#fff}
.stylebtn small{display:block;color:#888;font-size:9px;margin-top:3px}
.shadowgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;max-height:50vh;overflow-y:auto;padding:4px}
.scard{background:#0a0a1a;border:2px solid #2a2a4a;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px}
.scard.sel{border-color:#a44aff;background:#2a1a4a}
.scard .se{font-size:26px}
.scard .st{font-size:8px;color:#888;text-transform:uppercase}
.tabs{display:flex;gap:8px;padding:12px 18px}
.tab{flex:1;background:#13132a;border:1px solid #2a2a4a;color:#aaa;padding:10px;border-radius:8px;cursor:pointer;font-family:'Orbitron';font-weight:700;font-size:13px}
.tab.active{background:#3a2a5a;color:#fff;border-color:#7a4aaa}
.shopgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:18px}
.cratecard{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:18px;text-align:center}
.cratecard .ce{font-size:54px}
.cratecard h3{margin:8px 0;font-size:18px;font-family:'Cinzel'}
.cratecard p{font-size:11px;color:#999;margin-bottom:10px;line-height:1.4}
.cratecard .cbtns{display:flex;gap:8px}
.cratecard .cbtns .btn{flex:1}
.upcard{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:16px}
.upcard h3{font-size:16px;font-family:'Cinzel';margin-bottom:4px}
.upcard p{font-size:11px;color:#999;margin-bottom:8px}
.upcard .lvl{color:#c44aff;font-weight:700;margin-bottom:8px;font-size:13px}
.mscard{background:#13132a;border:1px solid #2a2a4a;border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px;margin:8px 18px}
.mscard.done{border-color:#3a9a5a;opacity:.7}
.mscard .mse{font-size:30px}
.mscard .msinfo{flex:1}
.mscard .msinfo b{font-size:14px}
.mscard .msinfo p{font-size:11px;color:#999}
.mscard .msrew{color:#ffcc44;font-size:12px;font-weight:700;text-align:right}
#crateOverlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#crateOverlay.active{display:flex}
#crateReveal{text-align:center;opacity:0;transition:opacity .4s}
#crateReveal.show{opacity:1;animation:revealpop .5s ease}
@keyframes revealpop{0%{transform:scale(.3)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
#crateReveal .re{font-size:90px;filter:drop-shadow(0 0 30px currentColor)}
#crateReveal .rn{font-family:'Cinzel';font-size:34px;margin:8px}
#crateReveal .rr{font-size:18px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
#crateReveal .rnew{font-size:22px;color:#ffcc44;margin-top:8px;font-weight:900;animation:titlepulse 1s infinite}
#crateNext{margin-top:30px;display:none}
#crateNext.show{display:block}
#crateCounter{position:absolute;top:20px;color:#888;font-size:14px}
#hud{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#hud.active{display:block}
#crosshair{position:absolute;top:50%;left:50%;width:22px;height:22px;transform:translate(-50%,-50%)}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff8;box-shadow:0 0 4px #000}
#crosshair::before{left:50%;top:0;width:2px;height:22px;transform:translateX(-50%)}
#crosshair::after{top:50%;left:0;height:2px;width:22px;transform:translateY(-50%)}
#hudTop{position:absolute;top:14px;left:14px;display:flex;gap:14px}
#hudKills{position:absolute;top:14px;right:14px}
.hudpill{background:#000a;border:1px solid #4a3a6a;border-radius:18px;padding:6px 16px;font-weight:700;font-size:15px}
#hpWrap{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:min(380px,80vw);height:22px;background:#000a;border:2px solid #4a3a6a;border-radius:12px;overflow:hidden}
#hpFill{height:100%;width:100%;background:linear-gradient(90deg,#ff3a5a,#ff7a3a);transition:width .25s;border-radius:10px}
#hpText{position:absolute;inset:0;text-align:center;font-size:13px;font-weight:700;line-height:22px;text-shadow:0 0 3px #000}
#abilities{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
.ability{width:58px;height:58px;background:#000a;border:2px solid #4a3a6a;border-radius:10px;position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.ability .key{position:absolute;top:2px;left:4px;font-size:9px;color:#aaa}
.ability .cd{position:absolute;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#ff8a4a}
#bossBar{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:min(600px,90vw);display:none}
#bossBar.active{display:block}
#bossBar .bn{text-align:center;font-family:'Cinzel';color:#ff5a5a;text-shadow:0 0 10px #ff0000;font-size:18px;margin-bottom:4px}
#bossBarBg{height:18px;background:#000a;border:2px solid #6a2a2a;border-radius:10px;overflow:hidden}
#bossBarFill{height:100%;width:100%;background:linear-gradient(90deg,#ff2a2a,#ff7a2a);transition:width .2s}
#waveAnno{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel';font-size:56px;color:#c44aff;text-shadow:0 0 30px #8a3aba;opacity:0;pointer-events:none;text-align:center}
#waveAnno.show{animation:waveanim 2.2s ease}
@keyframes waveanim{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
#bossAnno{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel';font-size:48px;color:#ff3a3a;text-shadow:0 0 30px #ff0000;opacity:0;pointer-events:none;text-align:center}
#bossAnno.show{animation:waveanim 2.6s ease}
#vignette{position:fixed;inset:0;z-index:48;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(20,0,40,.55) 100%);display:none}
#vignette.active{display:block}
#shadowOverlay{position:fixed;inset:0;z-index:49;pointer-events:none;background:radial-gradient(ellipse at center,rgba(80,20,160,.15) 0%,rgba(60,10,140,.45) 100%);opacity:0;transition:opacity .3s}
#flash{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;background:#fff}
#hitInd{position:fixed;inset:0;z-index:47;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,.6) 100%)}
.dmgnum{position:fixed;z-index:55;pointer-events:none;font-weight:900;font-size:18px;text-shadow:0 0 4px #000;animation:dmgfloat 1s ease forwards}
@keyframes dmgfloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.4)}}
#pauseMenu{position:fixed;inset:0;z-index:120;background:rgba(5,5,12,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#pauseMenu.active{display:flex}
#pauseMenu h2{font-family:'Cinzel';font-size:40px;color:#c44aff}
#gameOver{position:fixed;inset:0;z-index:120;background:rgba(20,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#gameOver.active{display:flex}
#gameOver h2{font-family:'Cinzel';font-size:54px;color:#ff3a3a;text-shadow:0 0 30px #ff0000}
.gostats{font-size:16px;color:#ccc;text-align:center;line-height:1.8}
.slider{width:240px}
.setrow{display:flex;align-items:center;gap:12px;margin:14px 0;justify-content:space-between}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2a1a4a;border:1px solid #6a4a9a;border-radius:10px;padding:12px 24px;z-index:300;font-size:14px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.back{cursor:pointer;font-size:24px;color:#888;padding:0 8px}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}.menu-btns{width:80vw}}
</style>
</head>
<body>
<div id="app">
<canvas id="gl"></canvas>
<div id="menu" class="screen active">
<div class="menu-title title-font">Arena Cieni</div>
<div class="menu-sub">SHADOW ARENA</div>
<div class="menu-btns">
<button class="btn green" onclick="goPlay()">⚔️ GRAJ</button>
<button class="btn" onclick="showScreen('collection');renderCollection()">📜 KOLEKCJA</button>
<button class="btn gold" onclick="showScreen('shop');renderShop()">🛒 SKLEP</button>
<button class="btn" onclick="openSettings()">⚙️ USTAWIENIA</button>
</div>
</div>
<div id="collection" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Kolekcja</h2>
<div class="curr"><span class="pill coin" id="colCoin">0</span><span class="pill gem" id="colGem">0</span></div></div>
<div class="filters" id="filters"></div>
<div class="grid" id="charGrid"></div>
</div>
<div id="shop" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Sklep</h2>
<div class="curr"><span class="pill coin" id="shopCoin">0</span><span class="pill gem" id="shopGem">0</span></div></div>
<div class="tabs"><div class="tab active" data-tab="crates" onclick="shopTab('crates')">Skrzynki</div><div class="tab" data-tab="upgrades" onclick="shopTab('upgrades')">Ulepszenia</div><div class="tab" data-tab="milestones" onclick="shopTab('milestones')">Kamienie Milowe</div></div>
<div id="shopContent"></div>
</div>
<div id="charSelect" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Wybierz Bohatera</h2></div>
<div class="grid" id="selectGrid"></div>
</div>
<div id="hud">
<div id="crosshair"></div>
<div id="hudTop"><span class="hudpill" id="hudWave">FALA 1</span><span class="hudpill coin" id="hudCoin" style="color:#ffcc44">💰 0</span></div>
<div id="hudKills"><span class="hudpill" id="hudKillN">☠ 0</span></div>
<div id="bossBar"><div class="bn" id="bossName"></div><div id="bossBarBg"><div id="bossBarFill"></div></div></div>
<div id="hpWrap"><div id="hpFill"></div><div id="hpText"></div></div>
<div id="abilities">
<div class="ability"><span class="key">LPM</span>⚔️<div class="cd" style="display:none"></div></div>
<div class="ability" id="abQ"><span class="key">Q</span>💥<div class="cd" style="display:none"></div></div>
<div class="ability" id="abE"><span class="key">E</span>🛡️<div class="cd" style="display:none"></div></div>
<div class="ability" id="abR"><span class="key">R</span>👤<div class="cd" style="display:none"></div></div>
</div>
<div id="waveAnno"></div><div id="bossAnno"></div>
</div>
<div id="vignette"></div><div id="shadowOverlay"></div><div id="flash"></div><div id="hitInd"></div>
<div id="pauseMenu"><h2 class="title-font">PAUZA</h2><button class="btn green" onclick="resumeGame()">Wznów</button><button class="btn red" onclick="quitGame()">Wyjdź do Menu</button></div>
<div id="gameOver"><h2 class="title-font">KONIEC GRY</h2><div class="gostats" id="goStats"></div><button class="btn green" onclick="quitGame()">Menu Główne</button></div>
<div id="crateOverlay"><div id="crateCounter"></div><div id="crateReveal"></div><button class="btn green" id="crateNext" onclick="crateNextOrClose()">Dalej</button></div>
<div id="charModal" class="modal"><div class="mbox" id="charModalBox"></div></div>
<div id="shadowModal" class="modal"><div class="mbox" id="shadowModalBox"></div></div>
<div id="settingsModal" class="modal"><div class="mbox" id="settingsBox"></div></div>
<div class="toast" id="toast"></div>
</div>

function rollRarity(crateType){const ct=CRATE_TYPES.find(c=>c.id===crateType);const mod=ct.mod||{};let total=0;const weights={};
Object.keys(RARITIES).forEach(r=>{const w=RARITIES[r].dropRate*(mod[r]||1);weights[r]=w;total+=w});
let roll=Math.random()*total;for(const r of Object.keys(weights)){roll-=weights[r];if(roll<=0)return r}return 'common'}
function rollCharacter(crateType){const rar=rollRarity(crateType);let pool=CHARS.filter(c=>c.rarity===rar);if(!pool.length)pool=CHARS.filter(c=>c.rarity==='common');return pool[Math.floor(Math.random()*pool.length)]}

let crateQueue=[],crateActive=false,origQ=1;
function openCrate(crateType){const ct=CRATE_TYPES.find(c=>c.id===crateType);if(state[ct.curr]<ct.cost){toast('Za mało '+(ct.curr==='coins'?'monet':'kamieni')+'!');return}
state[ct.curr]-=ct.cost;const ch={...rollCharacter(crateType)};applyCharResult(ch);crateQueue=[ch];origQ=1;saveState();startCrateAnim()}
function openCrate10(crateType){const ct=CRATE_TYPES.find(c=>c.id===crateType);const total=ct.cost*10;if(state[ct.curr]<total){toast('Za mało!');return}
state[ct.curr]-=total;crateQueue=[];for(let i=0;i<10;i++){const ch={...rollCharacter(crateType)};applyCharResult(ch);crateQueue.push(ch)}origQ=10;saveState();startCrateAnim()}
window.openCrate=openCrate;window.openCrate10=openCrate10;
function applyCharResult(ch){if(state.unlockedIds.has(ch.id)){state.duplicates[ch.id]=(state.duplicates[ch.id]||0)+1;ch._new=false}else{state.unlockedIds.add(ch.id);state.duplicates[ch.id]=1;ch._new=true}}

let crateScene,crateCam,crateObj,crateParts=[],crateBeam=null,cratePhase='',cratePhaseT=0;
function initCrateScene(){crateScene=new THREE.Scene();crateScene.background=new THREE.Color(0x050510);crateCam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);crateCam.position.set(0,1,5);crateCam.lookAt(0,0.5,0);
crateScene.add(new THREE.AmbientLight(0x404060,1.2));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(3,5,4);crateScene.add(dl);
const geo=new THREE.BoxGeometry(1.6,1.6,1.6);const mat=new THREE.MeshStandardMaterial({color:0x3a2a5a,metalness:0.6,roughness:0.3,emissive:0x1a0a2a});crateObj=new THREE.Mesh(geo,mat);crateScene.add(crateObj);
crateObj.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xaa6aff})));
crateBeam=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.6,8,16,1,true),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,side:THREE.DoubleSide}));crateBeam.position.y=2;crateScene.add(crateBeam)}
function startCrateAnim(){if(!crateScene)initCrateScene();crateActive=true;document.getElementById('crateOverlay').classList.add('active');document.getElementById('crateReveal').classList.remove('show');document.getElementById('crateReveal').innerHTML='';document.getElementById('crateNext').classList.remove('show');
document.getElementById('crateCounter').textContent=origQ>1?`Skrzynia 1/${origQ}`:'';
runCratePhase('DARKEN')}
function runCratePhase(p){cratePhase=p;cratePhaseT=0;
const r=RARITIES[crateQueue[0].rarity];const col=new THREE.Color(r.color);
if(p==='APPEAR'){crateObj.visible=true;crateObj.scale.set(0.01,0.01,0.01)}
if(p==='CRACK'){crateObj.material.emissive=col;crateObj.material.emissiveIntensity=2}
if(p==='EXPLODE'){crateObj.visible=false;spawnCrateParts(col);spawnCrateColorParts(col)}
if(p==='BEAM'){crateBeam.material.color=col;crateBeam.material.opacity=0.8}
if(p==='REVEAL'){showCrateReveal(crateQueue[0])}}
function spawnCrateParts(col){const g=new THREE.BoxGeometry(0.3,0.3,0.3);const m=new THREE.MeshStandardMaterial({color:0x3a2a5a,emissive:0x2a1a4a});
for(let i=0;i<14;i++){const f=new THREE.Mesh(g,m.clone());f.position.set((Math.random()-0.5)*0.6,0.3+(Math.random()-0.5)*0.6,(Math.random()-0.5)*0.6);f._v=new THREE.Vector3((Math.random()-0.5)*5,Math.random()*5+2,(Math.random()-0.5)*5);f._l=1.2;crateScene.add(f);crateParts.push(f)}}

let particlePool=[];const PARTICLE_GEO=new THREE.SphereGeometry(0.08,4,4);
function initParticlePool(){particlePool=[];const n=state.settings.reducedParticles?250:500;
for(let i=0;i<n;i++){const m=new THREE.Mesh(PARTICLE_GEO,new THREE.MeshBasicMaterial({color:0xffffff}));m.visible=false;scene.add(m);particlePool.push({mesh:m,vel:new THREE.Vector3(),life:0,maxLife:1,active:false,gravity:true})}}
function spawnParticle(pos,color,vel,life,grav=true){for(const p of particlePool){if(!p.active){p.active=true;p.mesh.visible=true;p.mesh.position.copy(pos);p.mesh.material.color.set(color);p.mesh.scale.setScalar(1);p.vel.copy(vel);p.life=life;p.maxLife=life;p.gravity=grav;return}}}
function updateParticles(dt){for(const p of particlePool){if(!p.active)continue;p.life-=dt;if(p.life<=0){p.active=false;p.mesh.visible=false;continue}if(p.gravity)p.vel.y-=9*dt;p.mesh.position.addScaledVector(p.vel,dt);p.mesh.scale.setScalar(p.life/p.maxLife)}}
function spawnDeathParticles(pos,color){const n=state.settings.reducedParticles?6:12;for(let i=0;i<n;i++)spawnParticle(pos,color,new THREE.Vector3((Math.random()-0.5)*6,Math.random()*5+1,(Math.random()-0.5)*6),0.8)}
function spawnHitParticles(pos,color){for(let i=0;i<5;i++)spawnParticle(pos,color,new THREE.Vector3((Math.random()-0.5)*4,Math.random()*3,(Math.random()-0.5)*4),0.5)}
function spawnAttackParticles(pos,color,dir){for(let i=0;i<4;i++){const v=dir.clone().multiplyScalar(3+Math.random()*3);v.x+=(Math.random()-0.5)*2;v.z+=(Math.random()-0.5)*2;spawnParticle(pos,color,v,0.4,false)}}
function spawnSuperParticles(pos,color){const n=state.settings.reducedParticles?30:60;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,e=Math.random()*Math.PI;const sp=Math.random()*10+4;spawnParticle(pos,color,new THREE.Vector3(Math.sin(e)*Math.cos(a)*sp,Math.abs(Math.cos(e))*sp,Math.sin(e)*Math.sin(a)*sp),1.0)}}

let tempLights=[];
function addTempLight(pos,color,intensity,range,life){const l=new THREE.PointLight(color,intensity,range);l.position.copy(pos);scene.add(l);tempLights.push({light:l,life,maxLife:life,baseI:intensity})}
function updateTempLights(dt){for(let i=tempLights.length-1;i>=0;i--){const t=tempLights[i];t.life-=dt;if(t.life<=0){scene.remove(t.light);tempLights.splice(i,1);continue}t.light.intensity=t.baseI*(t.life/t.maxLife)}}

function getForward(){return new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch)).multiplyScalar(-1).normalize()}
function clanColor(c){return new THREE.Color(CLANS[c.clan].baseColor).getHex()}
function doAttack(){const c=player.char;const fwd=getForward();const origin=camera.position.clone();
if(player.atkType==='melee')meleeAttack(origin,fwd);
else if(player.atkType==='ranged'){createProjectile(origin,fwd,player.dmg,clanColor(c),'normal');spawnAttackParticles(origin,clanColor(c),fwd)}
else aoeAttack(origin,fwd)}
function meleeAttack(origin,fwd){
const slash=new THREE.Mesh(new THREE.TorusGeometry(1.3,0.15,8,16,Math.PI),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.8}));
slash.position.copy(origin).addScaledVector(fwd,1.5);slash.rotateZ(Math.atan2(fwd.x,fwd.z));scene.add(slash);
arenaSlash={mesh:slash,life:0.25};
addTempLight(slash.position.clone(),clanColor(player.char),2,8,0.2);
const range=3.0;[...mobs,...(boss?[boss]:[])].forEach(m=>{if(m.dead||m._dissolve!==undefined)return;const d=m.group.position.distanceTo(origin);if(d<range){const toM=m.group.position.clone().sub(origin).normalize();if(toM.dot(fwd)>0.3)damageMob(m,player.dmg)}})}
function aoeAttack(origin,fwd){const c=player.char;
for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;createProjectile(origin,new THREE.Vector3(Math.cos(a),0,Math.sin(a)),player.dmg*0.7,clanColor(c),'normal')}
const ring=new THREE.Mesh(new THREE.RingGeometry(0.5,0.8,32),new THREE.MeshBasicMaterial({color:clanColor(c),transparent:true,opacity:0.7,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.copy(origin).setY(0.1);scene.add(ring);
arenaRings.push({mesh:ring,life:0.5,maxLife:0.5});
addTempLight(origin,clanColor(c),2,10,0.3)}
function createProjectile(origin,dir,dmg,color,kind){
const m=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),new THREE.MeshBasicMaterial({color}));
m.add(new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.3})));
m.position.copy(origin).addScaledVector(dir,1);scene.add(m);
m.add(new THREE.PointLight(color,1,5));
projectiles.push({mesh:m,vel:dir.clone().multiplyScalar(kind==='super'?28:22),dmg,life:2.5,color,kind})}

function damageMob(m,dmg){if(m.dead)return;m.hp-=dmg;
spawnHitParticles(m.group.position.clone().setY(1),m===boss?0xffff00:0xffaa00);
floatDmg(m.group.position.clone().setY(2),Math.round(dmg),m===boss?'#ffff00':'#ffaa00');
if(m===boss){if(m.hp<=0)killBoss();else updateBossBar()}
else{if(m.hpfill)m.hpfill.scale.x=Math.max(0,m.hp/m.maxHp);if(m.hp<=0)killMob(m)}}
function killMob(m){if(m.dead)return;m.dead=true;
spawnDeathParticles(m.group.position.clone().setY(1),m.type.color);
addTempLight(m.group.position.clone().setY(1),m.type.color,2,6,0.3);
m._dissolve=0.4;m._dissolveT=0.4;
kills++;
const coinUp=1+state.upgrades.magnet*0.15;sessionCoins+=Math.round((5+wave*2)*coinUp);
updateHUD()}
function killBoss(){if(!boss)return;const bp=boss.group.position.clone();
spawnSuperParticles(bp.clone().setY(2),new THREE.Color(boss.type.color));
addTempLight(bp.clone().setY(1),boss.type.color,5,30,1.0);doScreenShake(1.5);doFlash('#ffaa00',0.5);
const coinUp=1+state.upgrades.magnet*0.15;const cg=Math.round((200+wave*30)*coinUp);sessionCoins+=cg;state.gems+=2;
for(let i=0;i<20;i++)spawnParticle(bp.clone().setY(1),0xffcc44,new THREE.Vector3((Math.random()-0.5)*8,Math.random()*8+2,(Math.random()-0.5)*8),1.5);
kills++;
toast('BOSS POKONANY! +'+cg+'💰 +2💎');
if(player.isGhost&&player.char.ghostMechanic&&Math.random()<0.5)revivePlayer();
scene.remove(boss.group);if(boss.telegraph)scene.remove(boss.telegraph);boss=null;
document.getElementById('bossBar').classList.remove('active');updateHUD()}
function damagePlayer(dmg){if(player.isGhost)return;if(shieldActive>0||shadowFormActive>0||smSuperActive>0)return;
player.hp-=dmg;doHitIndicator();doScreenShake(0.4);
if(player.hp<=0)playerDeath();updateHUD()}
function playerDeath(){const c=player.char;
if(c.ghostMechanic&&!player.isGhost&&Math.random()<0.5){player.isGhost=true;player.hp=player.maxHp*0.5;player.atkType='melee';player.dmg=c.dmg*0.6;toast('FORMA DUCHA! Zabij bossa aby się odrodzić.');document.getElementById('shadowOverlay').style.opacity=0.6;return}
doGameOver()}
function revivePlayer(){player.isGhost=false;player.hp=player.maxHp;player.atkType=player.baseAtkType;player.dmg=player.baseDmg;toast('ODRODZONY! Mistrz Cieni powstaje!');document.getElementById('shadowOverlay').style.opacity=0;doFlash('#ff00ff',0.4)}
function doGameOver(){gameRunning=false;
state.coins+=sessionCoins;state.totalKills+=kills;saveState();checkMilestones();
if(document.pointerLockElement)document.exitPointerLock();
document.getElementById('goStats').innerHTML=`Fala: <b>${wave}</b><br>Zabójstwa: <b>${kills}</b><br>Zdobyte monety: <b>${sessionCoins}💰</b>`;
document.getElementById('gameOver').classList.add('active');sessionCoins=0;kills=0}

function doScreenShake(amt){screenShake=Math.max(screenShake,amt)}
function doFlash(color,op){const f=document.getElementById('flash');f.style.transition='';f.style.background=color;f.style.opacity=op;requestAnimationFrame(()=>{f.style.transition='opacity .5s';f.style.opacity=0})}
function doHitIndicator(){const h=document.getElementById('hitInd');h.style.transition='';h.style.opacity=0.8;requestAnimationFrame(()=>{h.style.transition='opacity .4s';h.style.opacity=0})}
function floatDmg(worldPos,val,color){const v=worldPos.clone().project(camera);if(v.z>1)return;const x=(v.x*0.5+0.5)*innerWidth,y=(-v.y*0.5+0.5)*innerHeight;
const el=document.createElement('div');el.className='dmgnum';el.textContent=val;el.style.color=color;el.style.left=x+'px';el.style.top=y+'px';document.getElementById('app').appendChild(el);setTimeout(()=>el.remove(),1000)}
function announceWave(n){const e=document.getElementById('waveAnno');e.textContent='FALA '+n;e.classList.remove('show');void e.offsetWidth;e.classList.add('show')}
function announceBoss(name){const e=document.getElementById('bossAnno');e.textContent='BOSS: '+name;e.classList.remove('show');void e.offsetWidth;e.classList.add('show')}

function updateHUD(){if(!player)return;
document.getElementById('hudWave').textContent='FALA '+(wave||1);
document.getElementById('hudCoin').textContent='💰 '+sessionCoins;
document.getElementById('hudKillN').textContent='☠ '+kills;
document.getElementById('hpFill').style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
document.getElementById('hpText').textContent=Math.ceil(player.hp)+' / '+Math.ceil(player.maxHp)+(player.isGhost?' 👻':'');
updateAbilityCD('abQ',abilityCD.super);updateAbilityCD('abE',abilityCD.shield);updateAbilityCD('abR',abilityCD.shadow)}
function updateAbilityCD(id,cd){const cdEl=document.getElementById(id).querySelector('.cd');if(cd>0){cdEl.style.display='flex';cdEl.textContent=Math.ceil(cd)}else cdEl.style.display='none'}
function updateBossBar(){if(!boss)return;document.getElementById('bossBarFill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%'}

function updateGame(dt){
let spd=player.speed*(keys['ShiftLeft']||keys['ShiftRight']?1.6:1.0)*(shadowFormActive>0?1.6:1.0)*(player.isGhost?1.1:1.0);
const fwd2=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).multiplyScalar(-1);
const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
const move=new THREE.Vector3();
if(keys['KeyW'])move.add(fwd2);if(keys['KeyS'])move.sub(fwd2);if(keys['KeyA'])move.sub(right);if(keys['KeyD'])move.add(right);
if(move.lengthSq()>0){move.normalize().multiplyScalar(spd*dt);const nx=camera.position.x+move.x,nz=camera.position.z+move.z;if(Math.hypot(nx,nz)<34){camera.position.x=nx;camera.position.z=nz}}
const baseY=smSuperActive>0?0.3:1.6;
camera.position.y+=(baseY-camera.position.y)*Math.min(1,dt*8);
camera.lookAt(camera.position.clone().add(getForward()));
if(fovPunch>0){fovPunch-=dt*40;camera.fov=75+Math.max(0,fovPunch);camera.updateProjectionMatrix()}else if(Math.abs(camera.fov-75)>0.3){camera.fov+=(75-camera.fov)*Math.min(1,dt*5);camera.updateProjectionMatrix()}
if(attackCD>0)attackCD-=dt;
if(attackHeld&&attackCD<=0){doAttack();attackCD=player.atkType==='melee'?0.4:0.35}
if(smSuperActive>0){smSuperActive-=dt;if(Math.random()<dt*8)[...mobs,...(boss?[boss]:[])].forEach(m=>{if(!m.dead&&m._dissolve===undefined&&m.group.position.distanceTo(camera.position)<10)damageMob(m,player.dmg*0.5)});if(smSuperActive<=0)document.getElementById('shadowOverlay').style.opacity=shadowFormActive>0?0.5:0}
for(const k in abilityCD)if(abilityCD[k]>0)abilityCD[k]=Math.max(0,abilityCD[k]-dt);
if(shieldActive>0){shieldActive-=dt;if(player.shieldMesh){player.shieldMesh.position.copy(camera.position);player.shieldMesh.scale.setScalar(1+Math.sin(performance.now()*0.01)*0.05)}if(shieldActive<=0&&player.shieldMesh)player.shieldMesh.visible=false}
if(shadowFormActive>0){shadowFormActive-=dt;if(Math.random()<dt*10)spawnParticle(camera.position.clone().setY(0.5+Math.random()),0x9a4aff,new THREE.Vector3((Math.random()-0.5),Math.random()*2,(Math.random()-0.5)),0.6);if(shadowFormActive<=0){document.getElementById('shadowOverlay').style.opacity=smSuperActive>0?0.7:(player.isGhost?0.6:0);if(scene.fog)scene.fog.color.set(0x080812)}}
if(betweenWaves){betweenTimer-=dt;if(betweenTimer<=0)startWave()}
if(waveActive&&waveMobsToSpawn>0){waveSpawnTimer-=dt;if(waveSpawnTimer<=0){spawnMob();waveMobsToSpawn--;waveSpawnTimer=Math.max(0.4,1.2-wave*0.03)}}
checkWaveEnd();
updateMobs(dt);
if(boss)updateBoss(dt);
updateShadowMinions(dt);
updateProjectiles(dt);
updateParticles(dt);
updateTempLights(dt);
updateArenaFX(dt);
if(arenaSlash){arenaSlash.life-=dt;arenaSlash.mesh.material.opacity=arenaSlash.life*3;arenaSlash.mesh.scale.setScalar(1+(0.25-arenaSlash.life)*2);if(arenaSlash.life<=0){scene.remove(arenaSlash.mesh);arenaSlash=null}}
arenaRings=arenaRings.filter(r=>{r.life-=dt;const t=1-r.life/r.maxLife;r.mesh.scale.setScalar(1+t*12);r.mesh.material.opacity=r.life/r.maxLife*0.7;if(r.life<=0){scene.remove(r.mesh);return false}return true});
if(screenShake>0){screenShake=Math.max(0,screenShake-dt*2);const s=screenShake*0.3;camera.position.x+=(Math.random()-0.5)*s;camera.position.z+=(Math.random()-0.5)*s}
updateHUD()}
function updateMobs(dt){for(let i=mobs.length-1;i>=0;i--){const m=mobs[i];
if(m._dissolve!==undefined){m._dissolve-=dt;m.group.scale.setScalar(Math.max(0.01,m._dissolve/m._dissolveT));if(m._dissolve<=0){scene.remove(m.group);mobs.splice(i,1)}continue}
const toP=camera.position.clone().setY(0).sub(m.group.position.clone().setY(0));const d=toP.length();toP.normalize();
m.group.position.addScaledVector(toP,m.speed*dt*(shadowFormActive>0?0.7:1));
m.group.lookAt(camera.position.x,m.group.position.y,camera.position.z);
if(m.hpfill)m.hpfill.lookAt(camera.position);
if(m.atkCD>0)m.atkCD-=dt;
if(d<1.8&&m.atkCD<=0){m.atkCD=1.2;damagePlayer(m.dmg)}}}
function updateBoss(dt){const m=boss;const toP=camera.position.clone().setY(0).sub(m.group.position.clone().setY(0));const d=toP.length();toP.normalize();
m.group.position.addScaledVector(toP,m.speed*dt);
m.group.lookAt(camera.position.x,m.group.position.y,camera.position.z);
if(m.atkCD>0)m.atkCD-=dt;
if(d<3.5&&m.atkCD<=0){m.atkCD=2.0;damagePlayer(m.dmg)}
m.special+=dt;
if(m.special>5&&!m.telegraph){const tg=new THREE.Mesh(new THREE.RingGeometry(3,4,32),new THREE.MeshBasicMaterial({color:0xff3030,transparent:true,opacity:0.5,side:THREE.DoubleSide}));tg.rotation.x=-Math.PI/2;tg.position.copy(camera.position).setY(0.1);scene.add(tg);m.telegraph=tg;m._tgT=1.2}
if(m.telegraph){m._tgT-=dt;m.telegraph.material.opacity=0.3+Math.abs(Math.sin(m._tgT*10))*0.4;if(m._tgT<=0){const ep=m.telegraph.position.clone();if(camera.position.distanceTo(ep)<4.5)damagePlayer(m.dmg*1.5);spawnSuperParticles(ep.clone().setY(1),new THREE.Color(0xff3030));addTempLight(ep.clone().setY(1),0xff3030,3,12,0.4);scene.remove(m.telegraph);m.telegraph=null;m.special=0}}
updateBossBar()}
function updateShadowMinions(dt){for(const sm of shadowMinions){
if(sm.dead){sm.respawn-=dt;if(sm.respawn<=0){sm.dead=false;sm.hp=sm.maxHp;sm.group.visible=true;const a=Math.random()*Math.PI*2;sm.group.position.set(camera.position.x+Math.cos(a)*3,0,camera.position.z+Math.sin(a)*3)}continue}
let tgt=null,bd=999;[...mobs.filter(m=>!m.dead&&m._dissolve===undefined),...(boss?[boss]:[])].forEach(m=>{const d=m.group.position.distanceTo(sm.group.position);if(d<bd){bd=d;tgt=m}});
if(tgt){const toT=tgt.group.position.clone().setY(0).sub(sm.group.position.clone().setY(0));const d=toT.length();toT.normalize();
if(d>1.5)sm.group.position.addScaledVector(toT,sm.speed*dt);
sm.group.lookAt(tgt.group.position.x,sm.group.position.y,tgt.group.position.z);
if(sm.atkCD>0)sm.atkCD-=dt;
if(d<2.0&&sm.atkCD<=0){sm.atkCD=1.0;damageMob(tgt,sm.dmg)}}
else{const toP=camera.position.clone().setY(0).sub(sm.group.position.clone().setY(0));if(toP.length()>4)sm.group.position.addScaledVector(toP.normalize(),sm.speed*dt)}
sm.group.position.y=Math.sin(performance.now()*0.003+sm.data.id)*0.1}}
function updateProjectiles(dt){for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.life-=dt;
p.mesh.position.addScaledVector(p.vel,dt);
if(Math.random()<0.5)spawnParticle(p.mesh.position.clone(),p.color,new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)),0.3,false);
let hit=false;
for(const m of [...mobs.filter(m=>!m.dead&&m._dissolve===undefined),...(boss?[boss]:[])]){if(m.group.position.distanceTo(p.mesh.position)<1.2*(m.scale||1)){damageMob(m,p.dmg);hit=true;break}}
if(hit||p.life<=0||Math.hypot(p.mesh.position.x,p.mesh.position.z)>40){scene.remove(p.mesh);projectiles.splice(i,1)}}}
function updateArenaFX(dt){const t=performance.now()*0.001;
arenaOrbs.forEach((o,i)=>{o.material.emissiveIntensity=1.2+Math.sin(t*2+i)*0.6});
arenaRunes.forEach((r,i)=>{r.material.opacity=0.3+Math.sin(t*1.5+i)*0.2});
if(atmosParticles){const pos=atmosParticles.geometry.attributes.position;for(let i=0;i<pos.count;i++){let y=pos.getY(i)+dt*0.5;if(y>15)y=0;pos.setY(i,y)}pos.needsUpdate=true}}

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);
if(crateActive){updateCrateAnim(dt);renderer.render(crateScene,crateCam);return}
if(scene&&gameRunning){if(!gamePaused)updateGame(dt);renderer.render(scene,camera)}}
animate();

addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);if(camera){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}if(crateCam){crateCam.aspect=innerWidth/innerHeight;crateCam.updateProjectionMatrix()}});

updateCurrency();
</script>
</body>
</html>
