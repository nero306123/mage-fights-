<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Arena Cieni</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c-common:#8a8a8a;--c-rare:#4a9eff;--c-epic:#b44aff;--c-mythic:#ff4a8a;--c-legendary:#ffaa00;--c-ultimate:#ff4444;--c-unknown:#00ffaa;--c-secret:#ff00ff}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;color:#e8e8ff;font-family:'Orbitron',sans-serif;user-select:none}
#app{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex}
canvas{display:block}
#gl{position:fixed;inset:0;z-index:1}
.title-font{font-family:'Cinzel',serif}
#menu{background:linear-gradient(135deg,#0a0a18,#1a0a2a,#0a0a18);background-size:400% 400%;animation:bgshift 18s ease infinite;align-items:center;justify-content:center;text-align:center}
@keyframes bgshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.menu-title{font-family:'Cinzel',serif;font-size:clamp(40px,11vw,100px);font-weight:900;color:#c44aff;text-shadow:0 0 30px #b44aff,0 0 60px #6a2a9a;letter-spacing:6px;animation:titlepulse 3s ease-in-out infinite}
@keyframes titlepulse{0%,100%{text-shadow:0 0 30px #b44aff,0 0 60px #6a2a9a;transform:scale(1)}50%{text-shadow:0 0 50px #d44aff,0 0 90px #8a3aba;transform:scale(1.03)}}
.menu-sub{color:#8a7aaa;letter-spacing:4px;margin-top:8px;font-size:clamp(12px,3vw,18px)}
.menu-btns{margin-top:48px;display:flex;flex-direction:column;gap:18px;width:min(320px,80vw)}
.btn{background:linear-gradient(135deg,#2a1a4a,#3a1a5a);border:2px solid #6a3a9a;color:#e8e8ff;padding:16px 24px;border-radius:12px;font-family:'Orbitron';font-weight:700;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(120,60,200,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(160,80,255,.5);border-color:#a44aff}
.btn:active{transform:translateY(0)}
.btn.small{padding:10px 16px;font-size:14px}
.btn.green{background:linear-gradient(135deg,#1a4a2a,#1a5a3a);border-color:#3a9a5a}
.btn.gold{background:linear-gradient(135deg,#4a3a1a,#5a4a1a);border-color:#9a8a3a}
.btn.red{background:linear-gradient(135deg,#4a1a1a,#5a1a1a);border-color:#9a3a3a}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.6)}
.hdr{display:flex;align-items:center;padding:14px 18px;gap:14px;background:rgba(10,10,24,.85);border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10;backdrop-filter:blur(6px)}
.hdr h2{font-family:'Cinzel';font-size:clamp(20px,5vw,32px);color:#c44aff;flex:1;text-shadow:0 0 12px #8a3aba}
.curr{display:flex;gap:12px}
.pill{background:#13132a;border:1px solid #2a2a4a;border-radius:20px;padding:6px 14px;font-weight:700;font-size:14px}
.pill.coin{color:#ffcc44;border-color:#5a4a1a}
.pill.gem{color:#44ddff;border-color:#1a4a5a}
.filters{display:flex;flex-wrap:wrap;gap:6px;padding:12px 18px}
.fbtn{background:#13132a;border:1px solid #2a2a4a;color:#aaa;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:'Orbitron'}
.fbtn.active{background:#3a2a5a;color:#fff;border-color:#7a4aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:18px}
.card{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.card.locked{filter:grayscale(1) brightness(.4)}
.card .emoji{font-size:40px;margin-bottom:6px}
.card .cname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .crar{font-size:9px;letter-spacing:1px;margin-top:3px;text-transform:uppercase}
.card .dupe{position:absolute;top:4px;right:4px;background:#000a;border-radius:8px;padding:1px 6px;font-size:10px;color:#ffcc44}
.card.rar-legendary,.card.rar-ultimate,.card.rar-unknown,.card.rar-secret{animation:cardglow 2s ease-in-out infinite}
@keyframes cardglow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor}}
.modal{position:fixed;inset:0;z-index:100;background:rgba(5,5,12,.88);display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal.active{display:flex}
.mbox{background:#13132a;border:2px solid #4a3a6a;border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.mclose{position:absolute;top:10px;right:14px;font-size:26px;color:#888;cursor:pointer;line-height:1}
.mavatar{font-size:70px;text-align:center}
.mname{font-family:'Cinzel';font-size:26px;text-align:center;margin:6px 0}
.mrar{text-align:center;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.mstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;padding:8px 12px;font-size:13px}
.stat b{color:#c44aff}
.minfo{background:#0a0a1a;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.5}
.minfo .lbl{color:#c44aff;font-weight:700}
.mbtns{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.styles{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.stylebtn{background:#0a0a1a;border:2px solid #2a2a4a;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-family:'Orbitron';color:#ccc;flex:1;min-width:90px}
.stylebtn.active{border-color:#a44aff;background:#2a1a4a;color:#fff}
.stylebtn small{display:block;color:#888;font-size:9px;margin-top:3px}
.shadowgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;max-height:50vh;overflow-y:auto;padding:4px}
.scard{background:#0a0a1a;border:2px solid #2a2a4a;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px}
.scard.sel{border-color:#a44aff;background:#2a1a4a}
.scard .se{font-size:26px}
.scard .st{font-size:8px;color:#888;text-transform:uppercase}
.tabs{display:flex;gap:8px;padding:12px 18px}
.tab{flex:1;background:#13132a;border:1px solid #2a2a4a;color:#aaa;padding:10px;border-radius:8px;cursor:pointer;font-family:'Orbitron';font-weight:700;font-size:13px}
.tab.active{background:#3a2a5a;color:#fff;border-color:#7a4aaa}
.shopgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:18px}
.cratecard{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:18px;text-align:center}
.cratecard .ce{font-size:54px}
.cratecard h3{margin:8px 0;font-size:18px;font-family:'Cinzel'}
.cratecard p{font-size:11px;color:#999;margin-bottom:10px;line-height:1.4}
.cratecard .cbtns{display:flex;gap:8px}
.cratecard .cbtns .btn{flex:1}
.upcard{background:#13132a;border:2px solid #2a2a4a;border-radius:12px;padding:16px}
.upcard h3{font-size:16px;font-family:'Cinzel';margin-bottom:4px}
.upcard p{font-size:11px;color:#999;margin-bottom:8px}
.upcard .lvl{color:#c44aff;font-weight:700;margin-bottom:8px;font-size:13px}
.mscard{background:#13132a;border:1px solid #2a2a4a;border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px;margin:8px 18px}
.mscard.done{border-color:#3a9a5a;opacity:.7}
.mscard .mse{font-size:30px}
.mscard .msinfo{flex:1}
.mscard .msinfo b{font-size:14px}
.mscard .msinfo p{font-size:11px;color:#999}
.mscard .msrew{color:#ffcc44;font-size:12px;font-weight:700;text-align:right}
#crateOverlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#crateOverlay.active{display:flex}
#crateReveal{text-align:center;opacity:0;transition:opacity .4s}
#crateReveal.show{opacity:1;animation:revealpop .5s ease}
@keyframes revealpop{0%{transform:scale(.3)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
#crateReveal .re{font-size:90px;filter:drop-shadow(0 0 30px currentColor)}
#crateReveal .rn{font-family:'Cinzel';font-size:34px;margin:8px}
#crateReveal .rr{font-size:18px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
#crateReveal .rnew{font-size:22px;color:#ffcc44;margin-top:8px;font-weight:900;animation:titlepulse 1s infinite}
#crateNext{margin-top:30px;display:none}
#crateNext.show{display:block}
#crateCounter{position:absolute;top:20px;color:#888;font-size:14px}
#hud{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#hud.active{display:block}
#crosshair{position:absolute;top:50%;left:50%;width:22px;height:22px;transform:translate(-50%,-50%)}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff8;box-shadow:0 0 4px #000}
#crosshair::before{left:50%;top:0;width:2px;height:22px;transform:translateX(-50%)}
#crosshair::after{top:50%;left:0;height:2px;width:22px;transform:translateY(-50%)}
#hudTop{position:absolute;top:14px;left:14px;display:flex;gap:14px}
#hudKills{position:absolute;top:14px;right:14px}
.hudpill{background:#000a;border:1px solid #4a3a6a;border-radius:18px;padding:6px 16px;font-weight:700;font-size:15px}
#hpWrap{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:min(380px,80vw);height:22px;background:#000a;border:2px solid #4a3a6a;border-radius:12px;overflow:hidden}
#hpFill{height:100%;width:100%;background:linear-gradient(90deg,#ff3a5a,#ff7a3a);transition:width .25s;border-radius:10px}
#hpText{position:absolute;inset:0;text-align:center;font-size:13px;font-weight:700;line-height:22px;text-shadow:0 0 3px #000}
#abilities{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
.ability{width:58px;height:58px;background:#000a;border:2px solid #4a3a6a;border-radius:10px;position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.ability .key{position:absolute;top:2px;left:4px;font-size:9px;color:#aaa}
.ability .cd{position:absolute;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#ff8a4a}
#bossBar{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:min(600px,90vw);display:none}
#bossBar.active{display:block}
#bossBar .bn{text-align:center;font-family:'Cinzel';color:#ff5a5a;text-shadow:0 0 10px #ff0000;font-size:18px;margin-bottom:4px}
#bossBarBg{height:18px;background:#000a;border:2px solid #6a2a2a;border-radius:10px;overflow:hidden}
#bossBarFill{height:100%;width:100%;background:linear-gradient(90deg,#ff2a2a,#ff7a2a);transition:width .2s}
#waveAnno{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel';font-size:56px;color:#c44aff;text-shadow:0 0 30px #8a3aba;opacity:0;pointer-events:none;text-align:center}
#waveAnno.show{animation:waveanim 2.2s ease}
@keyframes waveanim{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
#bossAnno{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel';font-size:48px;color:#ff3a3a;text-shadow:0 0 30px #ff0000;opacity:0;pointer-events:none;text-align:center}
#bossAnno.show{animation:waveanim 2.6s ease}
#vignette{position:fixed;inset:0;z-index:48;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(20,0,40,.55) 100%);display:none}
#vignette.active{display:block}
#shadowOverlay{position:fixed;inset:0;z-index:49;pointer-events:none;background:radial-gradient(ellipse at center,rgba(80,20,160,.15) 0%,rgba(60,10,140,.45) 100%);opacity:0;transition:opacity .3s}
#flash{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;background:#fff}
#hitInd{position:fixed;inset:0;z-index:47;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,.6) 100%)}
.dmgnum{position:fixed;z-index:55;pointer-events:none;font-weight:900;font-size:18px;text-shadow:0 0 4px #000;animation:dmgfloat 1s ease forwards}
@keyframes dmgfloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.4)}}
#pauseMenu{position:fixed;inset:0;z-index:120;background:rgba(5,5,12,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#pauseMenu.active{display:flex}
#pauseMenu h2{font-family:'Cinzel';font-size:40px;color:#c44aff}
#gameOver{position:fixed;inset:0;z-index:120;background:rgba(20,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#gameOver.active{display:flex}
#gameOver h2{font-family:'Cinzel';font-size:54px;color:#ff3a3a;text-shadow:0 0 30px #ff0000}
.gostats{font-size:16px;color:#ccc;text-align:center;line-height:1.8}
.slider{width:240px}
.setrow{display:flex;align-items:center;gap:12px;margin:14px 0;justify-content:space-between}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2a1a4a;border:1px solid #6a4a9a;border-radius:10px;padding:12px 24px;z-index:300;font-size:14px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.back{cursor:pointer;font-size:24px;color:#888;padding:0 8px}
/* ===== MOBILE CONTROLS ===== */
#mobileControls{position:fixed;inset:0;z-index:52;pointer-events:none;display:none}
#mobileControls.active{display:block}
.joystick{position:absolute;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(120,80,200,.12),rgba(40,20,80,.18));border:2px solid rgba(140,90,220,.4);pointer-events:auto;touch-action:none}
#joyMove{bottom:90px;left:30px}
#joyLook{bottom:90px;right:30px}
.joyknob{position:absolute;top:50%;left:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;background:radial-gradient(circle,rgba(180,120,255,.7),rgba(100,50,180,.5));border:2px solid rgba(200,150,255,.6);box-shadow:0 0 16px rgba(160,90,255,.5)}
#mobAtk{position:absolute;bottom:210px;right:46px;width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(255,80,120,.35),rgba(140,20,50,.4));border:3px solid rgba(255,120,150,.6);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:36px;touch-action:none;user-select:none}
#mobAtk:active{transform:scale(.92)}
.mobAbil{position:absolute;width:62px;height:62px;border-radius:50%;background:rgba(20,10,40,.7);border:2px solid rgba(140,90,220,.5);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:26px;touch-action:none;overflow:hidden}
.mobAbil .mcd{position:absolute;inset:0;background:#000b;display:flex;align-items:center;justify-content:center;font-size:18px;color:#ff8a4a;font-weight:700}
#mobQ{bottom:310px;right:64px}#mobE{bottom:250px;right:162px}#mobR{bottom:166px;right:176px}
#mobPause{position:absolute;top:14px;right:130px;width:44px;height:44px;border-radius:10px;background:rgba(20,10,40,.7);border:2px solid rgba(140,90,220,.5);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:22px}
/* ===== COMBO ===== */
#comboBox{position:absolute;top:84px;right:18px;text-align:right;opacity:0;transition:opacity .3s;z-index:53}
#comboBox.show{opacity:1}
#comboNum{font-family:'Cinzel';font-weight:900;font-size:42px;line-height:1;text-shadow:0 0 16px currentColor}
#comboLbl{font-size:12px;letter-spacing:3px;color:#ffcc44}
#comboBar{width:120px;height:5px;background:#0006;border-radius:3px;margin-top:4px;margin-left:auto;overflow:hidden}
#comboBarFill{height:100%;width:100%;background:linear-gradient(90deg,#ffcc44,#ff6a4a);transition:width .1s}
/* ===== POWERUP / STATUS ===== */
#puBanner{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:53;flex-wrap:wrap;justify-content:center;max-width:90vw}
.puIcon{background:#000a;border:1px solid #6a4a9a;border-radius:8px;padding:4px 10px;font-size:13px;display:flex;align-items:center;gap:4px;animation:puPulse 1s infinite}
@keyframes puPulse{0%,100%{box-shadow:0 0 6px rgba(160,90,255,.4)}50%{box-shadow:0 0 16px rgba(160,90,255,.8)}}
#streakFx{position:fixed;inset:0;z-index:46;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(255,120,0,.25) 100%)}
/* ===== MINIMAP ===== */
#minimap{position:absolute;top:58px;left:14px;width:120px;height:120px;border-radius:50%;background:rgba(8,6,18,.7);border:2px solid rgba(140,90,220,.4);z-index:51;overflow:hidden}
#minimapCv{width:100%;height:100%;display:block}
/* ===== MODE SELECT ===== */
.modegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:18px}
.modecard{background:#13132a;border:2px solid #2a2a4a;border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.modecard:hover{transform:translateY(-3px);border-color:#a44aff;box-shadow:0 8px 24px rgba(120,60,200,.4)}
.modecard.locked{opacity:.5;filter:grayscale(.7)}
.modecard .me{font-size:48px}
.modecard h3{font-family:'Cinzel';font-size:20px;margin:8px 0}
.modecard p{font-size:12px;color:#999;line-height:1.4}
@media(max-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}.menu-btns{width:80vw}
#abilities{display:none}.menu-title{letter-spacing:3px}#minimap{width:88px;height:88px}
#hudTop{top:10px;left:10px;gap:8px}.hudpill{font-size:12px;padding:5px 12px}#comboNum{font-size:32px}}
</style>
</head>
<body>
<div id="app">
<canvas id="gl"></canvas>
<div id="menu" class="screen active">
<div class="menu-title title-font">Arena Cieni</div>
<div class="menu-sub">SHADOW ARENA</div>
<div class="menu-btns">
<button class="btn green" onclick="goPlay()">⚔️ GRAJ</button>
<button class="btn" onclick="showScreen('collection');renderCollection()">📜 KOLEKCJA</button>
<button class="btn gold" onclick="showScreen('shop');renderShop()">🛒 SKLEP</button>
<button class="btn" onclick="openSettings()">⚙️ USTAWIENIA</button>
</div>
</div>
<div id="collection" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Kolekcja</h2>
<div class="curr"><span class="pill coin" id="colCoin">0</span><span class="pill gem" id="colGem">0</span></div></div>
<div class="filters" id="filters"></div>
<div class="grid" id="charGrid"></div>
</div>
<div id="shop" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Sklep</h2>
<div class="curr"><span class="pill coin" id="shopCoin">0</span><span class="pill gem" id="shopGem">0</span></div></div>
<div class="tabs"><div class="tab active" data-tab="crates" onclick="shopTab('crates')">Skrzynki</div><div class="tab" data-tab="upgrades" onclick="shopTab('upgrades')">Ulepszenia</div><div class="tab" data-tab="milestones" onclick="shopTab('milestones')">Kamienie Milowe</div></div>
<div id="shopContent"></div>
</div>
<div id="modeSelect" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('menu')">←</span><h2 class="title-font">Tryb Gry</h2></div>
<div class="modegrid" id="modeGrid"></div>
</div>
<div id="charSelect" class="screen">
<div class="hdr"><span class="back" onclick="showScreen('modeSelect')">←</span><h2 class="title-font">Wybierz Bohatera</h2></div>
<div class="grid" id="selectGrid"></div>
</div>
<div id="hud">
<div id="crosshair"></div>
<div id="minimap"><canvas id="minimapCv" width="120" height="120"></canvas></div>

let crateScene,crateCam,crateObj,crateParts=[],crateBeam=null,cratePhase='',cratePhaseT=0;
function initCrateScene(){crateScene=new THREE.Scene();crateScene.background=new THREE.Color(0x050510);crateCam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);crateCam.position.set(0,1,5);crateCam.lookAt(0,0.5,0);
crateScene.add(new THREE.AmbientLight(0x404060,1.2));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(3,5,4);crateScene.add(dl);
const geo=new THREE.BoxGeometry(1.6,1.6,1.6);const mat=new THREE.MeshStandardMaterial({color:0x3a2a5a,metalness:0.6,roughness:0.3,emissive:0x1a0a2a});crateObj=new THREE.Mesh(geo,mat);crateScene.add(crateObj);
crateObj.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xaa6aff})));
crateBeam=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.6,8,16,1,true),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,side:THREE.DoubleSide}));crateBeam.position.y=2;crateScene.add(crateBeam)}
function startCrateAnim(){Audio2.init();applyAudio();Audio2.resume();Audio2.sfx('crate');if(!crateScene)initCrateScene();crateActive=true;document.getElementById('crateOverlay').classList.add('active');document.getElementById('crateReveal').classList.remove('show');document.getElementById('crateReveal').innerHTML='';document.getElementById('crateNext').classList.remove('show');
document.getElementById('crateCounter').textContent=origQ>1?`Skrzynia 1/${origQ}`:'';
runCratePhase('DARKEN')}
function runCratePhase(p){cratePhase=p;cratePhaseT=0;
const r=RARITIES[crateQueue[0].rarity];const col=new THREE.Color(r.color);
if(p==='APPEAR'){crateObj.visible=true;crateObj.scale.set(0.01,0.01,0.01)}
if(p==='CRACK'){crateObj.material.emissive=col;crateObj.material.emissiveIntensity=2}
if(p==='EXPLODE'){crateObj.visible=false;spawnCrateParts(col);spawnCrateColorParts(col)}
if(p==='BEAM'){crateBeam.material.color=col;crateBeam.material.opacity=0.8}
if(p==='REVEAL'){showCrateReveal(crateQueue[0])}}
function spawnCrateParts(col){const g=new THREE.BoxGeometry(0.3,0.3,0.3);const m=new THREE.MeshStandardMaterial({color:0x3a2a5a,emissive:0x2a1a4a});
for(let i=0;i<14;i++){const f=new THREE.Mesh(g,m.clone());f.position.set((Math.random()-0.5)*0.6,0.3+(Math.random()-0.5)*0.6,(Math.random()-0.5)*0.6);f._v=new THREE.Vector3((Math.random()-0.5)*5,Math.random()*5+2,(Math.random()-0.5)*5);f._l=1.2;crateScene.add(f);crateParts.push(f)}}
function spawnCrateColorParts(col){const g=new THREE.SphereGeometry(0.08,6,6);const m=new THREE.MeshBasicMaterial({color:col});
for(let i=0;i<40;i++){const p=new THREE.Mesh(g,m);p.position.set(0,0.5,0);const a=Math.random()*Math.PI*2,e=Math.random()*Math.PI;const sp=Math.random()*4+2;p._v=new THREE.Vector3(Math.sin(e)*Math.cos(a)*sp,Math.cos(e)*sp,Math.sin(e)*Math.sin(a)*sp);p._l=1.5;crateScene.add(p);crateParts.push(p)}}
function showCrateReveal(ch){const r=RARITIES[ch.rarity];const el=document.getElementById('crateReveal');
el.innerHTML=`<div class="re" style="color:${r.color}">${ch.emoji}</div><div class="rn">${ch.name}</div><div class="rr" style="color:${r.color}">${r.label}</div><div class="rr" style="color:#aaa;font-size:13px">${CLANS[ch.clan].icon} ${CLANS[ch.clan].name}</div>${ch._new?'<div class="rnew">✨ NOWY! ✨</div>':'<div class="rnew" style="color:#aaa">Duplikat (+1)</div>'}`;
el.classList.add('show');document.getElementById('crateNext').classList.add('show');crateBeam.material.opacity=0;Audio2.sfx(ch._new?'reveal':'coin')}
function updateCrateAnim(dt){if(!crateActive)return;cratePhaseT+=dt;crateObj.rotation.y+=dt*1.5;const tt=cratePhaseT;
if(cratePhase==='DARKEN'&&tt>0.4)runCratePhase('APPEAR');
else if(cratePhase==='APPEAR'){crateObj.scale.lerp(new THREE.Vector3(1,1,1),dt*8);if(tt>0.5)runCratePhase('SHAKE')}
else if(cratePhase==='SHAKE'){crateObj.position.x=(Math.random()-0.5)*0.15*Math.min(tt,1);if(tt>1.0){crateObj.position.x=0;runCratePhase('CRACK')}}
else if(cratePhase==='CRACK'){crateObj.material.emissiveIntensity=2+Math.sin(tt*30)*2;crateObj.scale.setScalar(1+Math.sin(tt*20)*0.05);if(tt>0.9)runCratePhase('EXPLODE')}
else if(cratePhase==='EXPLODE'&&tt>0.5)runCratePhase('BEAM');
else if(cratePhase==='BEAM'){crateBeam.material.opacity=Math.max(0,0.8-tt*0.3);crateBeam.scale.x=crateBeam.scale.z=1+tt*0.5;if(tt>0.6)runCratePhase('REVEAL')}
for(let i=crateParts.length-1;i>=0;i--){const p=crateParts[i];p._l-=dt;p._v.y-=9*dt;p.position.addScaledVector(p._v,dt);p.rotation.x+=dt*4;p.scale.multiplyScalar(0.96);if(p._l<=0){crateScene.remove(p);crateParts.splice(i,1)}}}
function crateNextOrClose(){crateQueue.shift();if(crateQueue.length){document.getElementById('crateReveal').classList.remove('show');document.getElementById('crateNext').classList.remove('show');
crateParts.forEach(p=>crateScene.remove(p));crateParts=[];crateBeam.scale.set(1,1,1);document.getElementById('crateCounter').textContent=`Skrzynia ${origQ-crateQueue.length+1}/${origQ}`;
runCratePhase('DARKEN')}else{crateActive=false;document.getElementById('crateOverlay').classList.remove('active');crateParts.forEach(p=>crateScene.remove(p));crateParts=[];checkMilestones();renderShop();saveState()}}

let particlePool=[];const PARTICLE_GEO=new THREE.SphereGeometry(0.08,4,4);
function initParticlePool(){particlePool=[];const n=state.settings.reducedParticles?250:500;
for(let i=0;i<n;i++){const m=new THREE.Mesh(PARTICLE_GEO,new THREE.MeshBasicMaterial({color:0xffffff}));m.visible=false;scene.add(m);particlePool.push({mesh:m,vel:new THREE.Vector3(),life:0,maxLife:1,active:false,gravity:true})}}
function spawnParticle(pos,color,vel,life,grav=true){for(const p of particlePool){if(!p.active){p.active=true;p.mesh.visible=true;p.mesh.position.copy(pos);p.mesh.material.color.set(color);p.mesh.scale.setScalar(1);p.vel.copy(vel);p.life=life;p.maxLife=life;p.gravity=grav;return}}}
function updateParticles(dt){for(const p of particlePool){if(!p.active)continue;p.life-=dt;if(p.life<=0){p.active=false;p.mesh.visible=false;continue}if(p.gravity)p.vel.y-=9*dt;p.mesh.position.addScaledVector(p.vel,dt);p.mesh.scale.setScalar(p.life/p.maxLife)}}
function spawnDeathParticles(pos,color){const n=state.settings.reducedParticles?6:12;for(let i=0;i<n;i++)spawnParticle(pos,color,new THREE.Vector3((Math.random()-0.5)*6,Math.random()*5+1,(Math.random()-0.5)*6),0.8)}
function spawnHitParticles(pos,color){for(let i=0;i<5;i++)spawnParticle(pos,color,new THREE.Vector3((Math.random()-0.5)*4,Math.random()*3,(Math.random()-0.5)*4),0.5)}
function spawnAttackParticles(pos,color,dir){for(let i=0;i<4;i++){const v=dir.clone().multiplyScalar(3+Math.random()*3);v.x+=(Math.random()-0.5)*2;v.z+=(Math.random()-0.5)*2;spawnParticle(pos,color,v,0.4,false)}}
function spawnSuperParticles(pos,color){const n=state.settings.reducedParticles?30:60;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,e=Math.random()*Math.PI;const sp=Math.random()*10+4;spawnParticle(pos,color,new THREE.Vector3(Math.sin(e)*Math.cos(a)*sp,Math.abs(Math.cos(e))*sp,Math.sin(e)*Math.sin(a)*sp),1.0)}}

let tempLights=[];
function addTempLight(pos,color,intensity,range,life){const l=new THREE.PointLight(color,intensity,range);l.position.copy(pos);scene.add(l);tempLights.push({light:l,life,maxLife:life,baseI:intensity})}
function updateTempLights(dt){for(let i=tempLights.length-1;i>=0;i--){const t=tempLights[i];t.life-=dt;if(t.life<=0){scene.remove(t.light);tempLights.splice(i,1);continue}t.light.intensity=t.baseI*(t.life/t.maxLife)}}

// ===== POWER-UP SYSTEM =====
let powerupOrbs=[],activePowerups={};
function spawnPowerupOrb(pos){const pu=POWERUPS[Math.floor(Math.random()*POWERUPS.length)];
const g=new THREE.Group();const core=new THREE.Mesh(new THREE.IcosahedronGeometry(0.4,0),new THREE.MeshStandardMaterial({color:pu.color,emissive:pu.color,emissiveIntensity:1.2,metalness:0.5}));g.add(core);
const ring=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.06,8,20),new THREE.MeshBasicMaterial({color:pu.color,transparent:true,opacity:0.7}));ring.rotation.x=Math.PI/2;g.add(ring);
g.add(new THREE.PointLight(pu.color,1.5,8));
g.position.copy(pos).setY(1.0);scene.add(g);powerupOrbs.push({group:g,data:pu,life:18,ring})}
function updatePowerups(dt){const t=performance.now()*0.001;
for(let i=powerupOrbs.length-1;i>=0;i--){const o=powerupOrbs[i];o.life-=dt;o.group.rotation.y+=dt*2;o.ring.rotation.z+=dt*3;o.group.position.y=1.0+Math.sin(t*2+i)*0.2;
const magnetic=isPowerupActive('magnet')||state.upgrades.magnet>0;const grabDist=magnetic?5:1.6;const d=o.group.position.distanceTo(camera.position);
if(magnetic&&d<8&&d>grabDist){o.group.position.addScaledVector(camera.position.clone().sub(o.group.position).setY(0).normalize(),6*dt)}
if(d<grabDist){collectPowerup(o.data);scene.remove(o.group);powerupOrbs.splice(i,1);continue}
if(o.life<=0){scene.remove(o.group);powerupOrbs.splice(i,1)}}
for(const k in activePowerups){activePowerups[k]-=dt;if(activePowerups[k]<=0)delete activePowerups[k]}
renderPuBanner()}
function isPowerupActive(id){return activePowerups[id]>0}
function collectPowerup(pu){Audio2.sfx('powerup');state.stats.powerupsGrabbed++;floatDmg(camera.position.clone().add(getForward().multiplyScalar(3)).setY(2),pu.name,'#'+pu.color.toString(16).padStart(6,'0'));
addTempLight(camera.position.clone(),pu.color,3,15,0.5);
if(pu.instant){
if(pu.id==='heal'){player.hp=Math.min(player.maxHp,player.hp+player.maxHp*0.4);doFlash('#4aff8a',0.25)}
else if(pu.id==='nuke'){[...mobs,...(boss?[boss]:[])].forEach(m=>{if(!m.dead&&m._dissolve===undefined)damageMob(m,player.dmg*4,true)});doScreenShake(1.2);doFlash('#ff2a2a',0.5);Audio2.sfx('super');spawnSuperParticles(camera.position.clone(),new THREE.Color(0xff4a2a))}
else if(pu.id==='shield'){shieldActive=Math.max(shieldActive,player.shieldDur);if(!player.shieldMesh){const m=new THREE.Mesh(new THREE.SphereGeometry(1.5,20,20),new THREE.MeshBasicMaterial({color:0x4adaff,transparent:true,opacity:0.25,side:THREE.DoubleSide}));scene.add(m);player.shieldMesh=m}player.shieldMesh.visible=true}
}else{activePowerups[pu.id]=pu.dur;toast(pu.emoji+' '+pu.name+'!')}}
function renderPuBanner(){const b=document.getElementById('puBanner');let h='';for(const k in activePowerups){const pu=POWERUPS.find(p=>p.id===k);if(pu)h+=`<div class="puIcon">${pu.emoji} ${Math.ceil(activePowerups[k])}s</div>`}b.innerHTML=h}

// ===== STATUS EFFECTS (on mobs) =====
function applyStatus(m,statusId){if(!statusId||m===boss&&Math.random()<0.5)return;if(statusId==='random')statusId=['burn','freeze','shock','poison'][Math.floor(Math.random()*4)];
const def=STATUS_DEFS[statusId];if(!def)return;if(!m.status)m.status={};
m.status[statusId]={t:def.dur,tick:def.tick||0,tickT:0};
if(!m._statusMark){const mk=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6),new THREE.MeshBasicMaterial({color:def.color}));mk.position.y=(m.type?2.1*m.scale:2.4);m.group.add(mk);m._statusMark=mk}
m._statusMark.material.color.set(def.color)}
function updateMobStatus(m,dt){if(!m.status)return 1;let slowMul=1;let any=false;
for(const k in m.status){const st=m.status[k];const def=STATUS_DEFS[k];st.t-=dt;any=true;
if(def.slow)slowMul=Math.min(slowMul,1-def.slow);
if(def.dmgPct){st.tickT-=dt;if(st.tickT<=0){st.tickT=def.tick;const dmg=m.maxHp*def.dmgPct;m.hp-=dmg;spawnHitParticles(m.group.position.clone().setY(1),def.color);if(m!==boss&&m.hpfill)m.hpfill.scale.x=Math.max(0,m.hp/m.maxHp);if(m===boss)updateBossBar();if(m.hp<=0){if(m===boss)killBoss();else killMob(m);return slowMul}}}
if(st.t<=0)delete m.status[k]}
if(!any&&m._statusMark){m.group.remove(m._statusMark);m._statusMark=null}
return slowMul}
function statusDmgTaken(m){if(!m.status)return 1;let mul=1;for(const k in m.status){const def=STATUS_DEFS[k];if(def.dmgTaken)mul=Math.max(mul,def.dmgTaken)}return mul}

const shUp=1+state.upgrades.shadow*0.10;

function createShadowMinion(sd,shUp){const g=new THREE.Group();
const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.25,0.7,4,8),new THREE.MeshStandardMaterial({color:0x4a2a7a,emissive:0x3a1a6a,emissiveIntensity:0.5,transparent:true,opacity:0.85}));body.position.y=0.6;g.add(body);

function availableMobTypes(){return MOB_TYPES.filter(m=>wave>=m.minWave)}
function spawnMob(){const types=availableMobTypes();const mt=types[Math.floor(Math.random()*types.length)];
const mut=currentMutator;
let eliteChance=0.04+wave*0.004;if(mut&&mut.id==='elite')eliteChance+=0.25;const isElite=wave>=4&&Math.random()<eliteChance;
const sc=mt.scale*(isElite?1.45:1);
const g=new THREE.Group();const waveMul=1+wave*0.12;
const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.4*sc,1.0*sc,4,8),new THREE.MeshStandardMaterial({color:mt.color,emissive:isElite?0xffaa00:mt.color,emissiveIntensity:isElite?0.6:0.2,roughness:0.6}));body.position.y=0.8*sc;g.add(body);
const eyeM=new THREE.MeshBasicMaterial({color:isElite?0xffdd00:0xff2020});
[-0.15,0.15].forEach(dx=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.08*sc,6,6),eyeM);e.position.set(dx*sc,1.3*sc,0.35*sc);g.add(e)});
if(isElite){const aura=new THREE.Mesh(new THREE.TorusGeometry(0.7*sc,0.06,8,20),new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0.7}));aura.rotation.x=Math.PI/2;aura.position.y=0.4;g.add(aura);g.add(new THREE.PointLight(0xffaa00,1.2,8))}
const a=Math.random()*Math.PI*2,r=28+Math.random()*5;g.position.set(Math.cos(a)*r,0,Math.sin(a)*r);
const hpbg=new THREE.Mesh(new THREE.PlaneGeometry(1.0,0.12),new THREE.MeshBasicMaterial({color:0x000000}));hpbg.position.y=2.0*sc;g.add(hpbg);
const hpfill=new THREE.Mesh(new THREE.PlaneGeometry(0.96,0.08),new THREE.MeshBasicMaterial({color:isElite?0xffaa00:0xff3030}));hpfill.position.set(0,2.0*sc,0.01);g.add(hpfill);
scene.add(g);
const modeMul=gameMode==='endless'?1+wave*0.06:1;
const armorMul=(mut&&mut.id==='armored')?1.6:1;const frenzyMul=(mut&&mut.id==='frenzy')?1.4:1;const eHp=isElite?2.4:1,eDmg=isElite?1.6:1;
const hp=mt.hp*waveMul*modeMul*armorMul*eHp;
mobs.push({group:g,type:mt,hp,maxHp:hp,dmg:mt.dmg*(1+wave*0.06)*modeMul*eDmg,speed:mt.speed*frenzyMul,atkCD:0,hpfill,scale:sc,dead:false,status:null,_statusMark:null,elite:isElite})}

function spawnBoss(){const idx=Math.min(Math.floor((wave-5)/5),BOSS_TYPES.length-1);const bt=BOSS_TYPES[idx];
const cyc=Math.floor((wave-5)/(BOSS_TYPES.length*5));const mul=1+cyc*0.8+wave*0.05;
const g=new THREE.Group();
const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.5*bt.scale,1.2*bt.scale,6,12),new THREE.MeshStandardMaterial({color:bt.color,emissive:bt.color,emissiveIntensity:0.5,metalness:0.4,roughness:0.4}));body.position.y=bt.scale;g.add(body);
const eyeM=new THREE.MeshBasicMaterial({color:0xffff00});
[-0.25,0.25].forEach(dx=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.14*bt.scale,8,8),eyeM);e.position.set(dx*bt.scale,1.6*bt.scale,0.5*bt.scale);g.add(e)});

const bl=new THREE.PointLight(bt.color,2,15);bl.position.y=2*bt.scale;g.add(bl);
scene.add(g);
boss={group:g,type:bt,hp:bt.hp*mul,maxHp:bt.hp*mul,dmg:bt.dmg*mul,speed:bt.speed,atkCD:0,scale:bt.scale,special:0,telegraph:null};

announceBoss(bt.name);doScreenShake(1.2);doFlash('#ff0000',0.4);Audio2.sfx('boss');

function startWave(){wave++;
if(gameMode==='survival')state.highWave=Math.max(state.highWave,wave);
state.modeRecords[gameMode]=Math.max(state.modeRecords[gameMode]||0,wave);
announceWave(wave);
let isBoss=wave%5===0;
if(gameMode==='bossrush')isBoss=true;
if(gameMode==='timeattack')isBoss=false;
currentMutator=null;
if(!isBoss&&wave>=3&&Math.random()<0.45){currentMutator=MUTATORS[Math.floor(Math.random()*MUTATORS.length)];setTimeout(()=>announceMutator(currentMutator),900)}
if(isBoss){spawnBoss();waveMobsToSpawn=gameMode==='bossrush'?0:Math.floor(wave*0.7);waveSpawnTimer=2}
else{waveMobsToSpawn=5+wave*3;if(gameMode==='endless')waveMobsToSpawn=Math.floor((5+wave*3)*1.3);if(currentMutator&&currentMutator.id==='horde')waveMobsToSpawn=Math.floor(waveMobsToSpawn*1.6);if(gameMode==='timeattack')waveMobsToSpawn=999;waveSpawnTimer=0}
waveActive=true;betweenWaves=false;updateHUD()}

let mobileMove={x:0,y:0},mobileLook={x:0,y:0};
function bindJoystick(baseId,knobId,out){const base=document.getElementById(baseId),knob=document.getElementById(knobId);let id=null;
const R=48;
function set(t){const r=base.getBoundingClientRect();let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height/2);const m=Math.hypot(dx,dy);if(m>R){dx=dx/m*R;dy=dy/m*R}knob.style.transform=`translate(${dx}px,${dy}px)`;out.x=dx/R;out.y=dy/R}
base.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];id=t.identifier;set(t)},{passive:false});
base.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===id)set(t)},{passive:false});
const end=e=>{for(const t of e.changedTouches)if(t.identifier===id){id=null;knob.style.transform='';out.x=0;out.y=0}};
base.addEventListener('touchend',end);base.addEventListener('touchcancel',end)}
function setupMobile(){if(!document.getElementById('joyMove'))return;
bindJoystick('joyMove','knobMove',mobileMove);bindJoystick('joyLook','knobLook',mobileLook);
const atk=document.getElementById('mobAtk');atk.addEventListener('touchstart',e=>{e.preventDefault();attackHeld=true},{passive:false});atk.addEventListener('touchend',e=>{e.preventDefault();attackHeld=false},{passive:false});
const bind=(id,fn)=>{const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();fn()},{passive:false})};
bind('mobQ',()=>useSuper());bind('mobE',()=>useShield());bind('mobR',()=>useShadowForm());bind('mobPause',()=>pauseGame())}

const miniCv=document.getElementById('minimapCv'),miniCtx=miniCv&&miniCv.getContext('2d');
function drawMinimap(){if(!miniCtx||!player)return;const W=120,sc=120/74;miniCtx.clearRect(0,0,W,W);
miniCtx.save();miniCtx.translate(W/2,W/2);
miniCtx.fillStyle='rgba(120,80,200,0.15)';miniCtx.beginPath();miniCtx.arc(0,0,W/2-2,0,7);miniCtx.fill();
const px=camera.position.x,pz=camera.position.z;
mobs.forEach(m=>{if(m.dead)return;const x=(m.group.position.x-px)*sc,z=(m.group.position.z-pz)*sc;if(Math.hypot(x,z)<W/2-3){miniCtx.fillStyle='#ff4a4a';miniCtx.fillRect(x-1.5,z-1.5,3,3)}});
powerupOrbs.forEach(o=>{const x=(o.group.position.x-px)*sc,z=(o.group.position.z-pz)*sc;if(Math.hypot(x,z)<W/2-3){miniCtx.fillStyle='#4aff8a';miniCtx.fillRect(x-2,z-2,4,4)}});
if(boss){const x=(boss.group.position.x-px)*sc,z=(boss.group.position.z-pz)*sc;miniCtx.fillStyle='#ffaa00';miniCtx.beginPath();miniCtx.arc(Math.max(-W/2+4,Math.min(W/2-4,x)),Math.max(-W/2+4,Math.min(W/2-4,z)),4,0,7);miniCtx.fill()}
miniCtx.rotate(-yaw);miniCtx.fillStyle='#fff';miniCtx.beginPath();miniCtx.moveTo(0,-6);miniCtx.lineTo(4,5);miniCtx.lineTo(-4,5);miniCtx.closePath();miniCtx.fill();
miniCtx.restore()}

document.getElementById('hud').classList.remove('active');document.getElementById('vignette').classList.remove('active');
document.getElementById('shadowOverlay').style.opacity=0;
document.getElementById('pauseMenu').classList.remove('active');document.getElementById('gameOver').classList.remove('active');
document.getElementById('bossBar').classList.remove('active');document.getElementById('mobileControls').classList.remove('active');

function critChance(){return 0.12+(state.talents?(state.talents.crit||0)*0.03:0)}
function useSuper(){if(abilityCD.super>0)return;const c=player.char;abilityCD.super=c.superCD;Audio2.sfx('super');
if(c.ghostMechanic&&c.id===60){doShadowMasterSuper();return}
const fx=clanFx(c);const origin=camera.position.clone();
for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2;createProjectile(origin,new THREE.Vector3(Math.cos(a),0,Math.sin(a)),effDmg()*2.5,fx.proj,'super',fx.status)}
spawnSuperParticles(origin,new THREE.Color(fx.proj));
addTempLight(origin,fx.proj,4,30,0.6);
doScreenShake(1.0);doFlash('#'+fx.proj.toString(16).padStart(6,'0'),0.35);fovPunch=10;updateHUD()}
function doShadowMasterSuper(){smSuperActive=5;document.getElementById('shadowOverlay').style.opacity=0.7;doScreenShake(0.8);doFlash('#000000',0.5);Audio2.sfx('shadow');addTempLight(camera.position.clone(),0xff00ff,3,25,1.0)}
function useShield(){if(abilityCD.shield>0)return;abilityCD.shield=20;shieldActive=player.shieldDur;Audio2.sfx('shield');
if(!player.shieldMesh){const m=new THREE.Mesh(new THREE.SphereGeometry(1.5,20,20),new THREE.MeshBasicMaterial({color:0x4adaff,transparent:true,opacity:0.25,side:THREE.DoubleSide}));scene.add(m);player.shieldMesh=m}
player.shieldMesh.visible=true;updateHUD()}
function useShadowForm(){if(abilityCD.shadow>0)return;abilityCD.shadow=30;shadowFormActive=5+state.upgrades.shadow*0.5;document.getElementById('shadowOverlay').style.opacity=0.5;Audio2.sfx('shadow');
if(scene.fog)scene.fog.color.set(0x2a0a4a);updateHUD()}

function getForward(){return new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch)).multiplyScalar(-1).normalize()}
function doAttack(){const c=player.char;const fwd=getForward();const origin=camera.position.clone();const fx=clanFx(c);
if(player.atkType==='melee')meleeAttack(origin,fwd,fx);
else if(player.atkType==='ranged'){createProjectile(origin,fwd,effDmg(),fx.proj,'normal',fx.status);spawnAttackParticles(origin,fx.proj,fwd);Audio2.sfx('shoot')}
else aoeAttack(origin,fwd,fx)}
function meleeAttack(origin,fwd,fx){
const slash=new THREE.Mesh(new THREE.TorusGeometry(1.3,0.15,8,16,Math.PI),new THREE.MeshBasicMaterial({color:fx.slash,transparent:true,opacity:0.85}));
slash.position.copy(origin).addScaledVector(fwd,1.5);slash.rotateZ(Math.atan2(fwd.x,fwd.z));scene.add(slash);
arenaSlash={mesh:slash,life:0.25};
addTempLight(slash.position.clone(),fx.slash,2.2,9,0.2);Audio2.sfx('melee');
const range=3.2;[...mobs,...(boss?[boss]:[])].forEach(m=>{if(m.dead||m._dissolve!==undefined)return;const d=m.group.position.distanceTo(origin);if(d<range){const toM=m.group.position.clone().sub(origin).normalize();if(toM.dot(fwd)>0.25)damageMob(m,effDmg(),true,fx.status)}})}
function aoeAttack(origin,fwd,fx){
for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;createProjectile(origin,new THREE.Vector3(Math.cos(a),0,Math.sin(a)),effDmg()*0.7,fx.proj,'normal',fx.status)}
const ring=new THREE.Mesh(new THREE.RingGeometry(0.5,0.8,32),new THREE.MeshBasicMaterial({color:fx.proj,transparent:true,opacity:0.7,side:THREE.DoubleSide}));ring.rotation.x=-Math.PI/2;ring.position.copy(origin).setY(0.1);scene.add(ring);
arenaRings.push({mesh:ring,life:0.5,maxLife:0.5});
addTempLight(origin,fx.proj,2,10,0.3);Audio2.sfx('aoe')}
function projGeo(shape,size){switch(shape){
case'shard':return new THREE.OctahedronGeometry(size*1.3,0);
case'cube':return new THREE.BoxGeometry(size*1.6,size*1.6,size*1.6);
case'star':return new THREE.TetrahedronGeometry(size*1.5,0);
case'bolt':return new THREE.ConeGeometry(size*0.8,size*3,5);
default:return new THREE.SphereGeometry(size,8,8)}}
function createProjectile(origin,dir,dmg,color,kind,statusId){const fx=clanFx(player.char);const shape=kind==='super'?'sphere':fx.shape;const size=kind==='super'?0.25:fx.projSize;
const m=new THREE.Mesh(projGeo(shape,size),new THREE.MeshBasicMaterial({color}));
m.add(new THREE.Mesh(new THREE.SphereGeometry(size*1.9,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.3})));
m.position.copy(origin).addScaledVector(dir,1);scene.add(m);
m.add(new THREE.PointLight(color,1,6));
projectiles.push({mesh:m,vel:dir.clone().multiplyScalar(kind==='super'?28:22),dmg,life:2.5,color,kind,statusId:statusId||null,trail:fx.trail,trailRate:fx.trailRate})}

function damageMob(m,dmg,fromPlayer,statusId){if(m.dead||m._dissolve!==undefined)return;
let crit=false;
if(fromPlayer){if(Math.random()<critChance()){crit=true;dmg*=2.2;state.stats.critsLanded++}dmg*=statusDmgTaken(m);if(statusId)applyStatus(m,statusId)}
m.hp-=dmg;
spawnHitParticles(m.group.position.clone().setY(1),crit?0xff3a6a:(m===boss?0xffff00:0xffaa00));
floatDmg(m.group.position.clone().setY(2),(crit?'✦':'')+Math.round(dmg),crit?'#ff3a6a':(m===boss?'#ffff00':'#ffaa00'),crit);
Audio2.sfx('hit');
if(m===boss){if(m.hp<=0)killBoss(fromPlayer);else updateBossBar()}
else{if(m.hpfill)m.hpfill.scale.x=Math.max(0,m.hp/m.maxHp);if(m.hp<=0)killMob(m,fromPlayer)}}
function killMob(m,byPlayer){if(m.dead)return;m.dead=true;
spawnDeathParticles(m.group.position.clone().setY(1),m.type.color);
addTempLight(m.group.position.clone().setY(1),m.type.color,2,6,0.3);
m._dissolve=0.4;m._dissolveT=0.4;
kills++;Audio2.sfx('death');if(byPlayer)addCombo();
const golden=(currentMutator&&currentMutator.id==='golden')?2:1;const eliteC=m.elite?3:1;
const coinUp=(1+state.upgrades.magnet*0.15)*(isPowerupActive('magnet')?1.5:1)*comboMult()*(gameMode==='timeattack'?1.5:1)*golden*eliteC;
sessionCoins+=Math.round((5+wave*2)*coinUp);
if(m.elite){spawnPowerupOrb(m.group.position.clone());spawnSuperParticles(m.group.position.clone().setY(1),new THREE.Color(0xffaa00))}
else if(Math.random()<0.06)spawnPowerupOrb(m.group.position.clone());
updateHUD()}
function killBoss(byPlayer){if(!boss)return;const bp=boss.group.position.clone();
spawnSuperParticles(bp.clone().setY(2),new THREE.Color(boss.type.color));
addTempLight(bp.clone().setY(1),boss.type.color,5,30,1.0);doScreenShake(1.5);doFlash('#ffaa00',0.5);Audio2.sfx('bosskill');
const coinUp=(1+state.upgrades.magnet*0.15)*(gameMode==='bossrush'?1.5:1);const cg=Math.round((200+wave*30)*coinUp);sessionCoins+=cg;state.gems+=2;state.stats.bossesKilled++;
for(let i=0;i<20;i++)spawnParticle(bp.clone().setY(1),0xffcc44,new THREE.Vector3((Math.random()-0.5)*8,Math.random()*8+2,(Math.random()-0.5)*8),1.5);
kills++;if(byPlayer)addCombo();spawnPowerupOrb(bp.clone());
toast('BOSS POKONANY! +'+cg+'💰 +2💎');
if(player.isGhost&&player.char.ghostMechanic&&Math.random()<0.5)revivePlayer();
scene.remove(boss.group);if(boss.telegraph)scene.remove(boss.telegraph);boss=null;
bossProjectiles.forEach(p=>scene.remove(p.mesh));bossProjectiles=[];
document.getElementById('bossBar').classList.remove('active');updateHUD()}
function damagePlayer(dmg){if(player.isGhost)return;if(shieldActive>0||shadowFormActive>0||smSuperActive>0)return;
player.hp-=dmg;doHitIndicator();doScreenShake(0.4);Audio2.sfx('hurt');
if(player.hp<=0)playerDeath();updateHUD()}
function playerDeath(){const c=player.char;
if(c.ghostMechanic&&!player.isGhost&&Math.random()<0.5){player.isGhost=true;player.hp=player.maxHp*0.5;player.atkType='melee';player.dmg=c.dmg*0.6;toast('FORMA DUCHA! Zabij bossa aby się odrodzić.');document.getElementById('shadowOverlay').style.opacity=0.6;return}
doGameOver()}
function revivePlayer(){player.isGhost=false;player.hp=player.maxHp;player.atkType=player.baseAtkType;player.dmg=player.baseDmg;toast('ODRODZONY! Mistrz Cieni powstaje!');document.getElementById('shadowOverlay').style.opacity=0;doFlash('#ff00ff',0.4)}
function doGameOver(){gameRunning=false;Audio2.stopMusic();
state.coins+=sessionCoins;state.totalKills+=kills;saveState();checkMilestones();
if(document.pointerLockElement)document.exitPointerLock();
document.getElementById('mobileControls').classList.remove('active');
const gm=GAME_MODES.find(m=>m.id===gameMode);
document.getElementById('goStats').innerHTML=`Tryb: <b>${gm?gm.name:''}</b><br>Fala: <b>${wave}</b><br>Zabójstwa: <b>${kills}</b><br>Najlepsze combo: <b>x${comboCount>state.stats.bestCombo?comboCount:state.stats.bestCombo}</b><br>Zdobyte monety: <b>${sessionCoins}💰</b>`;
document.getElementById('gameOver').classList.add('active');sessionCoins=0;kills=0}

function doScreenShake(amt){screenShake=Math.max(screenShake,amt)}
function doFlash(color,op){const f=document.getElementById('flash');f.style.transition='';f.style.background=color;f.style.opacity=op;requestAnimationFrame(()=>{f.style.transition='opacity .5s';f.style.opacity=0})}
function doHitIndicator(){const h=document.getElementById('hitInd');h.style.transition='';h.style.opacity=0.8;requestAnimationFrame(()=>{h.style.transition='opacity .4s';h.style.opacity=0})}
function floatDmg(worldPos,val,color,big){const v=worldPos.clone().project(camera);if(v.z>1)return;const x=(v.x*0.5+0.5)*innerWidth,y=(-v.y*0.5+0.5)*innerHeight;
const el=document.createElement('div');el.className='dmgnum';el.textContent=val;el.style.color=color;el.style.left=x+'px';el.style.top=y+'px';if(big)el.style.fontSize='28px';document.getElementById('app').appendChild(el);setTimeout(()=>el.remove(),1000)}
function announceWave(n){const e=document.getElementById('waveAnno');e.textContent='FALA '+n;e.classList.remove('show');void e.offsetWidth;e.classList.add('show')}
function announceBoss(name){const e=document.getElementById('bossAnno');e.style.color='#ff3a3a';e.style.textShadow='0 0 30px #ff0000';e.textContent='BOSS: '+name;e.classList.remove('show');void e.offsetWidth;e.classList.add('show')}

function updateHUD(){if(!player)return;
document.getElementById('hudWave').textContent=gameMode==='timeattack'?('⏱ '+Math.ceil(modeTimer)+'s'):('FALA '+(wave||1));
document.getElementById('hudCoin').textContent='💰 '+sessionCoins;
document.getElementById('hudKillN').textContent='☠ '+kills;
document.getElementById('hpFill').style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
document.getElementById('hpText').textContent=Math.ceil(player.hp)+' / '+Math.ceil(player.maxHp)+(player.isGhost?' 👻':'');
updateAbilityCD('abQ',abilityCD.super);updateAbilityCD('abE',abilityCD.shield);updateAbilityCD('abR',abilityCD.shadow);
updateAbilityCD('mobQ',abilityCD.super,'mcd');updateAbilityCD('mobE',abilityCD.shield,'mcd');updateAbilityCD('mobR',abilityCD.shadow,'mcd')}
function updateAbilityCD(id,cd,cls){const el=document.getElementById(id);if(!el)return;const cdEl=el.querySelector('.'+(cls||'cd'));if(!cdEl)return;if(cd>0){cdEl.style.display='flex';cdEl.textContent=Math.ceil(cd)}else cdEl.style.display='none'}
function updateBossBar(){if(!boss)return;document.getElementById('bossBarFill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%'}

function updateGame(dt){
state.stats.timePlayed+=dt;
if(mobileLook.x||mobileLook.y){const ms=state.sensitivity*0.7;yaw-=mobileLook.x*dt*ms;pitch-=mobileLook.y*dt*ms;pitch=Math.max(-1.4,Math.min(1.4,pitch))}
let spd=player.speed*(keys['ShiftLeft']||keys['ShiftRight']?1.6:1.0)*(shadowFormActive>0?1.6:1.0)*(player.isGhost?1.1:1.0)*(isPowerupActive('speed')?1.5:1.0);
const fwd2=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).multiplyScalar(-1);
const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
const move=new THREE.Vector3();
if(keys['KeyW'])move.add(fwd2);if(keys['KeyS'])move.sub(fwd2);if(keys['KeyA'])move.sub(right);if(keys['KeyD'])move.add(right);
if(mobileMove.x||mobileMove.y){move.add(fwd2.clone().multiplyScalar(-mobileMove.y));move.add(right.clone().multiplyScalar(mobileMove.x))}
if(move.lengthSq()>0){move.normalize().multiplyScalar(spd*dt);const nx=camera.position.x+move.x,nz=camera.position.z+move.z;if(Math.hypot(nx,nz)<34){camera.position.x=nx;camera.position.z=nz}}
const baseY=smSuperActive>0?0.3:1.6;
camera.position.y+=(baseY-camera.position.y)*Math.min(1,dt*8);
camera.lookAt(camera.position.clone().add(getForward()));
const fovBase=state.settings.fov||75;
if(fovPunch>0){fovPunch-=dt*40;camera.fov=fovBase+Math.max(0,fovPunch);camera.updateProjectionMatrix()}else if(Math.abs(camera.fov-fovBase)>0.3){camera.fov+=(fovBase-camera.fov)*Math.min(1,dt*5);camera.updateProjectionMatrix()}
if(attackCD>0)attackCD-=dt;
if(attackHeld&&attackCD<=0){doAttack();attackCD=(player.atkType==='melee'?0.4:0.35)*(isPowerupActive('rapid')?0.5:1)}
if(gameMode==='timeattack'&&waveActive){modeTimer-=dt;if(modeTimer<=0){modeTimer=0;doGameOver()}}
updateCombo(dt);updatePowerups(dt);
if(smSuperActive>0){smSuperActive-=dt;if(Math.random()<dt*8)[...mobs,...(boss?[boss]:[])].forEach(m=>{if(!m.dead&&m._dissolve===undefined&&m.group.position.distanceTo(camera.position)<10)damageMob(m,player.dmg*0.5,true,'weaken')});if(smSuperActive<=0)document.getElementById('shadowOverlay').style.opacity=shadowFormActive>0?0.5:0}
for(const k in abilityCD)if(abilityCD[k]>0)abilityCD[k]=Math.max(0,abilityCD[k]-dt);
if(shieldActive>0){shieldActive-=dt;if(player.shieldMesh){player.shieldMesh.position.copy(camera.position);player.shieldMesh.scale.setScalar(1+Math.sin(performance.now()*0.01)*0.05)}if(shieldActive<=0&&player.shieldMesh)player.shieldMesh.visible=false}
if(shadowFormActive>0){shadowFormActive-=dt;if(Math.random()<dt*10)spawnParticle(camera.position.clone().setY(0.5+Math.random()),0x9a4aff,new THREE.Vector3((Math.random()-0.5),Math.random()*2,(Math.random()-0.5)),0.6);if(shadowFormActive<=0){document.getElementById('shadowOverlay').style.opacity=smSuperActive>0?0.7:(player.isGhost?0.6:0);if(scene.fog)scene.fog.color.set(0x080812)}}
if(betweenWaves){betweenTimer-=dt;if(betweenTimer<=0)startWave()}
if(waveActive&&waveMobsToSpawn>0&&mobs.length<(isMobile?22:40)){waveSpawnTimer-=dt;if(waveSpawnTimer<=0){spawnMob();waveMobsToSpawn--;const swarm=(currentMutator&&currentMutator.id==='swarm')?0.5:1;waveSpawnTimer=Math.max(0.3,1.2-wave*0.03)*swarm*(gameMode==='timeattack'?0.6:1)}}
checkWaveEnd();
updateMobs(dt);
if(boss)updateBoss(dt);
updateBossProjectiles(dt);
updateShadowMinions(dt);
updateProjectiles(dt);
updateParticles(dt);
updateTempLights(dt);
updateArenaFX(dt);
if(arenaSlash){arenaSlash.life-=dt;arenaSlash.mesh.material.opacity=arenaSlash.life*3;arenaSlash.mesh.scale.setScalar(1+(0.25-arenaSlash.life)*2);if(arenaSlash.life<=0){scene.remove(arenaSlash.mesh);arenaSlash=null}}
arenaRings=arenaRings.filter(r=>{r.life-=dt;const t=1-r.life/r.maxLife;r.mesh.scale.setScalar(1+t*12);r.mesh.material.opacity=r.life/r.maxLife*0.7;if(r.life<=0){scene.remove(r.mesh);return false}return true});
if(screenShake>0){screenShake=Math.max(0,screenShake-dt*2);const s=screenShake*0.3;camera.position.x+=(Math.random()-0.5)*s;camera.position.z+=(Math.random()-0.5)*s}
drawMinimap();updateHUD()}
function updateMobs(dt){for(let i=mobs.length-1;i>=0;i--){const m=mobs[i];
if(m._dissolve!==undefined){m._dissolve-=dt;m.group.scale.setScalar(Math.max(0.01,m._dissolve/m._dissolveT));m.group.children[0].material.emissiveIntensity=0.2+(1-m._dissolve/m._dissolveT)*3;if(m._dissolve<=0){scene.remove(m.group);mobs.splice(i,1)}continue}
const slow=updateMobStatus(m,dt);if(m.dead||m._dissolve!==undefined)continue;
const toP=camera.position.clone().setY(0).sub(m.group.position.clone().setY(0));const d=toP.length();toP.normalize();
m.group.position.addScaledVector(toP,m.speed*dt*slow*(shadowFormActive>0?0.7:1));
m.group.lookAt(camera.position.x,m.group.position.y,camera.position.z);
if(m.hpfill)m.hpfill.lookAt(camera.position);
if(m.atkCD>0)m.atkCD-=dt;
if(d<1.8&&m.atkCD<=0){m.atkCD=1.2;damagePlayer(m.dmg)}}}
function bossPattern(m){const id=m.type.id;if(id==='omega')return['slam','volley','nova','blink'][Math.floor(Math.random()*4)];
return id==='guardian'?'slam':id==='titan'?'volley':id==='colossus'?'nova':id==='voidlord'?'blink':'slam'}
function fireBossProjectile(from,dir,dmg,color){const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.4,10,10),new THREE.MeshBasicMaterial({color}));mesh.add(new THREE.Mesh(new THREE.SphereGeometry(0.7,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.3})));mesh.add(new THREE.PointLight(color,1.5,8));mesh.position.copy(from);scene.add(mesh);bossProjectiles.push({mesh,vel:dir.clone().multiplyScalar(14),dmg,life:4,color})}
function updateBossProjectiles(dt){for(let i=bossProjectiles.length-1;i>=0;i--){const p=bossProjectiles[i];p.life-=dt;p.mesh.position.addScaledVector(p.vel,dt);
if(Math.random()<0.4)spawnParticle(p.mesh.position.clone(),p.color,new THREE.Vector3(0,0,0),0.3,false);
if(p.mesh.position.distanceTo(camera.position)<1.4){damagePlayer(p.dmg);scene.remove(p.mesh);bossProjectiles.splice(i,1);continue}
if(p.life<=0||Math.hypot(p.mesh.position.x,p.mesh.position.z)>42){scene.remove(p.mesh);bossProjectiles.splice(i,1)}}}
function updateBoss(dt){const m=boss;const toP=camera.position.clone().setY(0).sub(m.group.position.clone().setY(0));const d=toP.length();toP.normalize();
const wantDist=m.type.id==='titan'?14:m.type.id==='voidlord'?10:2;
if(d>wantDist)m.group.position.addScaledVector(toP,m.speed*dt);
else if(d<wantDist-3)m.group.position.addScaledVector(toP,-m.speed*dt*0.5);
m.group.lookAt(camera.position.x,m.group.position.y,camera.position.z);
m.group.rotation.y+=Math.sin(performance.now()*0.002)*0.01;
if(m.atkCD>0)m.atkCD-=dt;
if(d<3.5&&m.atkCD<=0){m.atkCD=2.0;damagePlayer(m.dmg)}
m.special+=dt;const interval=m.type.id==='omega'?3.5:5;
if(m.special>interval&&!m.telegraph){m._pattern=bossPattern(m);
if(m._pattern==='volley'){const bp=m.group.position.clone().setY(2*m.scale);const base=camera.position.clone().sub(bp).normalize();for(let k=-2;k<=2;k++){const ang=Math.atan2(base.x,base.z)+k*0.18;fireBossProjectile(bp.clone(),new THREE.Vector3(Math.sin(ang),0,Math.cos(ang)),m.dmg*0.8,m.type.color)}Audio2.sfx('aoe');m.special=0}
else if(m._pattern==='blink'){const a=Math.random()*Math.PI*2;m.group.position.set(camera.position.x+Math.cos(a)*5,0,camera.position.z+Math.sin(a)*5);spawnSuperParticles(m.group.position.clone().setY(2),new THREE.Color(m.type.color));addTempLight(m.group.position.clone().setY(2),m.type.color,4,20,0.5);doScreenShake(0.5);Audio2.sfx('shadow');m.special=0}
else{const tgPos=m._pattern==='nova'?m.group.position.clone():camera.position.clone();const rad=m._pattern==='nova'?7:4;const tg=new THREE.Mesh(new THREE.RingGeometry(rad-1,rad,40),new THREE.MeshBasicMaterial({color:m.type.color,transparent:true,opacity:0.5,side:THREE.DoubleSide}));tg.rotation.x=-Math.PI/2;tg.position.copy(tgPos).setY(0.1);scene.add(tg);m.telegraph=tg;m._tgT=1.2;m._tgRad=rad}}
if(m.telegraph){m._tgT-=dt;m.telegraph.material.opacity=0.3+Math.abs(Math.sin(m._tgT*10))*0.4;if(m._tgT<=0){const ep=m.telegraph.position.clone();if(camera.position.distanceTo(ep)<m._tgRad){damagePlayer(m.dmg*1.5)}spawnSuperParticles(ep.clone().setY(1),new THREE.Color(m.type.color));addTempLight(ep.clone().setY(1),m.type.color,3,m._tgRad*3,0.4);doScreenShake(0.6);scene.remove(m.telegraph);m.telegraph=null;m.special=0}}
updateBossBar()}
function updateShadowMinions(dt){for(const sm of shadowMinions){
if(sm.dead){sm.respawn-=dt;if(sm.respawn<=0){sm.dead=false;sm.hp=sm.maxHp;sm.group.visible=true;const a=Math.random()*Math.PI*2;sm.group.position.set(camera.position.x+Math.cos(a)*3,0,camera.position.z+Math.sin(a)*3)}continue}
let tgt=null,bd=999;[...mobs.filter(m=>!m.dead&&m._dissolve===undefined),...(boss?[boss]:[])].forEach(m=>{const d=m.group.position.distanceTo(sm.group.position);if(d<bd){bd=d;tgt=m}});
if(tgt){const toT=tgt.group.position.clone().setY(0).sub(sm.group.position.clone().setY(0));const d=toT.length();toT.normalize();
if(d>1.5)sm.group.position.addScaledVector(toT,sm.speed*dt);
sm.group.lookAt(tgt.group.position.x,sm.group.position.y,tgt.group.position.z);
if(sm.atkCD>0)sm.atkCD-=dt;
if(d<2.0&&sm.atkCD<=0){sm.atkCD=1.0;damageMob(tgt,sm.dmg,false)}}
else{const toP=camera.position.clone().setY(0).sub(sm.group.position.clone().setY(0));if(toP.length()>4)sm.group.position.addScaledVector(toP.normalize(),sm.speed*dt)}
sm.group.position.y=Math.sin(performance.now()*0.003+sm.data.id)*0.1}}
function updateProjectiles(dt){for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.life-=dt;
p.mesh.position.addScaledVector(p.vel,dt);p.mesh.rotation.x+=dt*8;p.mesh.rotation.y+=dt*6;
if(Math.random()<(p.trailRate||0.5))spawnParticle(p.mesh.position.clone(),p.trail||p.color,new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)),0.3,false);
let hit=false;
for(const m of [...mobs.filter(m=>!m.dead&&m._dissolve===undefined),...(boss?[boss]:[])]){if(m.group.position.distanceTo(p.mesh.position)<1.2*(m.scale||1)){damageMob(m,p.dmg,true,p.statusId);hit=true;break}}
if(hit||p.life<=0||Math.hypot(p.mesh.position.x,p.mesh.position.z)>40){scene.remove(p.mesh);projectiles.splice(i,1)}}}
function updateArenaFX(dt){const t=performance.now()*0.001;
arenaOrbs.forEach((o,i)=>{o.material.emissiveIntensity=1.2+Math.sin(t*2+i)*0.6});
arenaRunes.forEach((r,i)=>{r.material.opacity=0.3+Math.sin(t*1.5+i)*0.2});
if(atmosParticles){const pos=atmosParticles.geometry.attributes.position;for(let i=0;i<pos.count;i++){let y=pos.getY(i)+dt*0.5;if(y>15)y=0;pos.setY(i,y)}pos.needsUpdate=true}}

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);
if(crateActive){updateCrateAnim(dt);renderer.render(crateScene,crateCam);return}
if(scene&&gameRunning){if(!gamePaused)updateGame(dt);renderer.render(scene,camera)}}
animate();

addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);if(camera){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}if(crateCam){crateCam.aspect=innerWidth/innerHeight;crateCam.updateProjectionMatrix()}});

updateCurrency();
</script>
</body>
</html>
