<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mage Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT / RESET
============================================================ */
:root{
  --bg:#0a0a0f;
  --panel:#111122;
  --panel-alpha:rgba(17,17,34,.85);
  --gold:#ffd866;
  --text:#e8e4ff;
  --muted:#9aa;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Cinzel',serif;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
#app{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;}
h1,h2,h3,h4{font-family:'MedievalSharp',cursive;margin:0 0 8px;letter-spacing:1px;}
button{
  font-family:'Cinzel',serif;
  background:linear-gradient(180deg,#1c1c33,#0d0d18);
  color:var(--text);
  border:2px solid #4a4a7a;
  border-radius:6px;
  padding:10px 18px;
  cursor:pointer;
  font-size:15px;
  letter-spacing:.5px;
  transition:all .15s ease;
  text-shadow:0 0 6px rgba(255,255,255,.2);
}
button:hover:not(:disabled){
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(255,216,102,.6);
  transform:translateY(-1px);
}
button:active:not(:disabled){transform:translateY(1px);}
button:disabled{opacity:.4;cursor:not-allowed;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#4a4a7a;border-radius:4px;}
::-webkit-scrollbar-track{background:#0a0a14;}

.hidden{display:none !important;}

/* ============================================================
   STARFIELD / AMBIENT BACKGROUND
============================================================ */
.starfield{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a0f 55%, #050508 100%);
  overflow:hidden;
  z-index:0;
}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{
  0%,100%{opacity:.15;}
  50%{opacity:1;}
}
.dust{
  position:absolute;border-radius:50%;
  pointer-events:none;
  animation:driftDust linear infinite;
}
@keyframes driftDust{
  0%{transform:translate(0,0);}
  100%{transform:translate(var(--dx,40px),var(--dy,-60px));}
}

/* ============================================================
   GENERIC PANEL
============================================================ */
.panel{
  background:var(--panel-alpha);
  border:2px solid var(--glow,#5a5acc);
  border-radius:10px;
  box-shadow:0 0 20px var(--glow,#5a5acc), inset 0 0 30px rgba(0,0,0,.4);
  padding:16px;
  backdrop-filter:blur(2px);
}

/* ============================================================
   SCREEN LAYOUT
============================================================ */
.screen{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  z-index:1;
}

/* ---------- TITLE SCREEN ---------- */
#screen-title{
  text-align:center;
}
.title-logo{
  font-size:64px;
  font-family:'MedievalSharp',cursive;
  background:linear-gradient(180deg,#fff,#ffd866 40%,#ff8800 80%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 30px rgba(255,180,60,.5);
  animation:titleGlow 4s ease-in-out infinite;
  margin-bottom:6px;
}
@keyframes titleGlow{
  0%,100%{filter:drop-shadow(0 0 12px rgba(255,150,40,.5));}
  50%{filter:drop-shadow(0 0 28px rgba(255,210,120,.9));}
}
.title-sub{color:var(--muted);margin-bottom:30px;letter-spacing:3px;font-size:13px;text-transform:uppercase;}
.title-menu{display:flex;flex-direction:column;gap:12px;width:260px;}
.title-menu button{font-size:18px;padding:14px;}

/* ---------- CLASS SELECT ---------- */
#screen-classselect{padding:20px;overflow-y:auto;}
.cs-wrap{max-width:1200px;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;}
.cs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;}
@media (max-width:1000px){.cs-grid{grid-template-columns:repeat(2,1fr);}}
.class-card{
  --glow:#5a5acc;
  cursor:pointer;
  text-align:center;
  padding:12px;
  transition:transform .2s, box-shadow .2s;
  position:relative;
  overflow:hidden;
}
.class-card:hover{transform:translateY(-4px) scale(1.03);}
.class-card.selected{
  box-shadow:0 0 30px var(--glow), inset 0 0 40px var(--glow);
  border-width:3px;
}
.class-card canvas{display:block;margin:0 auto;}
.class-card h3{font-size:15px;margin-top:6px;}
.cs-detail{
  width:100%;max-width:900px;
  min-height:170px;
  animation:revealIn .4s ease;
}
@keyframes revealIn{
  from{opacity:0;transform:translateY(20px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.cs-detail-body{display:flex;gap:20px;flex-wrap:wrap;}
.cs-stats{flex:1;min-width:220px;}
.cs-bar-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;}
.cs-bar-row .label{width:90px;color:var(--muted);}
.cs-bar-track{flex:1;height:8px;background:#222236;border-radius:4px;overflow:hidden;}
.cs-bar-fill{height:100%;border-radius:4px;width:0%;transition:width .6s cubic-bezier(.2,.9,.3,1.3);}
.cs-passive{flex:1;min-width:240px;}
.cs-passive .name{color:var(--gold);font-size:14px;margin-bottom:4px;}

/* ---------- CITY HUB ---------- */
#screen-city{padding:0;}
.city-scene{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#06060f 0%,#0c0c1c 55%,#15101c 100%);
  overflow:hidden;
}
.city-skyline{
  position:absolute;bottom:0;left:0;right:0;height:55%;
  display:flex;align-items:flex-end;justify-content:space-around;
}
.building{
  position:relative;
  background:linear-gradient(180deg,#1c1830,#0c0a16);
  border:1px solid #2c2840;
  border-bottom:none;
  border-radius:4px 4px 0 0;
  box-shadow:0 0 18px rgba(120,90,255,.08) inset;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding-top:10px;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s;
}
.building:hover{transform:translateY(-6px);box-shadow:0 0 25px var(--glow,#ffcf6a);}
.building .icon{font-size:34px;filter:drop-shadow(0 0 8px currentColor);}
.building .lbl{font-size:11px;margin-top:6px;color:var(--gold);text-align:center;padding:0 4px;}
/* ---------- MOBILE / NARROW SCREENS ---------- */
@media (max-width:700px){
  .city-skyline{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-auto-rows:92px;
    gap:8px;
    height:auto;max-height:74%;
    padding:8px 8px 12px;
    overflow-y:auto;
    align-items:stretch;justify-content:stretch;
  }
  .building{width:100% !important;height:100% !important;padding-top:8px;border-radius:8px;}
  .building .icon{font-size:24px;}
  .building .lbl{font-size:9.5px;line-height:1.2;}
  .lantern{display:none;}
}

.lantern{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#ffcf6a;box-shadow:0 0 12px 4px #ffcf6a, 0 0 30px 10px rgba(255,180,60,.4);
  animation:lanternFlicker 2.4s infinite ease-in-out;
}
@keyframes lanternFlicker{
  0%,100%{opacity:.7;transform:scale(1);}
  50%{opacity:1;transform:scale(1.15);}
}
.cobble{
  position:absolute;left:0;right:0;bottom:0;height:14%;
  background:repeating-linear-gradient(90deg,#15131f 0 18px,#1c1a28 18px 36px);
  box-shadow:0 -10px 30px rgba(0,0,0,.6) inset;
  pointer-events:none;
}
.city-topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;z-index:5;
  background:linear-gradient(180deg,rgba(5,5,10,.85),transparent);
}
.city-topbar .stat-chip{
  --glow:#5a5acc;
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;margin-right:8px;font-size:13px;
}
.city-title{
  position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
  animation:cityTitleFade 2.5s ease forwards;
}
@keyframes cityTitleFade{
  0%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;}
}
.city-title .big{font-size:42px;color:var(--gold);text-shadow:0 0 20px rgba(255,216,102,.7);}

/* ---------- MODAL OVERLAYS ---------- */
.modal-overlay{
  position:absolute;inset:0;z-index:50;
  background:rgba(2,2,8,.7);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  --glow:#5a5acc;
  width:min(920px,94vw);max-height:88vh;overflow-y:auto;
  animation:revealIn .25s ease;
  position:relative;
}
.modal .close-btn{position:absolute;top:10px;right:10px;}
.modal h2{text-align:center;color:var(--gold);margin-bottom:14px;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:10px;}
.item-card{
  --glow:#4a4a7a;
  padding:10px;font-size:12px;position:relative;cursor:pointer;
  transition:transform .15s;
}
.item-card:hover{transform:translateY(-3px);}
.item-card.equipped{border-color:var(--gold);box-shadow:0 0 14px var(--gold);}
.item-card .iname{color:var(--gold);font-size:13px;display:block;margin-bottom:4px;}
.item-card .iprice{color:#7fff9a;font-size:12px;}
.item-card .istats{color:var(--muted);font-size:11px;line-height:1.5;margin:4px 0;}
.item-icon{
  width:46px;height:46px;margin:0 auto 6px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
  box-shadow:0 0 14px var(--glow) inset, 0 0 8px var(--glow);
}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.tabs button.active{border-color:var(--gold);box-shadow:0 0 10px var(--gold);}

/* ---------- BOUNTY ---------- */
.bounty-row{margin:10px 0;padding:10px;}
.bounty-row .btitle{color:var(--gold);font-size:14px;margin-bottom:6px;}
.bounty-bar{height:10px;background:#222236;border-radius:5px;overflow:hidden;border:1px solid #333355;}
.bounty-bar-fill{height:100%;background:linear-gradient(90deg,#5a5acc,#9a9aff);transition:width .4s;}
.bounty-row.complete{border-color:var(--gold);box-shadow:0 0 16px var(--gold);}
.fireworks-overlay{position:absolute;inset:0;pointer-events:none;z-index:80;}

/* ---------- CHARACTER SCREEN ---------- */
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:760px){.char-grid{grid-template-columns:1fr;}}
.stat-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px dashed #2a2a44;}
.spell-loadout{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.spell-slot{
  width:64px;height:64px;border:2px solid #4a4a7a;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  cursor:pointer;position:relative;background:rgba(0,0,0,.3);
  transition:box-shadow .2s;
}
.spell-slot.empty{opacity:.4;}
.spell-slot.drag-over{box-shadow:0 0 14px var(--gold);}
.spell-list-item{
  display:flex;align-items:center;gap:10px;padding:8px;margin:4px 0;
  border:1px solid #333355;border-radius:6px;cursor:grab;
  background:rgba(255,255,255,.02);
}
.spell-list-item.mastery-apprentice{border-color:#c0c0c0;box-shadow:0 0 6px #c0c0c0;}
.spell-list-item.mastery-adept{border-color:#7fd0ff;box-shadow:0 0 8px #7fd0ff;}
.spell-list-item.mastery-mastered{border-color:#ffd866;box-shadow:0 0 12px #ffd866;}
.spell-list-item .sicon{font-size:22px;width:30px;text-align:center;}
.spell-list-item .sinfo{flex:1;font-size:11px;}
.spell-list-item .sname{font-size:13px;color:var(--text);}
.mastery-bar{height:5px;background:#222236;border-radius:3px;overflow:hidden;margin-top:3px;}
.mastery-bar-fill{height:100%;background:linear-gradient(90deg,#7fd0ff,#ffd866);}
.mech-bar{height:14px;background:#222236;border-radius:7px;overflow:hidden;border:1px solid #333355;margin:6px 0;}
.mech-bar-fill{height:100%;transition:width .3s;}

/* ============================================================
   COMBAT SCREEN
============================================================ */
#screen-combat{padding:0;}
#combatCanvas{
  position:absolute;inset:0;width:100%;height:100%;
  background:#08060c;
  touch-action:none;
}
.hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
.hud *{pointer-events:auto;}
.hud-top-left{position:absolute;top:10px;left:10px;width:280px;}
.bar-row{margin-bottom:6px;}
.bar-label{font-size:11px;display:flex;justify-content:space-between;color:var(--muted);margin-bottom:2px;}
.bar-track{height:14px;border-radius:7px;overflow:hidden;background:#1a1a2e;border:1px solid #333355;position:relative;}
.bar-fill{height:100%;transition:width .25s ease;}
.bar-hp .bar-fill{background:linear-gradient(90deg,#7a1010,#ff3030);}
.bar-mana .bar-fill{background:linear-gradient(90deg,#1030a0,#40a0ff);}
.bar-stamina .bar-fill{background:linear-gradient(90deg,#5a7a10,#aaff40);}
.bar-xp .bar-fill{background:linear-gradient(90deg,#9966ff,#ffd866);}
.bar-hp.pulse-low .bar-fill{animation:pulseRed .6s infinite;}
.bar-mana.pulse-low .bar-fill{animation:pulseBlue .6s infinite;}
@keyframes pulseRed{0%,100%{filter:brightness(1);}50%{filter:brightness(1.8);box-shadow:0 0 16px #ff3030;}}
@keyframes pulseBlue{0%,100%{filter:brightness(1);}50%{filter:brightness(1.8);box-shadow:0 0 16px #40a0ff;}}

.hud-top-center{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;width:60%;max-width:600px;}
.boss-bar-wrap{display:none;}
.boss-bar-wrap.active{display:block;}
.boss-name{font-size:16px;color:#ff6a6a;text-shadow:0 0 10px #ff2020;margin-bottom:3px;text-align:center;}
.boss-bar-track{height:18px;border-radius:9px;overflow:hidden;background:#1a1a2e;border:2px solid #663333;position:relative;}
.boss-bar-fill{height:100%;background:linear-gradient(90deg,#7a0010,#ff3050);transition:width .3s;}
.boss-phase-marks{position:absolute;inset:0;display:flex;}
.boss-phase-marks div{flex:1;border-right:2px solid #000;}
.boss-phase-marks div:last-child{border-right:none;}

.hud-top-right{position:absolute;top:10px;right:10px;text-align:right;}
.wave-chip{ --glow:#5a5acc; padding:6px 14px;font-size:13px;display:inline-block;margin-bottom:6px;}
.diff-badge{ --glow:#ffd866; padding:4px 10px;font-size:11px;display:inline-block;color:var(--gold);}

.hud-bottom{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:14px;padding:0 10px;}
.spellbar{display:flex;gap:8px;}
.spell-btn{
  width:58px;height:58px;border-radius:10px;position:relative;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  border:2px solid #4a4a7a;background:rgba(10,10,20,.8);
  transition:transform .1s;
}
.spell-btn .key{position:absolute;top:2px;left:4px;font-size:9px;color:var(--muted);}
.spell-btn .cd-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border-radius:8px;
}
.spell-btn.mastery-apprentice{border-color:#c0c0c0;box-shadow:0 0 6px #c0c0c0;}
.spell-btn.mastery-adept{border-color:#7fd0ff;box-shadow:0 0 8px #7fd0ff;}
.spell-btn.mastery-mastered{border-color:#ffd866;box-shadow:0 0 12px #ffd866;animation:masteredGlow 2s infinite;}
@keyframes masteredGlow{0%,100%{box-shadow:0 0 8px #ffd866;}50%{box-shadow:0 0 18px #ffd866;}}
.spell-btn.cast-flash{animation:castFlash .3s;}
@keyframes castFlash{0%{box-shadow:0 0 30px #fff;}100%{box-shadow:none;}}

.potionbar{display:flex;gap:8px;}
.potion-btn{
  width:46px;height:46px;border-radius:50%;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #4a4a7a;background:rgba(10,10,20,.8);position:relative;
}
.potion-btn .count{position:absolute;bottom:-2px;right:-2px;background:#222;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;border:1px solid #555;}

.hud-mechanic{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:240px;text-align:center;}
.hud-mechanic .mech-label{font-size:11px;color:var(--muted);margin-bottom:2px;}

.combo-hint{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-size:11px;color:#ffd866;opacity:.85;text-align:center;}

/* ---------- VIRTUAL JOYSTICK (mobile movement) ---------- */
.joystick-zone{
  position:absolute;left:18px;bottom:18px;width:120px;height:120px;
  touch-action:none;
}
.joystick-base{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(20,18,40,.35);
  border:2px solid rgba(160,150,255,.35);
  box-shadow:0 0 14px rgba(120,100,255,.15) inset;
}
.joystick-stick{
  position:absolute;left:50%;top:50%;width:48px;height:48px;
  margin:-24px 0 0 -24px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#bcb4ff,#5a4fb0);
  border:2px solid rgba(255,255,255,.45);
  box-shadow:0 0 14px rgba(140,120,255,.6);
  transition:transform .04s linear;
}
/* ---------- BLOCK BUTTON (Earth mage) ---------- */
.block-btn{
  position:absolute;right:18px;bottom:18px;width:62px;height:62px;
  border-radius:50%;font-size:24px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #886600;background:rgba(10,10,20,.8);
  touch-action:none;-webkit-tap-highlight-color:transparent;
}
.block-btn.blocking{border-color:#ffd866;box-shadow:0 0 16px #ffd866;transform:scale(.92);}
@media (max-width:700px){
  .joystick-zone{left:10px;bottom:10px;width:104px;height:104px;}
  .joystick-stick{width:42px;height:42px;margin:-21px 0 0 -21px;}
  .block-btn{right:10px;bottom:10px;width:54px;height:54px;font-size:20px;}
  /* stack potion bar above spell bar so both fit above the joystick/block button */
  .hud-bottom{
    flex-direction:column-reverse;align-items:center;
    bottom:122px;gap:6px;
  }
  .spell-btn{width:50px;height:50px;font-size:20px;border-radius:8px;}
  .potion-btn{width:38px;height:38px;font-size:15px;}
  .hud-mechanic{bottom:228px;width:200px;}
  .combo-hint{bottom:264px;font-size:9.5px;}
  .boss-dialogue{bottom:300px;width:88vw;font-size:13px;}
}

/* ---------- TURN-BASED DUEL CONTROLS ---------- */
.spell-btn .rngmark{position:absolute;bottom:1px;right:4px;font-size:11px;color:#9fa8d8;opacity:.8;}
.spell-btn.tb-unavail{opacity:.4;filter:grayscale(.5);}
.spell-btn.tb-oor{border-color:#aa6644;box-shadow:0 0 8px rgba(200,90,40,.5);opacity:.7;}
.turn-controls{
  position:absolute;left:0;right:0;bottom:10px;z-index:25;
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:0 12px;pointer-events:none;
}
.turn-controls>*{pointer-events:auto;}
.tc-btn{
  width:70px;height:70px;border-radius:16px;font-size:30px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #5a5a9a;background:rgba(14,12,28,.85);color:#cfd0ff;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tc-btn:active{transform:scale(.92);}
.tc-btn:disabled{opacity:.3;}
.tc-center{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:170px;}
.tc-turn{font-family:'Cinzel',serif;font-weight:700;font-size:15px;letter-spacing:1px;color:#ffd866;text-shadow:0 0 8px rgba(0,0,0,.8);}
.tc-pips{font-size:11px;color:#bdb6ff;letter-spacing:1px;}
.tc-pips .pip{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 1px;background:#2a2a44;border:1px solid #55557f;vertical-align:middle;}
.tc-pips .pip.on{background:#ffd866;border-color:#ffd866;box-shadow:0 0 6px #ffd866;}
.tc-end{
  padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;
  border:2px solid #886600;background:linear-gradient(180deg,#3a2e10,#1a1408);color:#ffd866;
}
.tc-end:disabled{opacity:.35;}
.tb-mode .hud-bottom{bottom:92px;}

@media (max-width:700px){
  .tb-mode .hud-bottom{flex-direction:row;flex-wrap:wrap;justify-content:center;bottom:96px;gap:6px;}
  .tc-btn{width:58px;height:58px;font-size:24px;border-radius:13px;}
  .tc-center{min-width:130px;}
  .tc-turn{font-size:13px;}
  .tc-end{padding:6px 12px;font-size:11px;}
}
@media (max-height:520px){
  .tb-mode .hud-bottom{bottom:78px;}
  .tc-btn{width:52px;height:52px;font-size:22px;}
}

/* center-screen big text events */
.center-banner{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;z-index:30;
}
.center-banner .txt{
  font-family:'MedievalSharp',cursive;font-size:44px;font-weight:700;
  text-shadow:0 0 20px currentColor, 0 0 40px currentColor;
  opacity:0;
}
.banner-pop{animation:bannerPop 2.6s ease forwards;}
@keyframes bannerPop{
  0%{opacity:0;transform:scale(.5);}
  15%{opacity:1;transform:scale(1.1);}
  25%{transform:scale(1);}
  75%{opacity:1;}
  100%{opacity:0;transform:scale(1.05);}
}
.wave-banner{
  position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;z-index:29;
}
.wave-banner .txt{
  font-size:38px;color:var(--gold);text-shadow:0 0 24px rgba(255,216,102,.8);
  opacity:0;letter-spacing:4px;
}
.wave-pop{animation:bannerPop 2.4s ease forwards;}

.levelup-flash{
  position:absolute;inset:0;background:radial-gradient(circle,rgba(255,230,150,.9),rgba(255,200,60,.1));
  opacity:0;pointer-events:none;z-index:60;
}
.levelup-flash.show{animation:levelFlash 1.4s ease;}
@keyframes levelFlash{
  0%{opacity:0;}
  20%{opacity:1;}
  100%{opacity:0;}
}
.levelup-text{
  position:absolute;top:18%;left:50%;transform:translate(-50%,-50%);
  font-size:36px;color:#ffe9a8;text-shadow:0 0 30px #ffd866;
  opacity:0;pointer-events:none;z-index:61;letter-spacing:4px;
}
.levelup-text.show{animation:bannerPop 1.8s ease;}

.screen-shake{animation:shakeFx .35s;}
@keyframes shakeFx{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-10px,4px);}
  40%{transform:translate(8px,-6px);}
  60%{transform:translate(-6px,6px);}
  80%{transform:translate(6px,-3px);}
}

.killstreak-banner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:50px;font-weight:900;text-align:center;pointer-events:none;z-index:31;
  text-shadow:0 0 24px currentColor,0 0 50px currentColor;
  opacity:0;
}
.ks-pop{animation:ksPop 1.6s ease forwards;}
@keyframes ksPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-8deg);}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(2deg);}
  35%{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
  80%{opacity:1;}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(0deg);}
}

.combo-cast-flash{
  position:absolute;top:22%;left:50%;transform:translate(-50%,-50%);
  font-size:34px;color:#fff;text-shadow:0 0 20px #fff,0 0 40px #ffd866;
  opacity:0;pointer-events:none;z-index:32;letter-spacing:3px;
}
.combo-cast-flash.show{animation:bannerPop 1.4s ease;}

/* boss intro darken */
.boss-intro-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:55;
}
.boss-intro-overlay.show{animation:bossDarken 2s ease forwards;}
@keyframes bossDarken{
  0%{background:rgba(0,0,0,0);}
  30%{background:rgba(0,0,0,.85);}
  100%{background:rgba(0,0,0,0);}
}
.boss-dialogue{
  position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
  width:min(640px,90vw);text-align:center;font-size:15px;
  color:#ffb0b0;opacity:0;
}
.boss-dialogue.show{animation:bannerPop 3.5s ease;}

/* pause / menu */
.combat-menu-btn{position:absolute;top:10px;left:50%;transform:translateX(-50%);}

/* ---------- DEATH SCREEN ---------- */
#screen-death{text-align:center;}
.death-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;text-align:left;margin:14px 0;font-size:13px;}
.death-stats b{color:var(--gold);}

/* ---------- TOOLTIP ---------- */
.tooltip{
  position:absolute;z-index:200;background:#0a0a16;border:1px solid var(--gold);
  border-radius:6px;padding:8px 10px;font-size:11px;max-width:220px;
  box-shadow:0 0 14px rgba(0,0,0,.6);pointer-events:none;
}

/* ---------- GAME MODE SELECT ---------- */
/* landscape-first: keep the three modes side-by-side, shrink instead of stacking */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:14px 0;}
.mode-card{--glow:#5a5acc;text-align:center;cursor:pointer;padding:18px;transition:transform .2s;}
.mode-card:hover{transform:translateY(-4px);}
.mode-card.locked{opacity:.45;cursor:not-allowed;}
.mode-card .micon{font-size:38px;margin-bottom:6px;}
@media (max-width:760px){
  .mode-grid{gap:8px;margin:10px 0;}
  .mode-card{padding:9px 6px;}
  .mode-card h3{font-size:14px;margin:2px 0;}
  .mode-card .micon{font-size:26px;margin-bottom:2px;}
  .mode-card .muted{font-size:10px;line-height:1.3;}
}
@media (max-height:520px){
  .mode-grid{margin:8px 0;}
  .mode-card{padding:7px 6px;}
  .mode-card .micon{font-size:22px;}
}
.diff-grid{display:flex;gap:10px;justify-content:center;margin-top:12px;}
.diff-btn.active{border-color:var(--gold);box-shadow:0 0 12px var(--gold);}

/* ---------- rotate-to-landscape hint (portrait phones) ---------- */
#rotateHint{
  display:none;position:fixed;inset:0;z-index:9999;
  background:radial-gradient(circle at 50% 40%,#1a1430,#070510);
  color:#ffd866;text-align:center;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;padding:30px;font-family:'Cinzel',serif;
}
#rotateHint .ricon{font-size:64px;animation:rotateSpin 2.4s ease-in-out infinite;}
#rotateHint .rmsg{font-size:20px;}
#rotateHint .rsub{font-size:13px;color:#cfc7ff;font-family:system-ui,sans-serif;}
@keyframes rotateSpin{0%,40%{transform:rotate(0);}60%,100%{transform:rotate(90deg);}}
@media (max-width:900px) and (orientation:portrait){ #rotateHint{display:flex;} }

/* small util */
.flexrow{display:flex;align-items:center;gap:8px;}
.center-text{text-align:center;}
.muted{color:var(--muted);font-size:12px;}
.gold-text{color:var(--gold);}
</style>

// ---------- NAUKA: how many of a class's 15 spells you know ----------
// 0 nauka -> 1 spell known. each point of nauka unlocks one more, capped at 15.
function knownSpellCount(){
  const s=(typeof CB!=='undefined'&&CB&&CB.stats)?CB.stats:computeStats();
  return clamp(1+Math.floor(s.learning||0),1,15);
}
function knownSpells(){
  const cls=CLASSES[G.classId];
  return cls.spells.slice(0,knownSpellCount());
}
function isSpellKnown(sid){ return knownSpells().includes(sid); }
const MAX_LOADOUT=7;
// range of a spell in pixels (turn-based duel positioning)
function spellRange(sp){
  if(!sp) return 400;
  if(sp.kind==='self') return 99999;
  if(sp.kind==='beam') return 540;
  if(sp.kind==='projectile') return sp.melee?200:680;
  if(sp.kind==='aoe') return sp.melee?190:360;
  if(sp.kind==='summon') return 720;
  return 420;
}

// XP threshold for level -> next
function xpNeeded(level){
  // 1->2:100, 2->3:200, 3->4:350, 4->5:550, 5->6:800, then +300 each
  const table=[0,100,200,350,550,800];
  if(level<table.length) return table[level];
  return 800+(level-5)*300;
}

// compute final stats from class base + allocations + prestige + gear + relics
function computeStats(){
  const cls=CLASSES[G.classId];
  const s={};
  for(const k in cls.base) s[k]=cls.base[k];
  // allocations
  for(const k in G.allocated){ s[k]=(s[k]||0)+G.allocated[k]; }
  // gear
  let manaregen=0, allpct=0;
  const applyStats=(st)=>{
    if(!st) return;
    for(const k in st){
      if(k==='manaregen'){ manaregen+=st[k]; continue; }
      if(k==='allpct'){ allpct+=st[k]; continue; }
      s[k]=(s[k]||0)+st[k];
    }
  };
  if(G.equipWeapon) applyStats(WEAPONS[G.equipWeapon].stats);
  if(G.equipArmor) applyStats(ARMORS[G.equipArmor].stats);
  // prestige +5% all
  const presPct=G.prestige*5 + allpct;
  if(presPct>0){
    for(const k of ['hp','mana','sp','speed','stamina','def']){ s[k]=Math.round(s[k]*(1+presPct/100)); }
    for(const k of ['crit','hit','dodge']){ s[k]=s[k]+presPct*0.2; }
  }
  s.manaregen=2+manaregen + (cls.id==='water'?1:0);
  // wind passive speed +25%, dodge +15 base handled here
  if(cls.id==='wind'){ s.speed=Math.round(s.speed*1.25); }
  s.maxhp=s.hp; s.maxmana=s.mana; s.maxstamina=s.stamina;
  return s;
}

// mastery tier helpers
function masteryTier(uses){
  if(uses>=200) return 3;
  if(uses>=50) return 2;
  if(uses>=10) return 1;
  return 0;
}
const TIER_NAMES=['','Apprentice','Adept','Mastered'];
function masteryDmgMult(spellId){
  const m=G.masteries[spellId]; if(!m) return 1;
  const t=masteryTier(m.uses);
  let mult=1+[0,0.10,0.20,0.35][t];
  if(t===3 && m.path==='B') mult+=0.30-0; // path B: +30% more dmg
  if(t===3 && m.path==='B') mult=1+0.35+0.30;
  if(t===3 && m.path==='A') mult=1+0.35-0.15; // path A: less dmg, gains status
  return mult;
}
function masteryClass(spellId){
  const m=G.masteries[spellId]; if(!m) return '';
  const t=masteryTier(m.uses);
  return ['','mastery-apprentice','mastery-adept','mastery-mastered'][t];
}

// build a starfield + drifting dust into a container
function buildStars(container,count=120,dustCount=30){
  if(!container || container.dataset.built) return;
  container.dataset.built='1';
  let html='';
  for(let i=0;i<count;i++){
    const sz=rand(1,2.4).toFixed(1);
    html+=`<div class="star" style="left:${rand(0,100)}%;top:${rand(0,70)}%;width:${sz}px;height:${sz}px;animation-delay:${rand(0,3)}s;"></div>`;
  }
  for(let i=0;i<dustCount;i++){
    const sz=rand(2,5).toFixed(1);
    const col=rand(0,1)>.5?'rgba(150,120,255,.5)':'rgba(255,210,120,.45)';
    html+=`<div class="dust" style="left:${rand(0,100)}%;top:${rand(20,100)}%;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 6px ${col};--dx:${rand(-60,60)}px;--dy:${rand(-120,-40)}px;animation-duration:${rand(8,20)}s;animation-delay:${rand(0,8)}s;"></div>`;
  }
  container.innerHTML=html;
}

/* ============================================================
   ==================  MAGE SPRITE DRAW  ======================
   Stylized robed figures on canvas. Each class unique silhouette.
============================================================ */
function drawMage(ctx,x,y,scale,classId,t,opts={}){
  const cls=CLASSES[classId];
  const c1=cls.c1, c2=cls.c2;
  const facing=opts.facing||1;       // 1 right, -1 left
  const aura=opts.aura||0;           // 0..1 extra glow
  const casting=opts.casting||0;     // 0..1 cast charge
  const bob=Math.sin(t*2.2)*2*scale; // idle bob
  ctx.save();
  ctx.translate(x,y+bob);
  ctx.scale(scale*facing,scale);

  // ---- ground shadow ----
  ctx.save();
  ctx.globalAlpha=.35;
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,30,16,5,0,0,7);ctx.fill();
  ctx.restore();

  // ---- floating elemental particles around body ----
  const np=6;
  for(let i=0;i<np;i++){
    const a=t*1.5 + i*(Math.PI*2/np);
    const r=18+Math.sin(t*2+i)*4;
    const px=Math.cos(a)*r, py=Math.sin(a)*r*0.8 - 4;
    ctx.save();
    ctx.globalAlpha=.5+0.3*Math.sin(t*3+i);
    const pc=cls.rainbow?`hsl(${(t*80+i*60)%360},90%,65%)`:(i%2?c2:c1);
    ctx.fillStyle=pc; ctx.shadowColor=pc; ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(px,py,1.6,0,7);ctx.fill();
    ctx.restore();
  }

  // ---- full element aura (killstreak) ----
  if(aura>0){
    ctx.save();
    ctx.globalAlpha=0.25*aura;
    const g=ctx.createRadialGradient(0,0,4,0,0,34);
    g.addColorStop(0,c2);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,34,0,7);ctx.fill();
    ctx.restore();
  }

  // ---- ROBE (unique silhouette per class) ----
  const robe=ctx.createLinearGradient(0,-12,0,32);
  robe.addColorStop(0,c1);robe.addColorStop(1,shade(c1,-40));
  ctx.fillStyle=robe;
  ctx.strokeStyle=shade(c2,20);ctx.lineWidth=1.2;

  ctx.beginPath();
  switch(classId){
    case 'fire': // flickering jagged hem
      ctx.moveTo(0,-14);ctx.lineTo(10,-6);ctx.lineTo(11,26);
      ctx.lineTo(7,22);ctx.lineTo(4,30);ctx.lineTo(0,24);ctx.lineTo(-4,30);
      ctx.lineTo(-7,22);ctx.lineTo(-11,26);ctx.lineTo(-10,-6);ctx.closePath();break;
    case 'ice': // sharp crystalline angular
      ctx.moveTo(0,-15);ctx.lineTo(11,-4);ctx.lineTo(8,14);ctx.lineTo(12,28);
      ctx.lineTo(0,22);ctx.lineTo(-12,28);ctx.lineTo(-8,14);ctx.lineTo(-11,-4);ctx.closePath();break;
    case 'necro': // tattered torn hood
      ctx.moveTo(0,-16);ctx.lineTo(9,-5);ctx.lineTo(10,24);ctx.lineTo(5,18);
      ctx.lineTo(6,28);ctx.lineTo(1,21);ctx.lineTo(-2,29);ctx.lineTo(-5,20);
      ctx.lineTo(-10,26);ctx.lineTo(-9,-5);ctx.closePath();break;
    case 'water': // smooth flowing curves
      ctx.moveTo(0,-14);ctx.quadraticCurveTo(12,-4,9,14);
      ctx.quadraticCurveTo(13,28,0,26);ctx.quadraticCurveTo(-13,28,-9,14);
      ctx.quadraticCurveTo(-12,-4,0,-14);ctx.closePath();break;
    case 'earth': // bulky wide stocky
      ctx.moveTo(0,-12);ctx.lineTo(14,-2);ctx.lineTo(15,28);ctx.lineTo(-15,28);
      ctx.lineTo(-14,-2);ctx.closePath();break;
    case 'wind': // slim wispy trailing
      ctx.moveTo(0,-15);ctx.lineTo(8,-6);ctx.lineTo(14,26);ctx.lineTo(2,20);
      ctx.lineTo(0,30);ctx.lineTo(-2,20);ctx.lineTo(-14,26);ctx.lineTo(-8,-6);ctx.closePath();break;
    case 'essence': // elegant layered
      ctx.moveTo(0,-15);ctx.lineTo(10,-5);ctx.lineTo(7,10);ctx.lineTo(11,26);
      ctx.lineTo(0,21);ctx.lineTo(-11,26);ctx.lineTo(-7,10);ctx.lineTo(-10,-5);ctx.closePath();break;
    case 'power': // armored angular regal
      ctx.moveTo(0,-15);ctx.lineTo(12,-7);ctx.lineTo(9,6);ctx.lineTo(12,28);
      ctx.lineTo(0,23);ctx.lineTo(-12,28);ctx.lineTo(-9,6);ctx.lineTo(-12,-7);ctx.closePath();break;
  }
  ctx.fill();ctx.stroke();

  // essence rainbow shimmer overlay
  if(cls.rainbow){
    ctx.save();ctx.globalAlpha=.3;ctx.globalCompositeOperation='overlay';
    const rg=ctx.createLinearGradient(-12,0,12,0);
    for(let i=0;i<=6;i++) rg.addColorStop(i/6,`hsl(${(t*60+i*60)%360},90%,60%)`);
    ctx.fillStyle=rg;ctx.fillRect(-15,-15,30,45);ctx.restore();
  }

  // ---- HOOD / HEAD ----
  ctx.fillStyle=shade(c1,-25);
  ctx.beginPath();ctx.arc(0,-16,7,0,7);ctx.fill();
  // glowing eyes
  ctx.save();ctx.shadowColor=c2;ctx.shadowBlur=8;ctx.fillStyle=c2;
  ctx.beginPath();ctx.arc(-2.5,-16,1.3,0,7);ctx.arc(2.5,-16,1.3,0,7);ctx.fill();
  ctx.restore();

  // ---- GLOWING HANDS ----
  const handGlow=0.6+casting*0.4+Math.sin(t*4)*0.1;
  const hands=[[-9,6],[9,6]];
  for(const [hx,hy] of hands){
    const r=2.4+casting*2.5;
    ctx.save();
    ctx.shadowColor=c2;ctx.shadowBlur=10+casting*16;
    const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,r+2);
    hg.addColorStop(0,'#fff');hg.addColorStop(.5,c2);hg.addColorStop(1,'transparent');
    ctx.globalAlpha=handGlow;ctx.fillStyle=hg;
    ctx.beginPath();ctx.arc(hx,hy,r+2,0,7);ctx.fill();
    ctx.restore();
  }

  // prestige crown cosmetic
  if(G.prestige>0){
    ctx.save();ctx.fillStyle='#ffd866';ctx.shadowColor='#ffd866';ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(-6,-22);ctx.lineTo(-6,-26);ctx.lineTo(-3,-23);ctx.lineTo(0,-28);
    ctx.lineTo(3,-23);ctx.lineTo(6,-26);ctx.lineTo(6,-22);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}
function shade(hex,amt){
  let c=hex.replace('#','');
  if(c.length===3)c=c.split('').map(x=>x+x).join('');
  let r=clamp(parseInt(c.slice(0,2),16)+amt,0,255);
  let g=clamp(parseInt(c.slice(2,4),16)+amt,0,255);
  let b=clamp(parseInt(c.slice(4,6),16)+amt,0,255);
  return `rgb(${r|0},${g|0},${b|0})`;
}

function selectClass(cid,card){
  pendingClass=cid;
  document.querySelectorAll('.class-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  $('btnConfirmClass').disabled=false;
  const cls=CLASSES[cid];
  const d=$('classDetail');
  d.style.setProperty('--glow',cls.c1);
  d.classList.remove('hidden');
  // re-trigger reveal animation
  d.classList.remove('cs-detail');void d.offsetWidth;d.classList.add('cs-detail');
  const maxes={hp:140,mana:140,sp:20,speed:14,stamina:16,def:14,crit:12,hit:100,dodge:16,learning:3};
  let bars='';
  for(const k of ['hp','mana','sp','speed','stamina','def','crit','hit','dodge','learning']){
    const v=cls.base[k]; const pct=clamp(v/maxes[k]*100,4,100);
    bars+=`<div class="cs-bar-row"><span class="label">${STAT_LABELS[k]}</span>
      <div class="cs-bar-track"><div class="cs-bar-fill" style="background:linear-gradient(90deg,${cls.c1},${cls.c2});width:${pct}%"></div></div>
      <span style="width:34px;text-align:right">${v}</span></div>`;
  }
  d.innerHTML=`<div class="cs-detail-body">
    <div class="cs-stats"><h3 style="color:${cls.c2}">${cls.emoji} ${cls.name}</h3>${bars}</div>
    <div class="cs-passive">
      <div class="name">⚜ Passive — ${cls.passive.name}</div>
      <div class="muted" style="margin-bottom:12px">${cls.passive.desc}</div>
      <div class="name">✦ Mechanic — ${cls.mech.name}</div>
      <div class="muted">${cls.mech.desc}</div>
    </div></div>`;
}
function confirmClass(cid){
  G=freshSave();
  G.classId=cid;
  // default loadout = first 5 spells
  G.loadout=CLASSES[cid].spells.slice(0,MAX_LOADOUT);
  G.gold=150;
  G.statPoints=10; // 10 to distribute at start
  refreshBounties(true);
  rollSpecialStock(true);
  saveGame();
  hasSave=true;
  enterCity('Your legend begins');
}

function openModal(title,bodyHtml,glow){
  const cls=G.classId?CLASSES[G.classId]:null;
  const root=$('modalRoot');
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal panel" style="--glow:${glow||(cls?cls.c1:'#9a6aff')}">
    <button class="close-btn">✕</button>
    <h2>${title}</h2>
    <div class="modal-body">${bodyHtml}</div>
  </div>`;
  ov.querySelector('.close-btn').onclick=()=>closeModal(ov);
  ov.onclick=e=>{ if(e.target===ov) closeModal(ov); };
  root.appendChild(ov);
  return ov;
}
function closeModal(ov){ ov.remove(); }
function closeAllModals(){ $('modalRoot').innerHTML=''; }

   ===================  BOUNTY / STOCK  =======================
============================================================ */
function refreshBounties(force){
  if(force || !G.bounties || G.bounties.length===0 || G.bountyTimer<=0){
    const shuffled=[...BOUNTY_POOL].sort(()=>Math.random()-0.5).slice(0,3);
    G.bounties=shuffled.map(b=>({id:b.id,progress:0,complete:false}));
    G.bountyTimer=5;
  }
}
function rollSpecialStock(force){
  if(force || !G.specialStock || G.specialStock.length===0 || G.specialTimer<=0){
    const pool=[...SPECIAL_POOL].sort(()=>Math.random()-0.5).slice(0,2);
    G.specialStock=pool;
    G.specialTimer=5;
  }
}
function bountyDef(id){ return BOUNTY_POOL.find(b=>b.id===id); }

// called after each fight
function afterFightProgress(){
  G.bountyTimer--; G.specialTimer--;
  if(G.bountyTimer<=0) refreshBounties(true);
  if(G.specialTimer<=0) rollSpecialStock(true);
  // relic cart every 5 wins
  if(G.normalWins>0 && G.normalWins%5===0) G.relicCart=true;
  saveGame();
}

/* ============================================================
   ======================  SHOPS  =============================
============================================================ */
function statStr(stats){
  const parts=[];
  for(const k in stats){
    const v=stats[k]; const sign=v>0?'+':'';
    const lbl={sp:'SP',crit:'Crit',hit:'Hit',dodge:'Dodge',mana:'Mana',manaregen:'Mana/s',def:'Def',hp:'HP',speed:'Spd',allpct:'All'}[k]||k;
    const pct=(k==='crit'||k==='hit'||k==='dodge'||k==='allpct')?'%':'';
    parts.push(`${sign}${v}${pct} ${lbl}`);
  }
  return parts.join(', ');
}
function buyGearCard(key,def,kind,owned,equipped){
  const can=G.gold>=def.price;
  const isOwned=owned;
  let btn;
  if(equipped) btn='<button disabled>Equipped</button>';
  else if(isOwned) btn=`<button data-eq="${key}">Equip</button>`;
  else btn=`<button data-buy="${key}" ${can?'':'disabled'}>Buy ${def.price}g</button>`;
  return `<div class="item-card panel ${equipped?'equipped':''}" style="--glow:${equipped?'#ffd866':'#4a4a7a'}">
    <div class="item-icon">${def.icon}</div>
    <span class="iname">${def.name}</span>
    <div class="istats">${statStr(def.stats)}</div>
    ${btn}</div>`;
}
function wireGearButtons(ov,table,kind){
  ov.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.buy;const def=table[k];
    if(G.gold<def.price)return;
    G.gold-=def.price;
    G.inventory[kind+'s'].push(k);
    if(kind==='weapon') G.equipWeapon=k; else G.equipArmor=k;
    saveGame();refreshOpenShop(kind);
  });
  ov.querySelectorAll('[data-eq]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.eq;
    if(kind==='weapon') G.equipWeapon=k; else G.equipArmor=k;
    saveGame();refreshOpenShop(kind);
  });
}
let _openShopKind=null,_openShopOv=null;
function refreshOpenShop(kind){
  if(kind==='weapon') openWeaponShop(true);
  else if(kind==='armor') openArmorShop(true);
  else if(kind==='potion') openPotionShop(true);
  else if(kind==='relic') openRelicMerchant(true);
}
function openWeaponShop(re){
  if(re&&_openShopOv)_openShopOv.remove();
  let tabs={staff:[],wand:[],orb:[]};
  for(const k in WEAPONS) tabs[WEAPONS[k].type].push(k);
  const sec=(type)=>tabs[type].map(k=>buyGearCard(k,WEAPONS[k],'weapon',G.inventory.weapons.includes(k),G.equipWeapon===k)).join('');
  const body=`<div class="muted center-text">💰 ${G.gold}g</div>
    <h3 class="gold-text">Staffs — balanced</h3><div class="shop-grid">${sec('staff')}</div>
    <h3 class="gold-text">Wands — crit &amp; precision</h3><div class="shop-grid">${sec('wand')}</div>
    <h3 class="gold-text">Orbs — mana &amp; sustain</h3><div class="shop-grid">${sec('orb')}</div>`;
  _openShopOv=openModal('⚔️ Weapon Shop',body,'#ff8844');_openShopKind='weapon';
  wireGearButtons(_openShopOv,WEAPONS,'weapon');
  renderCityTopbar();
}
function openArmorShop(re){
  if(re&&_openShopOv)_openShopOv.remove();
  const cards=Object.keys(ARMORS).map(k=>buyGearCard(k,ARMORS[k],'armor',G.inventory.armors.includes(k),G.equipArmor===k)).join('');
  _openShopOv=openModal('🧥 Armor Shop',`<div class="muted center-text">💰 ${G.gold}g</div><div class="shop-grid">${cards}</div>`,'#44aaff');
  _openShopKind='armor';
  wireGearButtons(_openShopOv,ARMORS,'armor');
  renderCityTopbar();
}
function openPotionShop(re){
  if(re&&_openShopOv)_openShopOv.remove();
  rollSpecialStock();
  const carried=G.potions.length;
  const card=(k)=>{
    const def=POTIONS[k];const can=G.gold>=def.price;
    const isPhoenix=def.passive;
    let btn;
    if(isPhoenix){
      btn=G.phoenixTear?'<button disabled>Owned</button>':`<button data-buyp="${k}" ${can?'':'disabled'}>Buy ${def.price}g</button>`;
    }else{
      const full=carried>=3;
      btn=`<button data-buyp="${k}" ${(can&&!full)?'':'disabled'}>Buy ${def.price}g</button>`;
    }
    const eff={heal:'Restore 50 HP',mana:'Restore 60 mana',berserk:'+50% SP, −20% def, 30s',slowall:'All enemies slow 60%, 10s',bloodpact:'−20% HP → +40% SP, 20s',phoenix:'Auto-revive at 30% HP (passive)',freecast:'Next spell costs 0 mana',chaos:'Next 3 spells 50% or 300%',mirror:'Reflect next spell hit',manaover:'Fill mana, 5 dmg/s for 20s'}[def.effect]||'';
    return `<div class="item-card panel" style="--glow:#44ff88">
      <div class="item-icon">${def.icon}</div><span class="iname">${def.name}</span>
      <div class="istats">${eff}</div>${btn}</div>`;
  };
  const basics=Object.keys(POTIONS).filter(k=>POTIONS[k].basic).map(card).join('');
  const specials=G.specialStock.map(card).join('');
  const phoenixCard=card('phoenix');
  const carry=G.potions.map((p,i)=>`<span class="item-card panel" style="--glow:#ffd866;padding:6px 10px;">${POTIONS[p].icon} ${POTIONS[p].name} <button data-drop="${i}" style="padding:2px 6px;font-size:10px;">✕</button></span>`).join('') || '<span class="muted">none</span>';
  const body=`<div class="muted center-text">💰 ${G.gold}g — carrying ${carried}/3 potions (Phoenix Tear uses a separate slot)</div>
    <h3 class="gold-text">Basics</h3><div class="shop-grid">${basics}</div>
    <h3 class="gold-text">Special (rotates)</h3><div class="shop-grid">${specials}</div>
    <h3 class="gold-text">Passive Slot</h3><div class="shop-grid">${phoenixCard}</div>
    <h3 class="gold-text">Carried Loadout</h3><div class="flexrow" style="flex-wrap:wrap;gap:8px;">${carry}</div>`;
  _openShopOv=openModal('🧪 Potion Shop',body,'#44ff88');_openShopKind='potion';
  _openShopOv.querySelectorAll('[data-buyp]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.buyp;const def=POTIONS[k];
    if(G.gold<def.price)return;
    if(def.passive){ if(G.phoenixTear)return; G.gold-=def.price; G.phoenixTear=true; }
    else{ if(G.potions.length>=3)return; G.gold-=def.price; G.potions.push(k); }
    saveGame();openPotionShop(true);
  });
  _openShopOv.querySelectorAll('[data-drop]').forEach(b=>b.onclick=()=>{
    G.potions.splice(+b.dataset.drop,1);saveGame();openPotionShop(true);
  });
  renderCityTopbar();
}
function openRelicMerchant(re){
  if(re&&_openShopOv)_openShopOv.remove();
  if(!G.relicCart){ openModal('💎 Relic Merchant',`<p class="muted center-text">The golden cart is not here. The merchant returns every 5 victories.</p>`,'#ffd866'); return; }
  // offer 3 random relics not owned
  if(!G._relicOffer){
    G._relicOffer=Object.keys(RELICS).filter(k=>!G.inventory.relics.includes(k)).sort(()=>Math.random()-0.5).slice(0,3);
  }
  const card=(k)=>{
    const def=RELICS[k];const price=RELIC_PRICES[k];
    const owned=G.inventory.relics.includes(k);
    const equipped=G.relics.includes(k);
    let btn;
    if(equipped)btn='<button disabled>Equipped</button>';
    else if(owned)btn=`<button data-eqr="${k}" ${G.relics.length<2?'':'disabled'}>Equip</button>`;
    else btn=`<button data-buyr="${k}" ${G.gold>=price?'':'disabled'}>Buy ${price}g</button>`;
    return `<div class="item-card panel ${equipped?'equipped':''}" style="--glow:${equipped?'#ffd866':'#ffd866'}">
      <div class="item-icon">${def.icon}</div><span class="iname">${def.name}</span>
      <div class="istats">${def.desc}</div>${btn}</div>`;
  };
  const offer=G._relicOffer.map(card).join('');
  const owned=G.inventory.relics.map(card).join('')||'<span class="muted">none owned</span>';
  const body=`<div class="muted center-text">💰 ${G.gold}g — equip up to 2 relics (${G.relics.length}/2)</div>
    <h3 class="gold-text">For Sale</h3><div class="shop-grid">${offer}</div>
    <h3 class="gold-text">Your Relics</h3><div class="shop-grid">${owned}</div>`;
  _openShopOv=openModal('💎 Relic Merchant',body,'#ffd866');_openShopKind='relic';
  _openShopOv.querySelectorAll('[data-buyr]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.buyr;const price=RELIC_PRICES[k];
    if(G.gold<price)return;G.gold-=price;G.inventory.relics.push(k);
    if(G.relics.length<2)G.relics.push(k);
    saveGame();openRelicMerchant(true);
  });
  _openShopOv.querySelectorAll('[data-eqr]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.eqr;if(G.relics.includes(k)||G.relics.length>=2)return;
    G.relics.push(k);saveGame();openRelicMerchant(true);
  });
  renderCityTopbar();
}

function wireCharacterScreen(ov){
  ov.querySelectorAll('[data-alloc]').forEach(b=>b.onclick=()=>{
    if(G.statPoints<=0)return;
    const k=b.dataset.alloc;
    G.allocated[k]=(G.allocated[k]||0)+(k==='hp'||k==='mana'?5:k==='crit'||k==='hit'||k==='dodge'?1:1);
    G.statPoints--;saveGame();ov.remove();openCharacterScreen();
  });
  ov.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    if(G.loadout.length>=MAX_LOADOUT)return;G.loadout.push(b.dataset.add);saveGame();ov.remove();openCharacterScreen();
  });
  ov.querySelectorAll('[data-unrelic]').forEach(b=>b.onclick=()=>{
    G.relics.splice(+b.dataset.unrelic,1);saveGame();ov.remove();openCharacterScreen();
  });
  ov.querySelectorAll('[data-path]').forEach(b=>b.onclick=()=>{
    const sid=b.dataset.path;choosePathDialog(sid,ov);
  });
  const pres=ov.querySelector('[data-prestige]');
  if(pres)pres.onclick=()=>doPrestige(ov);
  const souls=ov.querySelector('[data-souls]');
  if(souls)souls.onclick=()=>openSoulStash();
  // drag & drop for loadout
  let dragSpell=null;
  ov.querySelectorAll('[data-spell]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSpell=el.dataset.spell;});
  });
  ov.querySelectorAll('.spell-slot').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
    slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
    slot.addEventListener('drop',e=>{
      e.preventDefault();slot.classList.remove('drag-over');
      if(!dragSpell)return;
      const idx=+slot.dataset.slot;
      // remove if already in loadout elsewhere
      const existing=G.loadout.indexOf(dragSpell);
      if(existing>=0)G.loadout.splice(existing,1);
      G.loadout[idx]=dragSpell;
      G.loadout=G.loadout.filter(Boolean);
      saveGame();ov.remove();openCharacterScreen();
    });
    // click empty slot to clear
    slot.addEventListener('click',()=>{
      const idx=+slot.dataset.slot;
      if(G.loadout[idx]){G.loadout.splice(idx,1);saveGame();ov.remove();openCharacterScreen();}
    });
  });
}

// roster of rival mages (one of the 8 classes, with a name + flavour)
const FOE_NAMES=['Varghal','Mordra','Selene','Kael','Brimstone','Nyx','Orin','Vex','Thessaly','Grimm','Ysolde','Caldus','Riven','Mab','Drauven','Sable'];
const FOE_TITLES=['the Wandering','the Ashen','the Pale','Stormborn','the Cruel','Nightshade','the Adept','the Bitter','of the Veil','Hollow-Eye','the Sly','the Hexer'];

  {name:'Mortus the Undying',classId:'necro',c:'#00ff66',hpMult:2.7,dmgMult:1.3,lines:["Death is only the beginning.","Your soul will serve me.","I have died before. Have you?"]},
];

const TB_VITALITY=1.85; // duels last longer than the old wave HP pools
function makeMage(side,classId,stats,opts={}){
  const cls=CLASSES[classId];
  const vit=opts.isPlayer?TB_VITALITY*1.25:TB_VITALITY;
  const mhp=Math.round(stats.maxhp*vit);
  const M={
    side, classId, cls,
    x:0,y:0, baseY:0,
    hp:mhp, maxhp:mhp,
    mana:stats.maxmana, maxmana:stats.maxmana,
    manaregen:stats.manaregen||4,
    sp:stats.sp, crit:stats.crit, hit:stats.hit, dodge:stats.dodge, def:stats.def,
    speedStat:stats.speed,
    shield:0, buffs:{}, statuses:{}, statusTags:new Set(),
    facing:side==='L'?1:-1,
    move:0, maxMove:0, walkT:0, casting:0, castGlow:0, flash:0, hitTimer:0, bobT:rand(0,6),
    cooldowns:{}, spells:opts.spells||cls.spells.slice(0, knownForClass(classId)),
    name:opts.name||cls.name, dmgMult:opts.dmgMult||1, isBoss:opts.isBoss||false,
    ai:opts.ai||'balanced',
  };
  return M;
}
function knownForClass(classId){ return clamp(1+Math.floor(CLASSES[classId].base.learning||1),1,15); }

// build a rival mage scaled to the player's progress
function makeFoe(mode){
  const lvl=G.level;
  const d=diffMods();
  if(mode==='boss'){
    const b=pick(BOSS_MAGES);
    const cls=CLASSES[b.classId];
    const base=cls.base;
    const tier=1+lvl*0.05;
    const st={
      maxhp:Math.round((base.hp*3.4+lvl*14)*b.hpMult*d.hp*tier),
      maxmana:base.mana+200, manaregen:8,
      sp:Math.round((base.sp+8+lvl*1.2)*b.dmgMult),
      crit:base.crit+6, hit:96, dodge:base.dodge+4, def:base.def+6, speed:base.speed+1,
    };
    const foe=makeMage('R',b.classId,st,{name:b.name,dmgMult:b.dmgMult*d.dmg*0.62,isBoss:true,ai:'boss',
      spells:cls.spells.slice(0,12)});
    foe._color=b.c; foe._lines=b.lines; foe._title='';
    return foe;
  }
  // normal / endless: a rival mage. endless scales by round.
  const round=mode==='endless'?(CB?CB.round:1):1;
  const classId=pick(CLASS_ORDER);
  const cls=CLASSES[classId];
  const base=cls.base;
  const scale=1+lvl*0.045+(round-1)*0.16;
  const st={
    maxhp:Math.round((base.hp+lvl*7+(round-1)*22)*scale*d.hp),
    maxmana:base.mana+80, manaregen:6,
    sp:Math.round((base.sp+lvl*0.7+(round-1)*1.4)),
    crit:base.crit+2, hit:90, dodge:base.dodge, def:base.def, speed:base.speed,
  };
  const known=knownForClass(classId);
  const foe=makeMage('R',classId,st,{
    name:pick(FOE_NAMES)+' '+pick(FOE_TITLES),
    dmgMult:d.dmg*0.7*(1+(round-1)*0.06),
    ai:'balanced',
    spells:cls.spells.slice(0,Math.max(4,Math.min(known,8))),
  });
  foe._color=cls.c1;
  return foe;
}

function tbBossLine(txt){

function tbDist(){ return Math.abs(CB.player.x-CB.foe.x); }

/* ---------------- TURN FLOW ---------------- */
function tbStartTurn(who){
  if(!CB||CB.over)return;
  CB.turn=who; CB.phase=who; CB.busy=false;
  const m=who==='player'?CB.player:CB.foe;
  const other=who==='player'?CB.foe:CB.player;
  // regen mana, tick cooldowns, decay buffs/statuses, set move budget
  m.mana=clamp(m.mana+ (m.manaregen*3) + m.maxmana*0.04, 0, m.maxmana);
  for(const k in m.cooldowns){ m.cooldowns[k]=Math.max(0,(m.cooldowns[k]||0)-1); }
  tbDecayBuffs(m);
  // movement budget scales with speed
  m.maxMove=Math.round(70+ (m.speedStat||6)*9);
  if(m.statuses.slow) m.maxMove=Math.round(m.maxMove*0.5);
  m.move=m.maxMove;
  m.facing=(other.x>=m.x)?1:-1;
  if(who==='player'){
    CB.turnNo++;
    tbUpdateTurnUI();
  } else {
    tbUpdateTurnUI();
    setTimeout(()=>{ if(CB&&!CB.over) tbEnemyTurn(); }, 650);
  }
}
function tbDecayBuffs(m){
  for(const k in m.buffs){ if(typeof m.buffs[k]==='number'){ m.buffs[k]-=1; if(m.buffs[k]<=0)delete m.buffs[k]; } }
  for(const k in m.statuses){ const st=m.statuses[k]; if(st&&st.turns!==undefined){ st.turns-=1; if(st.turns<=0){ delete m.statuses[k]; } } }
}
function tbUpdateTurnUI(){
  const t=$('tcTurn'); if(t){ t.textContent=CB.phase==='player'?'YOUR TURN':"FOE'S TURN"; t.style.color=CB.phase==='player'?'#ffd866':'#ff6688'; }
  const isP=CB.phase==='player';
  $('tcLeft').disabled=!isP; $('tcRight').disabled=!isP; $('tcEnd').disabled=!isP;
  // move pips
  const pips=$('tcPips');
  if(pips){
    const tot=8, filled=CB.player.maxMove>0?Math.round(CB.player.move/CB.player.maxMove*tot):0;
    let s='';
    for(let i=0;i<tot;i++) s+=`<span class="pip ${i<filled?'on':''}"></span>`;
    pips.innerHTML='⤺ '+s;
  }
}
function tbMove(dir){
  if(!CB||CB.over||CB.phase!=='player'||CB.busy)return;
  const p=CB.player;
  if(p.move<=0){ floatNumber(p.x,p.y-70,'no moves left',{miss:true}); return; }
  const step=Math.min(34,p.move);
  let nx=p.x+dir*step;
  const minX=Math.round(CB.w*0.08), maxX=Math.round(CB.w*0.92);
  // can't walk through / past the foe
  if(dir>0 && nx>CB.foe.x-58) nx=CB.foe.x-58;
  if(dir<0 && nx<CB.foe.x+58 && p.x>CB.foe.x) nx=Math.max(nx,CB.foe.x+58);
  nx=clamp(nx,minX,maxX);
  const used=Math.abs(nx-p.x);
  if(used<1){ return; }
  p.move-=used; p.x=nx; p.facing=(CB.foe.x>=p.x)?1:-1; p.walkT=0.32;
  // dust
  for(let i=0;i<4;i++)CB.particles.push({x:p.x,y:p.baseY+12,vx:rand(-30,30)-dir*40,vy:rand(-30,-5),life:0.4,maxlife:0.4,r:rand(2,4),color:'#caa467',fade:true,grav:80});
  tbUpdateTurnUI();
}

/* ---------------- CASTING ---------------- */
function tbPlayerCast(slot){
  if(!CB||CB.over||CB.phase!=='player'||CB.busy)return;
  const sid=G.loadout[slot]; if(!sid)return;
  const sp=SPELLS[sid]; if(!sp)return;
  const p=CB.player;
  if(p.cooldowns[sid]>0){ floatNumber(p.x,p.y-70,'on cooldown',{miss:true}); return; }
  let cost=sp.cost;
  const free=p.buffs.freecast;
  if(free)cost=0;
  if(p.mana<cost){ floatNumber(p.x,p.y-70,'not enough mana',{miss:true}); return; }
  // range check (self spells always ok)
  const rng=spellRange(sp);
  if(sp.kind!=='self' && tbDist()>rng){
    floatNumber(p.x,p.y-70,'out of range — move closer',{miss:true});
    return;
  }
  if(free)delete p.buffs.freecast; else p.mana-=cost;
  p.cooldowns[sid]=Math.max(1,Math.round(sp.cd<=1?1:sp.cd/1.5));
  CB.stat.spellUse[sid]=(CB.stat.spellUse[sid]||0)+1;
  trackMasteryUse(sid);
  CB.busy=true; CB.phase='anim';
  tbUpdateTurnUI();
  tbCast(p, CB.foe, sid, ()=>{ if(CB&&!CB.over) tbEndTurn('player'); });
}

// universal animated cast: caster -> target, resolves via onDone
function tbCast(caster, target, sid, onDone){
  const sp=SPELLS[sid];
  const el=sp.el;
  caster.casting=0.45; caster.castGlow=1;
  const hx=caster.x+caster.facing*16, hy=caster.y-26;
  spawnCastBurst(hx,hy,el);
  const dmgBase=()=>tbComputeDmg(caster,sp,sid);
  const finish=()=>{ caster.casting=0; if(onDone)onDone(); };

  // SELF spells: shield / heal / mana
  if(sp.kind==='self'){
    setTimeout(()=>{
      if(!CB||CB.over)return;
      if(sp.shield){ caster.shield=(caster.shield||0)+sp.shield; floatNumber(caster.x,caster.y-40,'+'+sp.shield+' shield',{heal:true}); tbAuraBurst(caster,el); }
      if(sp.heal){ const amt=Math.round(sp.heal*(caster.classId==='water'?1.25:1)); caster.hp=clamp(caster.hp+amt,0,caster.maxhp); floatNumber(caster.x,caster.y-40,'+'+amt,{heal:true}); tbAuraBurst(caster,el); }
      if(sp.mana){ caster.mana=clamp(caster.mana+sp.mana,0,caster.maxmana); floatNumber(caster.x,caster.y-40,'+'+sp.mana+' mana',{heal:true}); }
      setTimeout(finish,260);
    },360);
    return;
  }
  // BEAM: instant line, immediate damage (with drain heal)
  if(sp.kind==='beam'){
    setTimeout(()=>{
      if(!CB||CB.over)return;
      const tx=target.x, ty=target.y-22;
      CB.effects.push({type:'beam',x1:hx,y1:hy,x2:tx,y2:ty,life:0.32,maxlife:0.32,color:EL_COLORS[el]});
      spawnImpact(tx,ty,el,1);
      const dealt=tbDealDamage(target,dmgBase(),el,{sid});
      if(sp.drain){ const h=Math.round(dealt*0.5); caster.hp=clamp(caster.hp+h,0,caster.maxhp); floatNumber(caster.x,caster.y-40,'+'+h,{heal:true}); }
      triggerShake(5);
      setTimeout(finish,360);
    },320);
    return;
  }
  // AOE: expanding ring lands on target after travel
  if(sp.kind==='aoe'){
    setTimeout(()=>{
      if(!CB||CB.over)return;
      const tx=target.x, ty=target.y-10;
      CB.effects.push({type:'aoe',el,x:tx,y:ty,r:Math.min(sp.radius||180,180),life:0.6,maxlife:0.6,color:EL_COLORS[el]});
      doShockwave(tx,ty,EL_COLORS[el],1.1);
      spawnImpact(tx,ty,el,1.3);
      tbDealDamage(target,dmgBase(),el,{sid});
      triggerShake(8);
      setTimeout(finish,420);
    },360);
    return;
  }
  // SUMMON: conjure shadow ally/allies that strike the foe (1v1 reworking of necro summons)
  if(sp.kind==='summon'){
    const count=sp.summonAll?3:1;
    const per=Math.round((18 + (caster.sp||10)*0.7) * (caster.dmgMult||1) * (caster.isPlayer?masteryDmgMult(sid):1));
    let remaining=count;
    const spawnOne=(i)=>{
      if(!CB||CB.over){ if(--remaining<=0)finish(); return; }
      const sy=caster.y-70-rand(0,40);
      const ally={
        tb:true,summon:true,x:caster.x+caster.facing*10,y:sy,el:'shadow',sid,
        color:EL_COLORS.shadow,r:11,homing:target,speed:560,trail:[],dmg:per,
        onHit:()=>{
          if(CB&&!CB.over){
            spawnImpact(target.x,target.y-22,'shadow',1.2);
            tbDealDamage(target,per,'shadow',{sid});
            triggerShake(6);
          }
          if(--remaining<=0)finish();
        },
      };
      ally._safety=setTimeout(()=>{ if(ally._alive!==false){ ally._alive=false; const k=CB.projectiles.indexOf(ally); if(k>=0)CB.projectiles.splice(k,1); if(--remaining<=0&&!CB.over)finish(); } },2200);
      CB.projectiles.push(ally);
    };
    tbAuraBurst(caster,'shadow');
    for(let i=0;i<count;i++){ setTimeout(()=>spawnOne(i), 240+i*220); }
    return;
  }
  // PROJECTILE: fly from hand to target, impact on arrival
  const speed=sp.speed||520;
  const tx=()=>target.x, ty=()=>target.y-22;
  const proj={
    tb:true,x:hx,y:hy,el,sid,color:EL_COLORS[el],r:sp.melee?9:7,
    homing:target, speed, trail:[], dmg:dmgBase(),
    onHit:()=>{
      if(!CB||CB.over)return;
      spawnImpact(target.x,target.y-22,el,1.1);
      tbDealDamage(target,proj.dmg,el,{sid});
      triggerShake(6);
      finish();
    },
  };
  // melee proj: caster lunges
  if(sp.melee){ caster.walkT=0.3; }
  CB.projectiles.push(proj);
  // safety: if projectile somehow lingers, resolve
  proj._safety=setTimeout(()=>{ if(proj._alive!==false){ proj._alive=false; const i=CB.projectiles.indexOf(proj); if(i>=0)CB.projectiles.splice(i,1); if(!CB.over)finish(); } }, 2000);
}
function tbComputeDmg(caster,sp,sid){
  let d=(sp.dmg||0);
  d*= 1 + (caster.sp||10)/55;          // spell power scaling
  d*= (caster.dmgMult||1);
  if(caster.isPlayer){ d*=masteryDmgMult(sid); if(caster.buffs.berserk)d*=1.4; }
  // weakness / essence attunement
  d*=rand(0.92,1.08);
  return Math.round(d);
}
function tbDealDamage(target,dmg,el,opt={}){
  const attacker=(target===CB.foe)?CB.player:CB.foe;
  // dodge
  if(Math.random()*100 < (target.dodge||0)){
    floatNumber(target.x,target.y-30,'DODGE',{miss:true});
    return 0;
  }
  // crit
  let crit=Math.random()*100 < (attacker.crit||0);
  let d=dmg*(crit?2:1);
  // defense flat reduction
  d=Math.max(1, d - (target.def||0)*0.5);
  if(target.classId==='earth' && target===CB.foe) d=Math.max(1,d-6);
  // status vuln
  if(target.statuses.vuln) d*=1.5;
  d=Math.round(d);
  // shield soak
  if(target.shield>0){
    const soak=Math.min(target.shield,d);
    target.shield-=soak; d-=soak;
    if(soak>0)floatNumber(target.x+12,target.y-46,'-'+soak+'🛡',{miss:true});
  }
  target.hp=clamp(target.hp-d,0,target.maxhp);
  target.flash=0.3; target.hitTimer=0.3;
  CB.stat.dmg+=d;
  if(crit){ CB.stat.crits++; floatNumber(target.x,target.y-34,d+'!',{crit:true,el}); triggerShake(10); }
  else floatNumber(target.x,target.y-30, ''+d, {el});
  spawnHitParticles(target.x,target.y-20,el);
  // apply simple status by spell element
  tbApplyStatus(target,el,opt.sid);
  // death check
  if(target.hp<=0){
    if(target===CB.foe) tbFoeDefeated();
    else tbPlayerDown();
  }
  return d;
}
function safeDodge(){ try{ onPlayerDodge(); }catch(e){} }
function tbApplyStatus(target,el,sid){
  const sp=sid?SPELLS[sid]:null;
  const stt=sp&&sp.status?sp.status:null;
  if(!stt)return;
  if(stt==='slow'||stt==='freeze'){ target.statuses.slow={turns:2,val:0.5}; if(stt==='freeze'&&Math.random()<0.4)target.statuses.vuln={turns:2}; }
  else if(stt==='burn'){ target.statuses.burn={turns:2,dmg:Math.round((sp.dmg||20)*0.18)}; }
  else if(stt==='mud'){ target.statuses.slow={turns:2,val:0.5}; }
  else if(stt==='thunder'){ if(Math.random()<0.25)target.statuses.stun={turns:1}; }
}

/* ---------------- ENEMY AI ---------------- */
function tbEnemyTurn(){
  if(!CB||CB.over)return;
  const f=CB.foe, p=CB.player;
  // stunned? skip
  if(f.statuses.stun){ delete f.statuses.stun; floatNumber(f.x,f.y-40,'stunned',{miss:true}); setTimeout(()=>{ tbTickDots(f); if(!CB.over)tbStartTurn('player'); },700); return; }
  // burn dot
  tbTickDots(f);
  if(CB.over)return;
  // pick best castable spell
  const choice=tbAIChoose(f);
  const act=()=>{
    if(!CB||CB.over)return;
    if(choice.sid){
      const sp=SPELLS[choice.sid];
      f.mana-=sp.cost; f.cooldowns[choice.sid]=Math.max(1,Math.round(sp.cd<=1?1:sp.cd/1.5));
      CB.busy=true; CB.phase='anim'; tbUpdateTurnUI();
      tbCast(f,p,choice.sid,()=>{ if(CB&&!CB.over) tbEndTurn('enemy'); });
    } else {
      // nothing to cast — end
      if(!CB.over) tbEndTurn('enemy');
    }
  };
  // movement first (animated), then cast
  if(choice.moveDir!==0 && f.move>0){
    tbAnimateFoeMove(choice.moveDir, choice.moveSteps||3, act);
  } else {
    setTimeout(act,250);
  }
}
function tbAIChoose(f){
  const p=CB.player;
  const dist=tbDist();
  // heal if low and has a heal/shield self spell available
  if(f.hp < f.maxhp*0.32){
    const heal=f.spells.find(sid=>{ const sp=SPELLS[sid]; return sp.kind==='self'&&(sp.heal||sp.shield)&&f.mana>=sp.cost&&!(f.cooldowns[sid]>0); });
    if(heal && Math.random()<0.7) return {sid:heal,moveDir:0};
  }
  // castable damaging spells in (or reachable) range
  const dmgSpells=f.spells.map(sid=>({sid,sp:SPELLS[sid]}))
    .filter(o=>o.sp.kind!=='self' && (o.sp.dmg||0)>0 && f.mana>=o.sp.cost && !(f.cooldowns[o.sid]>0));
  // in range now?
  const inRange=dmgSpells.filter(o=>dist<=spellRange(o.sp));
  if(inRange.length){
    // prefer strongest affordable
    inRange.sort((a,b)=>(b.sp.dmg||0)-(a.sp.dmg||0));
    const pickSpell=inRange[Math.random()<0.6?0:Math.floor(rand(0,inRange.length))];
    // maybe reposition slightly toward player to stay in range
    return {sid:pickSpell.sid,moveDir:0};
  }
  // not in range: move toward player, then cast cheapest ranged if it becomes reachable
  const reach=dmgSpells.sort((a,b)=>spellRange(b.sp)-spellRange(a.sp))[0];
  if(reach){
    const need=dist-spellRange(reach.sp);
    const steps=Math.min(Math.ceil(need/34)+1, Math.floor(f.move/34));
    return {sid:reach.sid,moveDir:1,moveSteps:Math.max(1,steps)};
  }
  // no mana for anything: approach
  return {sid:null,moveDir: dist>200?1:0, moveSteps:3};
}
function tbAnimateFoeMove(dir,steps,done){
  const f=CB.foe,p=CB.player;
  let n=0;
  const stepOnce=()=>{
    if(!CB||CB.over)return;
    if(n>=steps || f.move<=0){ done&&done(); return; }
    const step=Math.min(34,f.move);
    let nx=f.x - dir*step; // foe moves toward player (player is to the left)
    // toward player
    const toward=(p.x<f.x)?-1:1;
    nx=f.x+toward*step;
    if(toward<0 && nx<p.x+58) nx=p.x+58;
    if(toward>0 && nx>CB.w*0.92) nx=CB.w*0.92;
    const used=Math.abs(nx-f.x);
    f.move-=Math.max(used,12); f.x=nx; f.walkT=0.32; f.facing=(p.x>=f.x)?1:-1;
    for(let i=0;i<3;i++)CB.particles.push({x:f.x,y:f.baseY+12,vx:rand(-30,30),vy:rand(-25,-5),life:0.4,maxlife:0.4,r:rand(2,4),color:'#caa467',fade:true,grav:80});
    n++;
    setTimeout(stepOnce,170);
  };
  stepOnce();
}
function tbTickDots(m){
  if(m.statuses.burn){
    const dd=m.statuses.burn.dmg||8;
    m.hp=clamp(m.hp-dd,0,m.maxhp); floatNumber(m.x,m.y-30,''+dd,{el:'fire'});
    if(m.hp<=0){ if(m===CB.foe)tbFoeDefeated(); else tbPlayerDown(); }
  }
}
function tbEndTurn(who){
  if(!CB||CB.over)return;
  CB.busy=false;
  // tick the player's burn at end of their turn too
  if(who==='player') tbTickDots(CB.player);
  if(CB.over)return;
  tbStartTurn(who==='player'?'enemy':'player');
}

/* ---------------- WIN / LOSE ---------------- */
function tbFoeDefeated(){
  if(CB.over)return;
  const f=CB.foe;
  f.hp=0; f._dead=true;
  deathBurst(f.x,f.y-20,f.classId==='fire'?'fire':'shadow',32);
  triggerShake(16);
  CB.busy=true; CB.phase='win';
  // rewards
  const d=diffMods();
  let gold,xp;
  if(CB.mode==='boss'){ gold=randInt(180,260); xp=90; }
  else if(CB.mode==='endless'){ gold=40+CB.round*18; xp=24+CB.round*8; }
  else { gold=randInt(40,70)+G.level*4; xp=30+G.level*4; }
  gold=Math.round(gold*d.reward); xp=Math.round(xp*d.reward);
  CB.stat.gold+=gold; G.gold+=gold; addXP(xp);
  CB.stat.kills++;
  floatNumber(f.x,f.y-40,'+'+gold+'g',{gold:true});

  if(CB.mode==='endless'){
    G.normalWins++; if(CB.round>G.endlessBest)G.endlessBest=CB.round;
    showBanner('✦ DEFEATED ✦','#ffd866',true);
    setTimeout(()=>{ if(!CB||CB.over)return; CB.round++; tbNextEndlessFoe(); }, 1500);
    saveGame();
    return;
  }
  if(CB.mode==='boss'){
    G.bossDefeats.push({date:new Date().toISOString().slice(0,10),classId:G.classId,time:CB.turnNo});
    maybeDropRelic(false);
    if(CB.player.hp<CB.player.maxhp*0.25)bountyProgress('bosslow',1);
    showBanner('☠ '+f.name+' FALLS ☠','#ffd866',true);
    flashScreen('rgba(255,216,102,.5)',600);
    CB.over=true; saveGame();
    setTimeout(()=>{ afterFightProgress(); enterCity('You bested '+f.name+'!'); },2400);
    return;
  }
  // normal
  CB.over=true;
  G.normalWins++;
  if(CB.stat.potionsUsed===0)bountyProgress('nopotionwin',1);
  showBanner('✦ VICTORY ✦','#ffd866',true);
  saveGame();
  setTimeout(()=>{ afterFightProgress(); enterCity('Victory! +'+CB.stat.gold+'g'); },1800);
}
function tbNextEndlessFoe(){
  if(!CB||CB.over)return;
  const groundY=CB.groundY;
  const F=makeFoe('endless');
  F.x=Math.round(CB.w*0.76); F.y=groundY; F.baseY=groundY; F.facing=-1;
  CB.foe=F; CB.enemies=[F]; CB.boss=null;
  $('bossName').textContent=F.name+'  (Round '+CB.round+')';
  // reset player position a bit and refill some mana
  CB.player.x=Math.round(CB.w*0.24);
  CB.player.mana=clamp(CB.player.mana+CB.player.maxmana*0.4,0,CB.player.maxmana);
  showBanner('ROUND '+CB.round,'#ffd866',true);
  CB.phase='intro';
  setTimeout(()=>{ if(CB&&!CB.over) tbStartTurn('player'); }, 900);
}
function tbPlayerDown(){
  if(CB.over)return;
  const p=CB.player;
  // phoenix
  if(G.phoenixTear && !CB._phoenixUsed){
    CB._phoenixUsed=true;G.phoenixTear=false;
    p.hp=p.maxhp*0.4; p.shield=0;
    showBanner('🔥 PHOENIX REVIVAL 🔥','#ff8800',true);
    flashScreen('rgba(255,150,0,.6)',500); doShockwave(p.x,p.y-20,'#ff8800',1.4);
    return;
  }
  // necro lich
  if(CB.cls.id==='necro' && !CB._lichUsed && Math.random()<0.3){
    CB._lichUsed=true; p.hp=p.maxhp*0.35; p.buffs.freecast=true;
    showBanner('💀 LICH FORM 💀','#00ff44',true); flashScreen('rgba(0,255,68,.4)',500);
    return;
  }
  CB.over=true; CB.phase='lose';
  deathBurst(p.x,p.y-20,'shadow',30); triggerShake(20);
  G.xp=Math.max(0,G.xp-Math.round(xpNeeded(G.level)*0.1));
  if(CB.mode==='endless'&&CB.round>G.endlessBest)G.endlessBest=CB.round;
  saveGame();
  setTimeout(()=>showDeathScreen(),1200);
}

/* ---------------- TB LOOP & RENDER ---------------- */
function tbLoop(ts){
  if(!CB||!CB.tb){ return; }
  combatRAF=requestAnimationFrame(tbLoop);
  let dt=(ts-lastTS)/1000; lastTS=ts;
  if(dt>0.05)dt=0.05;
  CB.time+=dt; CB.elapsed+=dt;
  // animations
  if(CB.shake>0)CB.shake=Math.max(0,CB.shake-dt*40);
  for(const m of [CB.player,CB.foe]){
    if(!m)continue;
    if(m.walkT>0)m.walkT-=dt;
    if(m.casting>0)m.casting-=dt;
    if(m.castGlow>0)m.castGlow-=dt*2;
    if(m.flash>0)m.flash-=dt;
    if(m.hitTimer>0)m.hitTimer-=dt;
    m.bobT+=dt;
  }
  tbUpdateProjectiles(dt);
  updateParticles(dt);
  updateNumbers(dt);
  tbRender();
  if(!CB.over) tbUpdateHUD();
}
function tbUpdateProjectiles(dt){
  for(let i=CB.projectiles.length-1;i>=0;i--){
    const pr=CB.projectiles[i];
    if(pr._alive===false){ CB.projectiles.splice(i,1); continue; }
    const tgt=pr.homing;
    const dx=tgt.x-pr.x, dy=(tgt.y-22)-pr.y;
    const dd=Math.hypot(dx,dy);
    const stepLen=pr.speed*dt;
    pr.trail.push({x:pr.x,y:pr.y}); if(pr.trail.length>10)pr.trail.shift();
    if(dd<=stepLen+10){
      pr._alive=false; clearTimeout(pr._safety);
      CB.projectiles.splice(i,1);
      pr.onHit&&pr.onHit();
    } else {
      pr.x+=dx/dd*stepLen; pr.y+=dy/dd*stepLen;
    }
  }
}
function tbUpdateHUD(){
  const p=CB.player;
  $('hpFill').style.width=clamp(p.hp/p.maxhp*100,0,100)+'%';
  $('hpText').textContent=Math.ceil(Math.max(0,p.hp))+'/'+Math.round(p.maxhp);
  $('hpBarRow').classList.toggle('pulse-low',p.hp/p.maxhp<0.25);
  $('manaFill').style.width=clamp(p.mana/p.maxmana*100,0,100)+'%';
  $('manaText').textContent=Math.ceil(p.mana)+'/'+Math.round(p.maxmana);
  // stamina row -> repurpose as "Shield"
  $('stamFill').style.width=clamp((p.shield||0)/Math.max(1,p.maxhp*0.5)*100,0,100)+'%';
  $('stamText').textContent=Math.round(p.shield||0);
  const need=xpNeeded(G.level);
  $('xpFill').style.width=clamp(G.xp/need*100,0,100)+'%';
  $('xpText').textContent=G.xp+'/'+need;
  $('lvlText').textContent=G.level; $('goldText').textContent=G.gold;
  // foe bar
  $('bossBarFill').style.width=clamp(CB.foe.hp/CB.foe.maxhp*100,0,100)+'%';
  // spell button cooldowns + affordability + range
  const btns=document.querySelectorAll('.spell-btn');
  const dist=tbDist();
  for(let i=0;i<MAX_LOADOUT;i++){
    const sid=G.loadout[i];const btn=btns[i];if(!btn)continue;
    const ov=btn.querySelector('.cd-overlay');
    if(!sid){ continue; }
    const sp=SPELLS[sid];
    const cd=p.cooldowns[sid]||0;
    if(ov){ if(cd>0){ ov.classList.remove('hidden'); ov.textContent=Math.ceil(cd); } else ov.classList.add('hidden'); }
    const inRange=sp.kind==='self'||dist<=spellRange(sp);
    const ok=cd<=0 && p.mana>=sp.cost && (CB.phase==='player') && inRange;
    btn.classList.toggle('tb-unavail', !ok);
    btn.classList.toggle('tb-oor', !inRange && CB.phase==='player' && cd<=0 && p.mana>=sp.cost);
  }
}

/* ---------------- TB RENDER (side-view duel arena) ---------------- */
function tbRender(){
  const w=CB.w,h=CB.h,t=CB.time;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  if(CB.shake>0)ctx.translate(rand(-CB.shake,CB.shake),rand(-CB.shake,CB.shake));
  tbDrawArena(w,h);
  // shadows + mages sorted by y (both same ground)
  tbDrawMageFull(CB.foe);
  tbDrawMageFull(CB.player);
  // projectiles
  tbRenderProjectiles();
  renderParticles();
  renderEffectsBelow();
  renderEffectsAbove();
  renderNumbers();
  // range indicator under player when choosing
  ctx.restore();
}
function tbDrawArena(w,h){
  const t=CB.time, gy=CB.groundY;
  // sky gradient
  const sky=ctx.createLinearGradient(0,0,0,gy);
  sky.addColorStop(0,'#1a1430'); sky.addColorStop(0.6,'#3a2a4a'); sky.addColorStop(1,'#6b4a52');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,gy+4);
  // distant colosseum tiers (parallax bands)
  for(let b=0;b<3;b++){
    const yy=gy- (90+b*46), col=['#241c33','#2c2238','#342740'][b];
    ctx.fillStyle=col; ctx.fillRect(0,yy,w,gy-yy);
    // arches
    ctx.fillStyle='rgba(0,0,0,.22)';
    const aw=70+b*16;
    for(let x=-20;x<w+aw;x+=aw){ ctx.beginPath(); ctx.arc(x+aw/2,yy+22,aw*0.32,Math.PI,0); ctx.fill(); }
  }
  // crowd dots in the stands
  if(!CB._crowd){
    CB._crowd=[];
    for(let row=0;row<3;row++){
      const yy=gy-(150-row*30);
      for(let x=12;x<w-8;x+=12) CB._crowd.push({x:x+rand(-3,3),y:yy+rand(-3,3),r:rand(2,3.6),c:pick(['#5a4a6a','#6a4a4a','#4a5a6a','#6a6055','#705a66'])});
    }
  }
  for(const c of CB._crowd){ ctx.save(); ctx.globalAlpha=0.7; ctx.fillStyle=c.c; ctx.beginPath(); ctx.arc(c.x,c.y+Math.sin(t*1.5+c.x*0.1)*0.6,c.r,0,7); ctx.fill(); ctx.restore(); }
  // torches along the back wall
  for(let i=0;i<6;i++){
    const tx=(i+0.5)*(w/6), ty=gy-180;
    const fl=Math.sin(t*8+i)*0.3+0.7;
    ctx.save(); ctx.globalAlpha=fl; ctx.fillStyle='#ff8822'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=24;
    ctx.beginPath(); ctx.ellipse(tx,ty,5,11,0,0,7); ctx.fill(); ctx.restore();
  }
  // sandy arena floor
  const fg=ctx.createLinearGradient(0,gy,0,h);
  fg.addColorStop(0,'#d8b878'); fg.addColorStop(0.15,'#c4a064'); fg.addColorStop(1,'#8f7040');
  ctx.fillStyle=fg; ctx.fillRect(0,gy,w,h-gy);
  // ground line shadow
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(0,gy,w,4);
  // sand speckle (cached)

function tbRenderProjectiles(){

function tbDrawMageFull(m){

function enemyPoolForWave(){

  if(w>=2)pool.push('wraith');
  if(w>=3)pool.push('golem','fireelem');
  if(w>=4)pool.push('iceelem');
  if(w>=5)pool.push('archer','goblin');
  // rare enemies
  if(Math.random()<0.12)pool.push('summoner');
  if(Math.random()<0.08)pool.push('mimic');
  return pool;
}

/* ---------------- VIRTUAL JOYSTICK (mobile movement) ---------------- */
(function(){
  const zone=$('joystickZone'),stick=$('joystickStick');
  const maxR=36;
  function setStick(dx,dy){ stick.style.transform=`translate(${dx}px,${dy}px)`; }
  function update(e){
    const rect=zone.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    let dx=e.clientX-cx, dy=e.clientY-cy;
    const d=Math.hypot(dx,dy)||1;
    const cl=Math.min(d,maxR);
    dx=dx/d*cl; dy=dy/d*cl;
    setStick(dx,dy);
    joystick.dx=dx/maxR; joystick.dy=dy/maxR;
  }
  zone.addEventListener('pointerdown',e=>{
    e.preventDefault();
    joystick.active=true; joystick.id=e.pointerId;
    try{ zone.setPointerCapture(e.pointerId); }catch(err){}
    update(e);
  });
  zone.addEventListener('pointermove',e=>{
    if(!joystick.active||e.pointerId!==joystick.id)return;
    e.preventDefault();
    update(e);
  });
  function release(e){
    if(e.pointerId!==joystick.id)return;
    joystick.active=false; joystick.dx=0; joystick.dy=0; joystick.id=null;
    setStick(0,0);
  }
  zone.addEventListener('pointerup',release);
  zone.addEventListener('pointercancel',release);
})();

let lastTS=0;
function combatLoop(ts){
  combatRAF=requestAnimationFrame(combatLoop);
  let rawDt=(ts-lastTS)/1000; lastTS=ts;
  if(rawDt>0.05)rawDt=0.05;
  if(!CB)return;

  if(CB.slowmoTimer>0){ CB.slowmoTimer-=rawDt; CB.targetTimeScale=0.3; if(CB.slowmoTimer<=0)CB.targetTimeScale=CB.spellMenuOpen?0.2:1; }
  const dt=rawDt*CB.timeScale;
  CB.time+=rawDt;
  if(!CB.over) CB.elapsed+=dt;

  if(!CB.over){
    updatePlayer(dt,rawDt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updateGrounds(dt);
    updateStatuses(dt);
    updateSummons(dt);
    updateStreak(rawDt);
    updateArenaEvent(dt);
    updateEcho(dt);
    updateMechActive(dt);

  }
