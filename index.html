/* ---------------- PLAYER UPDATE ---------------- */
function updatePlayer(dt,rawDt){
  const p=CB.player,s=CB.stats;
  // mana regen
  p.mana=clamp(p.mana+s.manaregen*rawDt,0,p.maxmana);
  // stamina regen
  p.stamina=clamp(p.stamina+3*rawDt,0,p.maxstamina);
  // cursed eye perma damage applied to maxhp display only via permaDmg
  // movement
  let mvx=0,mvy=0,moveMag=1;
  if(joystick.active&&(joystick.dx||joystick.dy)){
    mvx=joystick.dx;mvy=joystick.dy;
    moveMag=clamp(Math.hypot(mvx,mvy),0,1);
  }else{
    if(keys['w']||keys['arrowup'])mvy-=1;
    if(keys['s']||keys['arrowdown'])mvy+=1;
    if(keys['a']||keys['arrowleft'])mvx-=1;
    if(keys['d']||keys['arrowright'])mvx+=1;
  }
  const canMove=p.casting<=0 && !p.blocking;
  if(canMove&&(mvx||mvy)){
    const len=Math.hypot(mvx,mvy)||1;
    let spd=s.speed*16*moveMag;
    p.x=clamp(p.x+mvx/len*spd*dt,20,CB.w-20);
    p.y=clamp(p.y+mvy/len*spd*dt,20,CB.h-20);
    if(mvx!==0)p.facing=mvx>0?1:-1;
    // movement trail
    if(Math.random()<0.6){
      CB.particles.push({x:p.x,y:p.y+6,vx:0,vy:0,life:0.5,maxlife:0.5,r:rand(4,8),color:CB.cls.c1,fade:true,trail:true});
    }
  }
  // ambient particles around player
  if(Math.random()<0.3){
    const a=rand(0,7),r=rand(14,24);
    CB.particles.push({x:p.x+Math.cos(a)*r,y:p.y+Math.sin(a)*r,vx:rand(-6,6),vy:rand(-14,-4),life:1,maxlife:1,r:rand(1.5,3),color:CB.cls.rainbow?`hsl(${(CB.time*80)%360},90%,65%)`:CB.cls.c2,fade:true});
  }
  // casting progress
  if(p.casting>0){
    p.casting-=rawDt/p.castTime;
    if(p.casting<=0){ p.casting=0; finishCast(); }
  }
  // cooldowns
  for(const k in CB.cooldowns){ CB.cooldowns[k]-=rawDt; if(CB.cooldowns[k]<=0)delete CB.cooldowns[k]; }
  // buff timers
  for(const k in p.buffs){ if(typeof p.buffs[k]==='number'){ p.buffs[k]-=rawDt; if(p.buffs[k]<=0)delete p.buffs[k]; } }
  // arena holy ground regen
  if(CB.arenaEvent==='holyground'){ p.hp=clamp(p.hp+5*rawDt,0,p.maxhp); }
  // mana overload potion dot
  if(p.buffs.manaover){ damagePlayer(5*rawDt,true); }
  // lich form free spells handled in cast
}

/* ---------------- SPELL CASTING ---------------- */
function castSpellSlot(slot){
  if(!CB||CB.over)return;
  if(CB.tb){ CB.selSlot=slot; tbPlayerCast(slot); return; }
  CB._lastSlot=slot;
  const sid=G.loadout[slot];
  if(!sid)return;
  castSpell(sid);
}
function castSpell(sid){
  const p=CB.player,sp=SPELLS[sid];
  if(!sp)return;
  if(p.casting>0)return;
  if(p.blocking)return;
  if(CB.cooldowns[sid]>0)return;
  // cost
  let cost=sp.cost;
  const manaStormDisc=CB.arenaEvent==='manastorm'?0.5:1;
  cost=Math.round(cost*manaStormDisc);
  const lichFree=p.buffs.lichForm>0;
  const freeCast=p.buffs.freecast;
  // overcharge / overload double cost
  let willOvercharge=false;
  if(CB.cls.id==='power'){
    if(CB.overloadActive>0)willOvercharge=true;
    else if(Math.random()<0.20)willOvercharge=true;
  }
  let payMana=cost*(willOvercharge?2:1);
  if(lichFree||freeCast)payMana=0;
  if(p.mana<payMana){ floatNumber(p.x,p.y-20,'no mana',{miss:true}); return; }
  p.mana-=payMana;
  if(freeCast)delete p.buffs.freecast;
  // start cast (incantation) — can't move
  p.castSpell=sid;p.castOvercharge=willOvercharge;
  p.castTime=clamp(0.3+ (sp.cost/200),0.3,0.5);
  p.casting=1;
  // aim
  p.castAim=Math.atan2(mouse.y-p.y,mouse.x-p.x);
  // cast charge particles
  for(let i=0;i<10;i++){
    const a=rand(0,7);
    CB.particles.push({x:p.x+Math.cos(a)*30,y:p.y+Math.sin(a)*30,tx:p.x,ty:p.y,vx:0,vy:0,life:p.castTime,maxlife:p.castTime,r:rand(2,4),color:EL_COLORS[sp.el],converge:true});
  }
  const btn=document.querySelectorAll('.spell-btn')[G.loadout.indexOf(sid)];
  if(btn){btn.classList.remove('cast-flash');void btn.offsetWidth;btn.classList.add('cast-flash');}
  if(CB.spellMenuOpen)openSpellMenu(false);
}
function finishCast(){
  const p=CB.player;
  const sid=p.castSpell;if(!sid)return;
  const sp=SPELLS[sid];
  p.castSpell=null;
  const overcharge=p.castOvercharge;
  // cooldown (time piece relic -25%)
  let cd=sp.cd;
  if(G.relics.includes('time_piece'))cd*=0.75;
  CB.cooldowns[sid]=cd;
  // mastery use tracking
  trackMasteryUse(sid);
  CB.stat.spellUse[sid]=(CB.stat.spellUse[sid]||0)+1;
  // combo cast detection
  detectComboCast(sp.el);
  // echo stone: queue repeat
  if(G.relics.includes('echo_stone')){
    CB.echoQueue.push({sid,aim:p.castAim,delay:3,power:0.3});
  }
  // overload fill
  if(overcharge && CB.cls.id==='power'){
    showBanner('OVERCHARGE!','#ffffff',true);
    flashScreen('rgba(255,255,255,.5)',150);
    if(CB.overloadActive<=0){
      CB.mech=clamp(CB.mech+34,0,100);
      if(CB.mech>=100){ triggerAbsolutePower(); }
    }
  }
  executeSpell(sid,p.x,p.y,p.castAim,{overcharge});
}
function trackMasteryUse(sid){
  if(!G.masteries[sid])G.masteries[sid]={uses:0,path:null};
  const before=masteryTier(G.masteries[sid].uses);
  // learning stat boosts use gain
  const gain=Math.max(1,Math.round(CB.stats.learning));
  G.masteries[sid].uses+=gain;
  const after=masteryTier(G.masteries[sid].uses);
  if(after>before){
    showBanner(SPELLS[sid].name+' — '+TIER_NAMES[after]+'!','#ffd866',true);
    buildSpellBar();
  }
}

// compute outgoing spell damage for a spell
function spellDamage(sid,overcharge){
  const sp=SPELLS[sid],s=CB.stats;
  let base=(sp.dmg||0)*(1+s.sp/40);
  base*=masteryDmgMult(sid);
  // streak SP mult
  base*=CB.streakSPmult;
  // berserk
  if(CB.player.buffs.berserk)base*=1.5;
  if(CB.player.buffs.bloodpact)base*=1.4;
  if(overcharge)base*=2;
  return base;
}

function executeSpell(sid,x,y,aim,opt={}){
  const sp=SPELLS[sid];
  const dmg=spellDamage(sid,opt.overcharge||(opt.echo?false:false));
  const power=opt.power||1;
  const finalDmg=dmg*power;
  // self / utility spells
  if(sp.kind==='self'){
    if(sp.heal){ healPlayer(sp.heal*(CB.cls.id==='water'?1.25:1)); }
    if(sp.shield){ CB.player.shield=Math.max(CB.player.shield,sp.shield); spawnImpact(x,y,sp.el,1.2); floatNumber(x,y-20,'+shield',{heal:true}); }
    if(sp.mana){ CB.player.mana=clamp(CB.player.mana+sp.mana,0,CB.player.maxmana); floatNumber(x,y-20,'+'+sp.mana+' mana',{heal:true}); }
    spawnCastBurst(x,y,sp.el);
    return;
  }
  if(sp.kind==='summon'){
    doSummon(sp);return;
  }
  // damaging spells
  if(sp.kind==='projectile'){
    spawnProjectile(sid,x,y,aim,finalDmg,opt);
  } else if(sp.kind==='beam'){
    spawnBeam(sid,x,y,aim,finalDmg,opt);
  } else if(sp.kind==='aoe'){
    // AoE centered at mouse if available else forward
    let tx=mouse.x,ty=mouse.y;
    if(opt.echo){ tx=x+Math.cos(aim)*180;ty=y+Math.sin(aim)*180; }

  }
  if(sp.heal){ healPlayer(sp.heal*(CB.cls.id==='water'?1.25:1)); }
}

function spawnBeam(sid,x,y,aim,dmg,opt){

function spawnAoE(sid,tx,ty,dmg,opt){

  if(sp.el==='fire'){ CB.grounds.push({type:'flame',x:tx,y:ty,r:r*0.6,life:3,dmgT:0,el:'fire'}); }

/* ---------------- DAMAGE SYSTEM ---------------- */
function dealDamage(e,baseDmg,el,opt={}){
  const s=CB.stats,p=CB.player;
  if(e.hp<=0)return {killed:false,dealt:0};
  // immunity
  if(e.def.immune===el){ floatNumber(e.x,e.y-e.radius,'immune',{miss:true}); return {killed:false,dealt:0}; }
  // hit chance
  let acc=s.hit - (e.statuses.blind?0:0);
  // dodge of enemy? enemies don't dodge much; use small
  const roll=rand(0,100);
  if(roll>acc){ floatNumber(e.x,e.y-e.radius,'miss...',{miss:true}); return {killed:false,dealt:0}; }
  let dmg=baseDmg;
  // weakness (essence attunement & general)
  let weak=false;
  if(e.weakness===el || (e.weakness==='any' && el)){ weak=true; }
  if(weak){
    dmg*=1.5;
    if(CB.cls.id==='essence'){ dmg*=1.2; CB.mech=clamp(CB.mech+8,0,100); if(CB.mech>=100)triggerSingularity(); }
  }
  // vuln / boil
  if(e.statuses.vuln)dmg*=e.statuses.vuln.val;
  // defdown handled via def calc; enemies have no def to speak of
  // crit
  let crit=false;
  let critChance=s.crit;
  if(G.relics.includes('cursed_eye'))critChance+=20;
  // storm crystal every 5th spell auto-crit
  if(opt.sid && G.relics.includes('storm_crystal')){
    CB.storCounter=(CB.storCounter||0);
  }
  if(roll<acc){
    let cr=rand(0,100);
    if(cr<critChance)crit=true;
  }
  if(CB._forceCrit){crit=true;CB._forceCrit=false;}
  if(crit){
    const critMult=CB.arenaEvent==='bloodmoon'?2.5:1.75;
    dmg*=critMult;
    CB.stat.crits++;
    bountyProgress('crits10',1);
  }
  // madman's crown / chaos draught random
  if(G.relics.includes('madmans_crown'))dmg*=rand(0,3);
  if(p.buffs.chaos>0){ dmg*=(Math.random()<0.5?0.5:3); p.buffs.chaos--; }
  // shatter combo handled in status apply
  dmg=Math.max(1,Math.round(dmg));
  e.hp-=dmg;
  e.flash=1;
  CB.stat.dmg+=dmg;
  // void heart lifesteal
  if(G.relics.includes('void_heart'))healPlayer(dmg*0.08,true);
  // float number
  if(crit){ floatNumber(e.x,e.y-e.radius,'✦ '+dmg+' ✦',{crit:true}); }
  else { floatNumber(e.x,e.y-e.radius,''+dmg,{}); }
  spawnHitParticles(e.x,e.y,el);
  // apply status
  if(opt.status && !(opt.sid && masteryNoStatus(opt.sid))){
    applyStatus(e,opt.status);
  }
  // mastery path A adds status even if spell had none
  if(opt.sid){ const m=G.masteries[opt.sid]; if(m&&masteryTier(m.uses)>=3&&m.path==='A'){ applyStatus(e,SPELLS[opt.sid].status||elDefaultStatus(el)); } }
  // class on-hit passives
  applyOnHitPassive(e,el);
  // check death
  if(e.hp<=0){ if(crit)critKillSlowmo(); killEnemy(e,el); return {killed:true,dealt:dmg,crit}; }
  return {killed:false,dealt:dmg,crit};
}
function masteryNoStatus(sid){ const m=G.masteries[sid]; return m && masteryTier(m.uses)>=3 && m.path==='B'; }
function elDefaultStatus(el){ return {fire:'burn',ice:'slow',wind:'wind',power:'thunder',earth:'mud',water:'slow'}[el]||null; }

/* ---------------- STATUS & COMBOS ---------------- */
function applyStatus(e,status){
  if(!status||e.hp<=0)return;
  const st=e.statuses;
  switch(status){
    case 'burn':
      if(G.relics.includes('dragon_scale')&&false){} // dragon scale only protects player
      st.burn=st.burn||{stacks:0,time:0,dmgT:0};
      st.burn.stacks=Math.min(3,st.burn.stacks+1);st.burn.time=3;
      break;
    case 'slow': st.slow={time:3,val:0.6}; break;
    case 'freeze':
      // freeze: 5% from passive handled elsewhere; spells with freeze stun
      st.freeze={time:1.5};
      if(CB.cls.id==='ice'){ CB.mech=clamp(CB.mech+18,0,100); if(CB.mech>=100)triggerAbsoluteZero(); }
      spawnFreezeVfx(e);
      break;
    case 'thunder': st.thunder={time:2.5}; break;
    case 'mud': st.mud={time:4}; st.slow=st.slow||{time:4,val:0.6}; break;
    case 'wind': st.wind={time:2}; break;
  }
  // build current tag set
  rebuildTags(e);
  // check combos
  checkCombo(e,status);
}
function rebuildTags(e){
  e.statusTags=new Set();
  for(const k of ['burn','slow','freeze','thunder','mud','wind']){ if(e.statuses[k])e.statusTags.add(k); }
}
function checkCombo(e,justAdded){
  for(const c of COMBOS){
    if((e.statusTags.has(c.a)&&e.statusTags.has(c.b))){
      // avoid re-triggering same combo within cooldown
      e._comboCd=e._comboCd||{};
      if(e._comboCd[c.name]>CB.time)continue;
      e._comboCd[c.name]=CB.time+1.2;
      triggerCombo(e,c);
    }
  }
}
function triggerCombo(e,c){
  showCenterCombo(c.name,c.color);
  CB.stat.combos++;
  CB.stat.highCombo=c.name;
  bountyProgress('combos',1);
  doShockwave(e.x,e.y,c.color,1);
  triggerShake(8);
  // consume the two tags
  e.statuses[c.a]&&(delete e.statuses[c.a]);
  e.statuses[c.b]&&(delete e.statuses[c.b]);
  rebuildTags(e);
  switch(c.effect){
    case 'vuln': e.statuses.vuln={time:c.dur,val:c.val}; break;
    case 'stun': e.statuses.stun={time:c.dur}; break;
    case 'burst': { const d=Math.round(e.maxhp*0.25*c.val); dealComboDamage(e,d,c.color); } break;
    case 'defdown': e.statuses.defdown={time:c.dur,val:c.val}; e.statuses.vuln={time:c.dur,val:1.5}; break;
    case 'blind': e.statuses.blind={time:c.dur}; break;
  }
}
function dealComboDamage(e,d,color){
  e.hp-=d;e.flash=1;CB.stat.dmg+=d;
  floatNumber(e.x,e.y-e.radius,'✦ '+d+' ✦',{crit:true,color});
  if(e.hp<=0)killEnemy(e,'essence');
}

/* ---------------- COMBO CASTS (sequence) ---------------- */

/* ---------------- ON-HIT CLASS PASSIVES ---------------- */
function applyOnHitPassive(e,el){
  const cls=CB.cls.id;
  if(cls==='fire'&&el==='fire'){ if(Math.random()<0.30)applyStatus(e,'burn'); }
  if(cls==='ice'&&el==='ice'){
    const r=Math.random();
    if(r<0.05){ applyStatus(e,'freeze'); }
    else if(r<0.30){ applyStatus(e,'slow'); }
  }
  if(cls==='earth'){
    const sp=SPELLS[CB._castingMelee];
    // melee spells 15% stun
    if(Math.random()<0.15 && el==='earth'){ e.statuses.stun={time:1}; spawnRockEncase(e); }
  }
  if(cls==='power'&&el==='power'){ /* overcharge handled in cast */ }
}

/* ---------------- KILL ---------------- */
function killEnemy(e,el){
  if(e._dead)return;e._dead=true;
  const def=e.def;
  // golem split
  if(e.type==='golem'&&def.splits&&!e._split&&!e.isMini){
    for(let i=0;i<2;i++){ const c=spawnEnemy('golem',{hp:60}); c._split=true;c.maxhp=c.hp=60;c.radius=20;c.x=e.x+rand(-30,30);c.y=e.y+rand(-30,30); }
  }
  // death particles
  deathBurst(e.x,e.y,el,e.radius);
  triggerShake(e.isBoss?20:e.isMini?12:4);
  // rewards
  const d=diffMods();
  let gold=randInt(def.gold?def.gold[0]:10,def.gold?def.gold[1]:16);
  let xp=def.xp||5;
  if(e.isMini){gold=250;xp=40;}
  if(e.isBoss){gold=randInt(150,200);xp=80;}
  gold=Math.round(gold*d.reward*CB.goldMult);
  if(CB.arenaEvent==='windfall')gold*=3;
  xp=Math.round(xp*d.reward);
  CB.stat.gold+=gold;
  G.gold+=gold;
  addXP(xp);
  floatNumber(e.x,e.y-10,'+'+gold+'g',{gold:true});
  // fire combustion
  if(CB.cls.id==='fire'&&e.statuses.burn){
    CB.combustion=Math.min(3,CB.combustion+1);
    if(CB.combustion>=3)triggerCombustion();
  }
  // necro soul harvest
  if(CB.cls.id==='necro'){
    const capChance=e.isBoss?0.20:0.30;
    const slots=3+Math.floor(G.shadowMagic);
    if(Math.random()<capChance && p_canCapture(e) && G.soulStash.length<slots){
      G.soulStash.push(e.type);
      floatNumber(e.x,e.y-30,'soul captured',{heal:true});
    }
  }
  // relics on kill
  if(G.relics.includes('lichs_ring')&&Math.random()<0.05){ CB.player.mana=CB.player.maxmana; floatNumber(CB.player.x,CB.player.y-30,'mana!',{heal:true}); }
  if(G.relics.includes('necro_pact')&&Math.random()<0.10){ spawnAllyShadow(15); }
  // streak
  addKillStreak();
  CB.stat.kills++;
  // remove
  e._removeAt=CB.time+0.05;
  // boss death
  if(e.isBoss){ onBossDefeated(); }
  if(e.isMini){ showBanner('MINI-BOSS SLAIN','#ffd866',true); maybeDropRelic(true); }
}
function p_canCapture(e){ return CB.stats.sp>=0; } // capture at 50% power simplified
function maybeDropRelic(guaranteed){
  if(guaranteed||Math.random()<0.20){
    const avail=Object.keys(RELICS).filter(k=>!G.inventory.relics.includes(k));
    if(avail.length){ const r=pick(avail); G.inventory.relics.push(r); floatNumber(CB.player.x,CB.player.y-40,'⚜ Relic: '+RELICS[r].name,{gold:true}); }
  }
}

/* ---------------- XP & LEVEL ---------------- */
function addXP(amt){
  G.xp+=amt;
  let need=xpNeeded(G.level);
  while(G.xp>=need){
    G.xp-=need;
    G.level++;
    G.statPoints+=5;
    levelUpFx();
    need=xpNeeded(G.level);
  }
}
function levelUpFx(){
  $('levelupFlash').classList.remove('show');void $('levelupFlash').offsetWidth;$('levelupFlash').classList.add('show');
  $('levelupText').classList.remove('show');void $('levelupText').offsetWidth;$('levelupText').classList.add('show');
  // heal a bit on level up
  CB.player.hp=clamp(CB.player.hp+CB.player.maxhp*0.3,0,CB.player.maxhp);
  CB.player.mana=CB.player.maxmana;
  triggerShake(6);
}

/* ---------------- PLAYER DAMAGE / HEAL ---------------- */
function damagePlayer(dmg,isDot){
  const p=CB.player,s=CB.stats;
  if(p.hp<=0)return;
  // dodge
  if(!isDot){
    let dodge=s.dodge;
    if(CB.cls.id==='wind')dodge+=0; // already in base
    if(rand(0,100)<dodge){
      floatNumber(p.x,p.y-30,'dodge!',{miss:true});
      if(!CB.tb)onPlayerDodge();
      return;
    }
  }
  let final=dmg;
  // block (earth)
  if(p.blocking)final*=0.4;
  // stone skin flat reduction
  if(CB.cls.id==='earth')final=Math.max(1,final-10);
  // defense reduction
  final=final*(100/(100+Math.max(0,s.def)*2.5));
  // mirror shard reflect
  if(p.buffs.mirror && !isDot){ delete p.buffs.mirror; floatNumber(p.x,p.y-30,'↩ reflected',{reflect:true}); return; }
  final=Math.max(isDot?0.5:1,Math.round(final));
  // shield absorbs
  if(p.shield>0){
    const absorb=Math.min(p.shield,final);
    p.shield-=absorb;final-=absorb;
  }
  if(final<=0)return;
  p.hp-=final;
  if(!isDot){
    floatNumber(p.x,p.y-30,'-'+final,{playerHit:true});
    if(final>p.maxhp*0.15){ triggerShake(10); flashScreen('rgba(180,0,0,.3)',200); resetStreakOnHit(); }
    // tide gauge fill (water)
    if(!CB.tb && CB.cls.id==='water'){ CB.mech=clamp(CB.mech+final/3,0,100); if(CB.mech>=100)triggerTidalSurge(); }
    // tectonic charge (earth)
    if(!CB.tb && CB.cls.id==='earth'){ CB.mech=clamp(CB.mech+final/3,0,100); if(CB.mech>=100)triggerEarthquake(); }
    // cursed eye perma loss
    if(G.relics.includes('cursed_eye')){ p.maxhp=Math.max(20,p.maxhp-5); }
  }
  if(p.hp<=0){ if(CB.tb)tbPlayerDown(); else playerDeath(); }
}
function healPlayer(amt,silent){
  const p=CB.player;
  amt=Math.round(amt);
  p.hp=clamp(p.hp+amt,0,p.maxhp);
  if(!silent)floatNumber(p.x,p.y-30,'+'+amt,{heal:true});
  if(!CB.tb && CB.cls.id==='water'){ CB.mech=clamp(CB.mech+amt/4,0,100); if(CB.mech>=100)triggerTidalSurge(); }
}
function onPlayerDodge(){
  if(CB.cls.id==='wind'){ CB.galeStacks=Math.min(5,CB.galeStacks+1); CB.mech=CB.galeStacks/5*100; if(CB.galeStacks>=5)triggerTornado(); }
  if(G.relics.includes('soul_mirror')){
    // deal 40% of avoided damage to nearest enemy
    const e=nearestEnemy();
    if(e)dealDamage(e,20,'essence',{});
  }
}
function nearestEnemy(){
  let best=null,bd=1e9;
  for(const e of CB.enemies){ if(e._dead)continue; const dd=dist(e.x,e.y,CB.player.x,CB.player.y); if(dd<bd){bd=dd;best=e;} }
  return best;
}

/* ---------------- KILL STREAK ---------------- */
const STREAK_TIERS=[
  {kills:3,name:'TRIPLE KILL',sp:0.10,color:'#ff8844'},
  {kills:5,name:'RAMPAGE',sp:0.20,color:'#ff5522'},
  {kills:10,name:'UNSTOPPABLE',sp:0.30,color:'#ffaa00'},

];
function addKillStreak(){
  CB.killStreak++;

function updateStreak(rawDt){

/* ---------------- ENEMY UPDATE / AI ---------------- */
function updateEnemies(dt){
  const p=CB.player;
  for(const e of CB.enemies){
    if(e._dead){ continue; }
    if(e.flash>0)e.flash-=dt*4;
    e.wob+=dt*4;
    // statuses affecting movement
    const stunned = e.statuses.stun||e.statuses.freeze||e.statuses.paralysis;
    let spdMul=1;
    if(e.statuses.slow)spdMul*=0.6;
    // enrage at <25%
    if(!e.enraged && e.hp>0 && e.hp/e.maxhp<0.25 && !e.isBoss){ e.enraged=true; e.speed*=1.5; e.dmg=Math.round(e.dmg*1.25); }
    // knockback velocity decay
    e.x+=e.vx*dt;e.y+=e.vy*dt;e.vx*=0.88;e.vy*=0.88;
    e.x=clamp(e.x,-40,CB.w+40);e.y=clamp(e.y,-40,CB.h+40);
    // pull (tornado)
    if(e._pullTo){
      const a=Math.atan2(e._pullTo.y-e.y,e._pullTo.x-e.x);
      e.x+=Math.cos(a)*200*dt;e.y+=Math.sin(a)*200*dt;
      e._pullTo.timer-=dt;
      e._pullhit=(e._pullhit||0)-dt;
      if(e._pullhit<=0){ e._pullhit=0.25; dealDamage(e,15,'wind',{}); }
      if(e._pullTo.timer<=0)e._pullTo=null;
      continue;
    }
    if(stunned)continue;
    // blind: random movement
    const blind=e.statuses.blind;
    const ai=e.def.ai;
    const d2p=dist(e.x,e.y,p.x,p.y);
    const ang=Math.atan2(p.y-e.y,p.x-e.x)+(blind?rand(-2,2):0);
    if(ai==='melee'||ai==='mimic'){
      if(d2p>e.radius+p.radius+4){ e.x+=Math.cos(ang)*e.speed*spdMul*dt; e.y+=Math.sin(ang)*e.speed*spdMul*dt; }
      e.attackCd-=dt;
      if(d2p<e.radius+p.radius+10 && e.attackCd<=0){ e.attackCd=rand(0.8,1.4); enemyAttack(e,'melee'); }
    } else if(ai==='ranged'||e.isBoss){
      // keep distance ~300
      const ideal=e.isBoss?260:300;
      if(d2p<ideal-40){ e.x-=Math.cos(ang)*e.speed*spdMul*dt; e.y-=Math.sin(ang)*e.speed*spdMul*dt; }
      else if(d2p>ideal+60){ e.x+=Math.cos(ang)*e.speed*spdMul*dt; e.y+=Math.sin(ang)*e.speed*spdMul*dt; }
      // low-IQ: occasionally get stuck
      e.attackCd-=dt;
      if(e.attackCd<=0){ e.attackCd=e.isBoss?CB.boss.attackCd:rand(1.2,2.4); enemyRangedAttack(e); }
    } else if(ai==='summoner'){
      // flee + summon
      if(d2p<300){ e.x-=Math.cos(ang)*e.speed*spdMul*dt; e.y-=Math.sin(ang)*e.speed*spdMul*dt; }
      e.summonTimer-=dt;
      if(e.summonTimer<=0){ e.summonTimer=5; for(let i=0;i<2;i++)spawnEnemy('goblin'); showBanner('Summoner calls reinforcements!','#cc66cc'); }
      e.attackCd-=dt;
      if(e.attackCd<=0){ e.attackCd=rand(1.5,2.5); enemyRangedAttack(e); }
    }
    e.x=clamp(e.x,10,CB.w-10);e.y=clamp(e.y,10,CB.h-10);
    if(e.isBoss)checkBossPhase();
    // mimic boss-phase style handled as melee/ranged hybrid: shoot player's element
  }
  // remove dead enemies past removal time
  CB.enemies=CB.enemies.filter(e=>!(e._dead && e._removeAt && CB.time>e._removeAt));
}
function enemyAttack(e,kind){
  // melee swing
  CB.effects.push({type:'swing',x:e.x,y:e.y,tx:CB.player.x,ty:CB.player.y,life:0.2,maxlife:0.2,color:e.def.color});
  damagePlayer(e.dmg);
}
function enemyRangedAttack(e){
  const ang=Math.atan2(CB.player.y-e.y,CB.player.x-e.x);
  let el='shadow';
  if(e.type==='goblin')el='fire';
  if(e.type==='archer')el='shadow';
  if(e.type==='fireelem')el='fire';
  if(e.type==='iceelem')el='ice';
  if(e.isBoss)el=pick(['fire','ice','shadow','power','essence']);
  if(e.type==='mimic')el=SPELLS[G.loadout[0]]?SPELLS[G.loadout[0]].el:'shadow';
  CB.projectiles.push({
    el,x:e.x,y:e.y,vx:Math.cos(ang)*340,vy:Math.sin(ang)*340,
    dmg:e.dmg,radius:8,life:3,from:'enemy',spin:0,
  });
  // boss phase 3 screen-wide
  if(e.isBoss&&CB.bossPhase===3&&Math.random()<0.4){
    for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; CB.projectiles.push({el:'power',x:e.x,y:e.y,vx:Math.cos(a)*300,vy:Math.sin(a)*300,dmg:e.dmg,radius:9,life:3,from:'enemy',spin:0}); }
  }
}

/* ---------------- PROJECTILES UPDATE ---------------- */
function updateProjectiles(dt){
  const p=CB.player;
  for(const pr of CB.projectiles){
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;pr.spin=(pr.spin||0)+dt*10;
    // trail particles
    if(Math.random()<0.7){
      CB.particles.push({x:pr.x,y:pr.y,vx:rand(-10,10),vy:rand(-10,10),life:0.4,maxlife:0.4,r:rand(2,5),color:EL_COLORS[pr.el],fade:true});
    }
    if(pr.from==='player'){
      for(const e of CB.enemies){
        if(e._dead)continue;
        if(dist(pr.x,pr.y,e.x,e.y)<e.radius+pr.radius){
          dealDamage(e,pr.dmg,pr.el,{status:pr.status,sid:pr.sid,overcharge:pr.overcharge});
          spawnImpact(pr.x,pr.y,pr.el,1);
          pr.life=0;break;
        }
      }
    } else {
      // enemy projectile hits player
      if(dist(pr.x,pr.y,p.x,p.y)<p.radius+pr.radius){
        damagePlayer(pr.dmg);
        spawnImpact(pr.x,pr.y,pr.el,0.8);
        pr.life=0;
      }
      // hits summons
      for(const s of CB.summons){ if(dist(pr.x,pr.y,s.x,s.y)<s.radius+pr.radius){ s.hp-=pr.dmg; spawnImpact(pr.x,pr.y,pr.el,0.6); pr.life=0; } }
    }
    if(pr.x<-40||pr.x>CB.w+40||pr.y<-40||pr.y>CB.h+40)pr.life=0;
  }
  CB.projectiles=CB.projectiles.filter(pr=>pr.life>0);
  CB.summons=CB.summons.filter(s=>s.hp>0&&s.life>0);
}

/* ---------------- STATUS TICK ---------------- */
function updateStatuses(dt){
  for(const e of CB.enemies){
    if(e._dead)continue;
    const st=e.statuses;
    for(const k in st){

    CB._phoenixUsed=true;G.phoenixTear=false;

    p.buffs.lichForm=10;
    showBanner('💀 LICH FORM 💀','#00ff44',true);

    const def=bountyDef(b.id);
    if(def.track===track){

/* ---------------- POTIONS ---------------- */
function usePotion(slot){
  if(!CB||CB.over)return;
  const pid=G.potions[slot];
  if(!pid)return;
  const def=POTIONS[pid];
  const p=CB.player;
  CB.stat.potionsUsed++;
  switch(def.effect){
    case 'heal':healPlayer(50);break;
    case 'mana':p.mana=clamp(p.mana+60,0,p.maxmana);floatNumber(p.x,p.y-30,'+60 mana',{heal:true});break;
    case 'berserk':p.buffs.berserk=30;showBanner('BERSERK!','#ff4400',true);break;
    case 'slowall':for(const e of CB.enemies)e.statuses.slow={time:10,val:0.4};showBanner('TIME SAND','#ffcc66',true);break;
    case 'bloodpact':damagePlayer(p.maxhp*0.2,true);p.buffs.bloodpact=20;showBanner('BLOOD PACT','#ff0044',true);break;
    case 'freecast':p.buffs.freecast=true;floatNumber(p.x,p.y-30,'free cast',{heal:true});break;
    case 'chaos':p.buffs.chaos=3;showBanner('CHAOS DRAUGHT','#cc66ff',true);break;
    case 'mirror':p.buffs.mirror=true;floatNumber(p.x,p.y-30,'mirror ready',{heal:true});break;
    case 'manaover':p.mana=p.maxmana;p.buffs.manaover=20;showBanner('MANA OVERLOAD','#9966ff',true);break;
  }
  // consume (basics & specials are consumed; remove from carried)
  G.potions.splice(slot,1);
  buildPotionBar();
}

/* ============================================================
   ======================  RENDERING  =========================
============================================================ */
function render(){
  const w=CB.w,h=CB.h;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  // screen shake
  if(CB.shake>0){ ctx.translate(rand(-CB.shake,CB.shake),rand(-CB.shake,CB.shake)); }
  renderArena(w,h);
  renderGrounds();
  renderEffectsBelow();
  renderSummons();
  renderEnemies();
  renderPlayer();
  renderProjectiles();
  renderParticles();
  renderEffectsAbove();
  renderNumbers();
  if(CB.darkness)renderDarkness(w,h);
  renderFog(w,h);
  ctx.restore();
}

function renderArena(w,h){
  const t=CB.time;
  // ---- Sword & Sandals style gladiator pit ----
  // outer colosseum stone wall
  const wallGrad=ctx.createLinearGradient(0,0,0,h);
  wallGrad.addColorStop(0,'#3c2e22');
  wallGrad.addColorStop(1,'#1a130d');
  ctx.fillStyle=wallGrad;
  ctx.fillRect(0,0,w,h);
  // sandy fighting-pit floor (inset from the wall)
  const bx=Math.min(56,w*0.06), by=Math.min(56,h*0.07);
  const fx=bx, fy=by, fw=w-bx*2, fh=h-by*2;
  const floorGrad=ctx.createLinearGradient(0,fy,0,fy+fh);
  floorGrad.addColorStop(0,'#caa467');
  floorGrad.addColorStop(1,'#9a7a48');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(fx,fy,fw,fh);
  // raked-sand rings
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.strokeStyle='#7a5c34';ctx.lineWidth=2;
  for(let r=50;r<Math.max(fw,fh);r+=70){ ctx.beginPath();ctx.arc(w/2,h/2,r,0,7);ctx.stroke(); }
  ctx.restore();
  // sand grain speckles (cached so they don't flicker frame-to-frame)
  if(!CB._sand){ CB._sand=[]; for(let i=0;i<130;i++)CB._sand.push({x:rand(fx,fx+fw),y:rand(fy,fy+fh),r:rand(1,2.6),a:rand(.05,.16)}); }
  for(const sp of CB._sand){ ctx.save();ctx.globalAlpha=sp.a;ctx.fillStyle='#6b4f28';ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r,0,7);ctx.fill();ctx.restore(); }
  // crowd silhouettes packed into the wall bands (cached)
  if(!CB._crowd){
    CB._crowd=[];
    const rowsY=[by*0.35,by*0.7,h-by*0.35,h-by*0.7];
    for(const cy of rowsY){
      for(let x=10;x<w-10;x+=14){
        CB._crowd.push({x:x+rand(-3,3),y:cy+rand(-4,4),r:rand(2.5,4.5),c:pick(['#5a4a6a','#4a5a6a','#6a4a4a','#5a5a4a','#7a6a55'])});
      }
    }
  }
  ctx.save();
  for(const c of CB._crowd){
    const bob=Math.sin(t*2+c.x*0.1)*1.2;
    ctx.globalAlpha=0.85;ctx.fillStyle=c.c;
    ctx.beginPath();ctx.arc(c.x,c.y+bob,c.r,0,7);ctx.fill();
  }
  ctx.restore();
  // glowing arcane runes (static-ish, pulsing)
  if(!CB._runes){ CB._runes=[]; for(let i=0;i<5;i++)CB._runes.push({x:rand(0.15,0.85)*w,y:rand(0.2,0.8)*h,r:rand(40,80),seed:rand(0,7)}); }
  const runeCol=CB.cls.c2;
  for(const rn of CB._runes){
    const pulse=0.3+0.25*Math.sin(t2(t)+rn.seed);
    ctx.save();ctx.globalAlpha=pulse;ctx.translate(rn.x,rn.y);ctx.rotate(t*0.1+rn.seed);
    ctx.strokeStyle=runeCol;ctx.lineWidth=2;ctx.shadowColor=runeCol;ctx.shadowBlur=12;
    ctx.beginPath();
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.lineTo(Math.cos(a)*rn.r,Math.sin(a)*rn.r); }
    ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,rn.r*0.5,0,7);ctx.stroke();
    ctx.restore();
  }
  // flickering wall torches (orange light from edges)
  const torchPos=[[40,h*0.3],[40,h*0.7],[w-40,h*0.3],[w-40,h*0.7],[w*0.3,40],[w*0.7,40]];
  for(let i=0;i<torchPos.length;i++){
    const[tx,ty]=torchPos[i];
    const flick=0.6+0.4*Math.sin(t*8+i*2)+rand(-0.1,0.1);
    const g=ctx.createRadialGradient(tx,ty,0,tx,ty,140);
    g.addColorStop(0,`rgba(255,150,40,${0.22*flick})`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(tx,ty,140,0,7);ctx.fill();
    // torch flame
    ctx.save();ctx.translate(tx,ty);
    ctx.fillStyle=`rgba(255,${150+rand(-30,40)|0},40,${flick})`;ctx.shadowColor='#ff8800';ctx.shadowBlur=14;
    ctx.beginPath();ctx.ellipse(0,0,5,10+Math.sin(t*10+i)*3,0,0,7);ctx.fill();ctx.restore();
  }
}
function t2(t){return t*1.5;}

function renderFog(w,h){
  ctx.save();
  ctx.globalAlpha=0.5;
  const t=CB.time;
  for(let i=0;i<4;i++){
    const edge=i;
    const off=Math.sin(t*0.3+i)*40;
    const g=ctx.createLinearGradient(0,0,edge<2?0:w,edge<2?h:0);
    // simple edge fog rectangles
  }
  // rolling fog from edges via radial gradients
  const fogCol='rgba(40,40,70,';
  const margin=120;
  // left/right/top/bottom soft fog
  let grad=ctx.createLinearGradient(0,0,margin,0);
  grad.addColorStop(0,fogCol+(0.5+0.15*Math.sin(t))+')');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.fillRect(0,0,margin,h);
  grad=ctx.createLinearGradient(w,0,w-margin,0);
  grad.addColorStop(0,fogCol+(0.5+0.15*Math.sin(t+1))+')');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.fillRect(w-margin,0,margin,h);
  grad=ctx.createLinearGradient(0,0,0,margin);
  grad.addColorStop(0,fogCol+(0.45+0.15*Math.sin(t+2))+')');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,margin);
  grad=ctx.createLinearGradient(0,h,0,h-margin);
  grad.addColorStop(0,fogCol+(0.45+0.15*Math.sin(t+3))+')');grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.fillRect(0,h-margin,w,margin);
  ctx.restore();
}
function renderDarkness(w,h){
  const p=CB.player;
  ctx.save();
  const g=ctx.createRadialGradient(p.x,p.y,80,p.x,p.y,260);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.92)');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.restore();
}

function renderPlayer(){
  const p=CB.player;
  if(CB.over && p.hp<=0)return;
  // killstreak aura
  let aura=0;
  if(CB.streakTier>=3)aura=1;
  else if(CB.streakTier>=2)aura=0.6;
  // lich form / absolute power glow
  if(p.buffs.lichForm>0||CB.overloadActive>0)aura=Math.max(aura,0.8);
  drawMage(ctx,p.x,p.y,1.4,CB.cls.id,CB.time,{facing:p.facing,aura,casting:p.casting});
  // casting charge ring
  if(p.casting>0){
    const sp=SPELLS[p.castSpell];
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.strokeStyle=EL_COLORS[sp?sp.el:'fire'];ctx.lineWidth=3;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=16;
    const prog=1-p.casting;
    ctx.beginPath();ctx.arc(0,0,32,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // blocking shield
  if(p.blocking){
    ctx.save();ctx.translate(p.x,p.y);ctx.globalAlpha=0.5;
    ctx.strokeStyle='#bb8844';ctx.lineWidth=4;ctx.shadowColor='#bb8844';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(0,0,30,0,7);ctx.stroke();ctx.restore();
  }
  // mana shield
  if(p.shield>0){
    ctx.save();ctx.translate(p.x,p.y);ctx.globalAlpha=0.4+0.2*Math.sin(CB.time*5);
    ctx.strokeStyle='#66ccff';ctx.lineWidth=3;ctx.shadowColor='#66ccff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(0,0,34,0,7);ctx.stroke();ctx.restore();
  }
}

function renderEnemies(){
  for(const e of CB.enemies){
    if(e._dead)continue;
    drawEnemy(e);
    drawEnemyBar(e);
  }
}
function drawEnemy(e){
  const t=CB.time;
  ctx.save();ctx.translate(e.x,e.y);
  const r=e.radius;
  // enrage glow
  if(e.enraged){ ctx.shadowColor='#ff2020';ctx.shadowBlur=18; }
  // body color, white flash on hit
  let col=e.def.color;
  if(e.flash>0)col='#ffffff';
  ctx.fillStyle=col;ctx.strokeStyle=shade(col,-50);ctx.lineWidth=2;
  const bob=Math.sin(t*3+e.wob)*2;
  ctx.translate(0,bob);
  if(e.isBoss){ drawBoss(e,col,t); ctx.restore(); return; }
  switch(e.type){
    case 'goblin': // small hunched, pointy hat
      ctx.beginPath();ctx.ellipse(0,4,r*0.8,r,0,0,7);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-r-6);ctx.lineTo(r*0.6,2);ctx.lineTo(-r*0.6,2);ctx.closePath();
      ctx.fillStyle=shade(col,-30);ctx.fill();ctx.stroke();
      eyeDots(ctx,'#ff3333',r);break;
    case 'golem': // blocky boulder
      ctx.fillStyle=col;
      roundRect(ctx,-r,-r,r*2,r*2,6);ctx.fill();ctx.stroke();
      ctx.fillStyle=shade(col,-25);roundRect(ctx,-r*0.5,-r*0.5,r,r*0.6,3);ctx.fill();
      eyeDots(ctx,'#ffaa33',r*0.6);break;
    case 'archer': // tall cloaked w/ bow
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.7,r);ctx.lineTo(-r*0.7,r);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.strokeStyle=shade(col,40);ctx.beginPath();ctx.arc(r*0.8,0,r*0.9,-1,1);ctx.stroke();
      eyeDots(ctx,'#cc66ff',r);break;
    case 'fireelem': // flaming spiky orb
      for(let i=0;i<8;i++){const a=i/8*7+t*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.6,Math.sin(a)*r*0.6);ctx.lineTo(Math.cos(a)*r*1.3,Math.sin(a)*r*1.3);ctx.strokeStyle='#ff7722';ctx.lineWidth=3;ctx.stroke();}
      ctx.fillStyle='#ff5522';ctx.shadowColor='#ff5522';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(0,0,r*0.7,0,7);ctx.fill();
      eyeDots(ctx,'#ffff66',r*0.5);break;
    case 'iceelem': // crystalline shard cluster
      ctx.fillStyle='#88ddff';ctx.shadowColor='#88ddff';ctx.shadowBlur=14;
      for(let i=0;i<6;i++){const a=i/6*7;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r*1.2);ctx.lineTo(Math.cos(a+0.4)*r*0.6,Math.sin(a+0.4)*r*0.6);ctx.closePath();ctx.fill();}
      eyeDots(ctx,'#ffffff',r*0.4);break;
    case 'wraith': // ghostly tattered, semi-transparent
      ctx.globalAlpha=0.7+0.2*Math.sin(t*4);
      ctx.fillStyle='#9988cc';ctx.shadowColor='#9988cc';ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(0,-r);ctx.quadraticCurveTo(r,-r*0.5,r*0.8,r*0.5);
      ctx.lineTo(r*0.4,r);ctx.lineTo(0,r*0.5);ctx.lineTo(-r*0.4,r);ctx.lineTo(-r*0.8,r*0.5);
      ctx.quadraticCurveTo(-r,-r*0.5,0,-r);ctx.closePath();ctx.fill();
      eyeDots(ctx,'#ddaaff',r*0.5);break;
    case 'summoner': // robed with floating orbs
      ctx.fillStyle='#cc66cc';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.8,r);ctx.lineTo(-r*0.8,r);ctx.closePath();ctx.fill();ctx.stroke();
      for(let i=0;i<3;i++){const a=t*2+i*2.1;ctx.fillStyle='#ff99ff';ctx.shadowColor='#ff99ff';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(Math.cos(a)*r*1.3,Math.sin(a)*r*1.3,3,0,7);ctx.fill();}
      eyeDots(ctx,'#ffffff',r*0.6);break;
    case 'mimic': // mimics player's class color
      const mc=CLASSES[e.mimicClass||G.classId];
      ctx.fillStyle=mc.c1;ctx.strokeStyle=mc.c2;
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.9,r);ctx.lineTo(-r*0.9,r);ctx.closePath();ctx.fill();ctx.stroke();
      eyeDots(ctx,mc.c2,r*0.6);break;
    default:
      ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();ctx.stroke();
  }
  // status icons above
  drawStatusVfx(e,r);
  ctx.restore();
}
function drawBoss(e,col,t){
  const r=e.radius;
  // dark swirling robe
  ctx.fillStyle=CB.bossPhase>=2?'#cc1133':'#660099';
  ctx.shadowColor=CB.bossPhase>=2?'#ff2040':'#cc33ff';ctx.shadowBlur=24;
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,r*0.6);ctx.lineTo(r*0.5,r);ctx.lineTo(0,r*0.7);ctx.lineTo(-r*0.5,r);ctx.lineTo(-r,r*0.6);ctx.closePath();ctx.fill();
  // floating chaos orbs
  for(let i=0;i<5;i++){const a=t*1.5+i*1.3;const rr=r*1.5;ctx.fillStyle=`hsl(${(t*100+i*60)%360},90%,60%)`;ctx.beginPath();ctx.arc(Math.cos(a)*rr,Math.sin(a)*rr*0.8,5,0,7);ctx.fill();}
  // glowing eyes
  ctx.shadowBlur=14;ctx.fillStyle='#ffff44';
  ctx.beginPath();ctx.arc(-r*0.3,-r*0.4,4,0,7);ctx.arc(r*0.3,-r*0.4,4,0,7);ctx.fill();
}
function eyeDots(ctx,color,r){
  ctx.save();ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(-r*0.3,-r*0.2,2,0,7);ctx.arc(r*0.3,-r*0.2,2,0,7);ctx.fill();ctx.restore();
}
function drawStatusVfx(e,r){
  const st=e.statuses;
  // burning flames above
  if(st.burn){
    for(let i=0;i<st.burn.stacks;i++){
      const fx=(i-1)*8,fy=-r-8-Math.abs(Math.sin(CB.time*8+i))*4;
      ctx.fillStyle=`rgba(255,${120+rand(-20,40)|0},20,0.9)`;ctx.shadowColor='#ff6600';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(fx,fy,3,6,0,0,7);ctx.fill();
    }
  }
  // freeze crystal overlay
  if(st.freeze||e._frozenVfx>0){
    ctx.save();ctx.globalAlpha=0.55;ctx.fillStyle='#aaeeff';ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*7;ctx.lineTo(Math.cos(a)*r*1.2,Math.sin(a)*r*1.2);}ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
    if(e._frozenVfx>0)e._frozenVfx-=0.016;
  }
  // slow droplets
  if(st.slow){ ctx.fillStyle='rgba(100,200,255,0.6)';ctx.beginPath();ctx.arc(0,-r-4,3,0,7);ctx.fill(); }
  // rock encase
  if(e._rockVfx>0){ ctx.strokeStyle='#bb8844';ctx.lineWidth=3;ctx.strokeRect(-r,-r,r*2,r*2);e._rockVfx-=0.02; }
  // stun stars
  if(st.stun){ ctx.fillStyle='#ffff66';for(let i=0;i<3;i++){const a=CB.time*4+i*2.1;ctx.beginPath();ctx.arc(Math.cos(a)*10,-r-8+Math.sin(a)*3,2,0,7);ctx.fill();} }
}
function drawEnemyBar(e){
  const r=e.radius;
  if(e.isBoss)return; // boss has top bar
  const w=r*2.2,x=e.x-w/2,y=e.y-r-16;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x,y,w,4);
  ctx.fillStyle=e.hp/e.maxhp<0.25?'#ff3030':'#ff6060';
  ctx.fillRect(x,y,w*clamp(e.hp/e.maxhp,0,1),4);
  // weakness icon
  const weakIcon={fire:'🔥',ice:'❄️',water:'💧',wind:'🌪️',essence:'✨',shadow:'💀',earth:'🪨',power:'⚡',any:'❔',none:'🚫'}[e.weakness]||'';
  if(weakIcon){ ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(weakIcon,e.x,y-2); }
}

function renderSummons(){
  for(const s of CB.summons){
    ctx.save();ctx.translate(s.x,s.y);
    ctx.globalAlpha=0.85;ctx.fillStyle='#00ff44';ctx.shadowColor='#00ff44';ctx.shadowBlur=12;
    const bob=Math.sin(CB.time*4+s.wob)*2;
    ctx.beginPath();ctx.moveTo(0,-s.radius+bob);ctx.lineTo(s.radius*0.7,s.radius+bob);ctx.lineTo(-s.radius*0.7,s.radius+bob);ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

function renderProjectiles(){
  for(const pr of CB.projectiles){
    const c=EL_COLORS[pr.el]||'#fff';
    ctx.save();ctx.translate(pr.x,pr.y);
    ctx.shadowColor=c;ctx.shadowBlur=16;
    if(pr.el==='ice'){ // sharp crystal shard
      ctx.rotate(Math.atan2(pr.vy,pr.vx));ctx.fillStyle='#bbeeff';
      ctx.beginPath();ctx.moveTo(pr.radius,0);ctx.lineTo(-pr.radius,pr.radius*0.6);ctx.lineTo(-pr.radius*0.5,0);ctx.lineTo(-pr.radius,-pr.radius*0.6);ctx.closePath();ctx.fill();
    } else if(pr.el==='earth'){ ctx.rotate(pr.spin);ctx.fillStyle=c;roundRect(ctx,-pr.radius,-pr.radius,pr.radius*2,pr.radius*2,3);ctx.fill();
    } else if(pr.el==='wind'){ ctx.globalAlpha=0.5;ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,pr.radius,0,Math.PI*1.4);ctx.stroke();
    } else if(pr.el==='essence'){ for(let i=0;i<3;i++){ctx.fillStyle=`hsl(${(CB.time*200+i*120)%360},90%,65%)`;ctx.beginPath();ctx.arc(Math.cos(i*2.1)*3,Math.sin(i*2.1)*3,pr.radius*0.7,0,7);ctx.fill();}
    } else { // fire/shadow/water/power round orb
      ctx.rotate(pr.spin);
      const g=ctx.createRadialGradient(0,0,0,0,0,pr.radius);
      g.addColorStop(0,'#fff');g.addColorStop(0.5,c);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,pr.radius,0,7);ctx.fill();
      if(pr.el==='power'){ ctx.strokeStyle='#fff';ctx.lineWidth=1.5;for(let i=0;i<3;i++){const a=rand(0,7);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*pr.radius*1.4,Math.sin(a)*pr.radius*1.4);ctx.stroke();} }
    }
    ctx.restore();
  }
}

function renderParticles(){
  for(const pt of CB.particles){
    const a=pt.fade?clamp(pt.life/pt.maxlife,0,1):1;
    ctx.save();ctx.globalAlpha=a*(pt.trail?0.4:1);
    ctx.fillStyle=pt.color;ctx.shadowColor=pt.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(pt.trail?a:1),0,7);ctx.fill();
    ctx.restore();
  }
}

function renderNumbers(){
  for(const n of CB.numbers){
    const a=clamp(n.life/n.maxlife,0,1);
    const o=n.opt;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.textAlign='center';
    let size=18,color='#ff5555',font='Cinzel';
    if(o.crit){ size=30;color=o.color||'#ffd866'; }
    else if(o.miss){ size=14;color='#aaaaaa';ctx.font=`italic ${size}px Cinzel`; }
    else if(o.heal){ size=18;color='#66ff88'; }
    else if(o.dot){ size=15;color='#ff9933'; }
    else if(o.gold){ size=16;color='#ffd866'; }
    else if(o.reflect){ size=18;color='#ffffff'; }
    else if(o.playerHit){ size=20;color='#ff3030'; }
    const wob=Math.sin(n.wob)*4;
    if(!o.miss)ctx.font=`bold ${size}px Cinzel`;
    ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=o.crit?14:6;
    const yy=o.crit?n.y-Math.abs(Math.sin((1-a)*Math.PI))*10:n.y;
    ctx.fillText(n.text,n.x+wob,yy);
    ctx.restore();
  }
}

/* ground + effect rendering */
function renderGrounds(){
  for(const g of CB.grounds){
    const a=clamp(g.life/ (g.type==='crack'?4:3),0,1);
    ctx.save();ctx.globalAlpha=a*0.8;
    if(g.type==='flame'||g.type==='hellfire'){
      ctx.fillStyle=g.type==='hellfire'?'#ff3300':'#ff6622';ctx.shadowColor='#ff5500';ctx.shadowBlur=20;
      for(let i=0;i<6;i++){const a2=i/6*7+CB.time*3;ctx.beginPath();ctx.ellipse(g.x+Math.cos(a2)*g.r*0.5,g.y+Math.sin(a2)*g.r*0.5,4,8,0,0,7);ctx.fill();}
      ctx.globalAlpha=a*0.2;ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,7);ctx.fill();
    } else if(g.type==='ice'){
      ctx.strokeStyle='#88ddff';ctx.lineWidth=2;ctx.shadowColor='#88ddff';ctx.shadowBlur=10;
      for(let i=0;i<6;i++){const a2=i/6*7;ctx.beginPath();ctx.moveTo(g.x,g.y);ctx.lineTo(g.x+Math.cos(a2)*g.r,g.y+Math.sin(a2)*g.r);ctx.stroke();}
    } else if(g.type==='crack'){
      ctx.strokeStyle='#ff8844';ctx.lineWidth=3;ctx.shadowColor='#ff6600';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(g.x-g.r,g.y);for(let i=-g.r;i<g.r;i+=10)ctx.lineTo(g.x+i,g.y+rand(-6,6));ctx.stroke();
    }
    ctx.restore();
  }
}
function renderEffectsBelow(){
  for(const ef of CB.effects){
    if(ef.type==='aoe'){
      const a=clamp(ef.life/ef.maxlife,0,1);
      ctx.save();ctx.globalAlpha=a*0.5;
      const c=ef.color||EL_COLORS[ef.el]||'#fff';
      const g=ctx.createRadialGradient(ef.x,ef.y,0,ef.x,ef.y,ef.r);
      g.addColorStop(0,c);g.addColorStop(0.7,c+'00'===c?c:c);g.addColorStop(1,'transparent');
      ctx.fillStyle=c;ctx.globalAlpha=a*0.25;ctx.beginPath();ctx.arc(ef.x,ef.y,ef.r*(1.2-a*0.2),0,7);ctx.fill();
      ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=3;ctx.shadowColor=c;ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(ef.x,ef.y,ef.r*(1-a)+ef.r*0.3,0,7);ctx.stroke();
      ctx.restore();
    }
  }
}
function renderEffectsAbove(){
  for(let i=CB.effects.length-1;i>=0;i--){
    const ef=CB.effects[i];
    ef.life-=0.016;
    const a=clamp(ef.life/ef.maxlife,0,1);
    const c=ef.color||EL_COLORS[ef.el]||'#fff';
    ctx.save();
    if(ef.type==='impact'){
      ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=3;ctx.shadowColor=c;ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(ef.x,ef.y,ef.r*(1.4-a*0.4),0,7);ctx.stroke();
    } else if(ef.type==='shock'){
      ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=5;ctx.shadowColor=c;ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(ef.x,ef.y,ef.maxr*(1-a),0,7);ctx.stroke();
    } else if(ef.type==='beam'){
      ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=8;ctx.shadowColor=c;ctx.shadowBlur=20;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(ef.x1,ef.y1);ctx.lineTo(ef.x2,ef.y2);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ef.x1,ef.y1);ctx.lineTo(ef.x2,ef.y2);ctx.stroke();
    } else if(ef.type==='swing'){
      ctx.globalAlpha=a*0.7;ctx.strokeStyle=c;ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(ef.x,ef.y);ctx.lineTo(ef.tx,ef.ty);ctx.stroke();
    } else if(ef.type==='tornado'){
      ctx.globalAlpha=a*0.8;ctx.translate(ef.x,ef.y);
      for(let k=0;k<5;k++){ctx.strokeStyle=`rgba(220,255,180,${a*0.6})`;ctx.lineWidth=3;ctx.beginPath();const rr=40+k*30;ctx.ellipse(0,-k*30,rr,12,0,CB.time*8,CB.time*8+5);ctx.stroke();}
    } else if(ef.type==='singularity'){
      ctx.globalAlpha=a;ctx.translate(ef.x,ef.y);
      for(let k=0;k<8;k++){ctx.fillStyle=`hsl(${(CB.time*200+k*45)%360},90%,60%)`;ctx.beginPath();const rr=(1-a)*300;ctx.arc(Math.cos(k*0.8)*rr,Math.sin(k*0.8)*rr,8,0,7);ctx.fill();}
    } else if(ef.type==='wave'){
      ctx.globalAlpha=a*0.6;ctx.fillStyle='#3399ff';ctx.shadowColor='#3399ff';ctx.shadowBlur=20;
      const wx=(1-a)*CB.w;ctx.fillRect(wx-60,0,120,CB.h);
    } else if(ef.type==='shatter'){
      ctx.globalAlpha=a;for(let k=0;k<20;k++){ctx.fillStyle='#aaeeff';ctx.beginPath();ctx.arc(rand(0,CB.w),rand(0,CB.h),rand(2,6),0,7);ctx.fill();}
    } else if(ef.type==='quake'){
      ctx.globalAlpha=a*0.3;ctx.fillStyle='#bb8844';ctx.fillRect(0,0,CB.w,CB.h);
    }
    ctx.restore();
    if(ef.life<=0)CB.effects.splice(i,1);
  }
}

/* ---------------- GEOMETRY HELPERS ---------------- */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function pointLineDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;const l2=dx*dx+dy*dy;
  if(l2===0)return dist(px,py,x1,y1);
  let t=clamp(((px-x1)*dx+(py-y1)*dy)/l2,0,1);
  return dist(px,py,x1+t*dx,y1+t*dy);
}

/* ============================================================
   =========================  HUD  ============================
============================================================ */
function buildSpellBar(){
  const bar=$('spellBar');bar.innerHTML='';
  for(let i=0;i<MAX_LOADOUT;i++){
    const sid=G.loadout[i];
    const btn=document.createElement('div');
    btn.className='spell-btn';
    if(sid){
      const sp=SPELLS[sid];
      const mc=masteryClass(sid); if(mc)btn.classList.add(mc);
      const rng=spellRange(sp);
      const rngIcon=sp.kind==='self'?'◇':(rng>=600?'»':rng>=320?'›':'·');
      btn.innerHTML=`<span class="key">${i+1}</span>${sp.icon}<span class="rngmark">${rngIcon}</span><div class="cd-overlay hidden"></div>`;
      btn.title=sp.name+' — '+sp.cost+' mana';
      btn.onmouseenter=()=>{ if(CB&&CB.tb)CB.selSlot=i; };
      btn.onclick=()=>{ if(CB&&CB.tb)CB.selSlot=i; castSpellSlot(i); };
    } else { btn.classList.add('empty');btn.innerHTML=`<span class="key">${i+1}</span>`; }
    bar.appendChild(btn);
  }
}
function buildPotionBar(){
  const bar=$('potionBar');bar.innerHTML='';
  for(let i=0;i<3;i++){
    const pid=G.potions[i];
    const btn=document.createElement('div');btn.className='potion-btn';
    const keyLabel=['Q','E','R'][i];
    if(pid){ const def=POTIONS[pid]; btn.innerHTML=`${def.icon}<span class="count">${keyLabel}</span>`; btn.title=def.name; btn.onclick=()=>usePotion(i); }
    else { btn.style.opacity='0.3';btn.innerHTML=`<span class="count">${keyLabel}</span>`; }
    bar.appendChild(btn);
  }
}
function updateWaveChip(){
  if(CB.mode==='boss')$('waveChip').textContent='⚔ BOSS';
  else if(CB.mode==='endless')$('waveChip').textContent='♾️ WAVE '+CB.wave;
  else $('waveChip').textContent='WAVE '+CB.wave;
}
function updateHUD(){
  const p=CB.player;
  // bars
  const hpPct=clamp(p.hp/p.maxhp*100,0,100);
  $('hpFill').style.width=hpPct+'%';
  $('hpText').textContent=Math.ceil(Math.max(0,p.hp))+'/'+Math.round(p.maxhp);
  $('hpBarRow').classList.toggle('pulse-low',hpPct<25);
  const manaPct=clamp(p.mana/p.maxmana*100,0,100);
  $('manaFill').style.width=manaPct+'%';
  $('manaText').textContent=Math.ceil(p.mana)+'/'+Math.round(p.maxmana);
  $('manaBarRow').classList.toggle('pulse-low',manaPct<15);
  $('stamFill').style.width=clamp(p.stamina/p.maxstamina*100,0,100)+'%';
  $('stamText').textContent=Math.ceil(p.stamina);
  const need=xpNeeded(G.level);
  $('xpFill').style.width=clamp(G.xp/need*100,0,100)+'%';
  $('xpText').textContent=G.xp+'/'+need;
  $('lvlText').textContent=G.level;
  $('goldText').textContent=G.gold;
  // cooldown overlays
  const btns=document.querySelectorAll('.spell-btn');
  for(let i=0;i<5;i++){
    const sid=G.loadout[i];const btn=btns[i];if(!btn)continue;
    const ov=btn.querySelector('.cd-overlay');if(!ov)continue;
    if(sid&&CB.cooldowns[sid]>0){ ov.classList.remove('hidden');ov.textContent=CB.cooldowns[sid].toFixed(1); }
    else ov.classList.add('hidden');
  }
  // mechanic bar
  const cls=CB.cls;
  let mechVal=0,mechLabel=cls.mech.name;
  if(cls.id==='fire'){ mechVal=CB.combustion/3*100; mechLabel='Combustion '+CB.combustion+'/3'; }
  else if(cls.id==='wind'){ mechVal=CB.galeStacks/5*100; mechLabel='Gale '+CB.galeStacks+'/5'; }
  else mechVal=CB.mech;
  $('mechFill').style.width=clamp(mechVal,0,100)+'%';
  $('mechFill').style.background=`linear-gradient(90deg,${cls.c1},${cls.c2})`;
  $('mechLabel').textContent=mechLabel;
  $('mechanicPanel').style.setProperty('--glow',cls.c1);
  // boss bar
  if(CB.boss&&!CB.boss._dead){
    $('bossBarFill').style.width=clamp(CB.boss.hp/CB.boss.maxhp*100,0,100)+'%';
  }
  // combo hint
  updateComboHint();
  // screen shake class on hud (we shake canvas in render; also shake hud lightly)
}
function updateComboHint(){
  // show combo hint when two equipped spells can create a debuff combo
  const tags=new Set();
  for(const sid of G.loadout){ const sp=SPELLS[sid]; if(sp&&sp.status&&STATUS_TAG[sp.status])tags.add(STATUS_TAG[sp.status]); }
  let hint='';
  for(const c of COMBOS){ if(tags.has(c.a)&&tags.has(c.b)){ hint+=`⚡ ${c.a}+${c.b} → ${c.name} `; } }
  $('comboHint').textContent=hint;
}

function openSpellMenu(open){
  if(!CB)return;
  CB.spellMenuOpen=open;
  CB.targetTimeScale=open?0.2:1;
}

   =========================  INIT  ===========================
============================================================ */
$('btnFlee').onclick=()=>{
  if(!CB)return;
  if(CB.mode==='endless'&&CB.wave>G.endlessBest)G.endlessBest=CB.wave;
  CB.over=true;
  afterFightProgress();
  enterCity('You retreat to fight another day');
};

  loadSave();
  initTitle();
  showScreen('title');
  resizeCanvas();
}
window.addEventListener('DOMContentLoaded',init);
if(document.readyState!=='loading')init();
